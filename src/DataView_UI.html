<script>
    /* ============================================================
       window.DataViewEngine
       ============================================================ */
    window.DataViewEngine = (function () {

        /* ── Configuración de entidades (íconos, labels, campos FK) ── */
        const ENTITY_META = {
            Portafolio: { icon: '💼', label: 'Portafolios', titleField: 'nombre', idField: 'id_portafolio', fkField: null },
            Grupo_Productos: { icon: '🗂️', label: 'Grupos de Producto', titleField: 'nombre', idField: 'id_grupo_producto', fkField: { key: 'id_portafolio', label: 'Portafolio' } },
            Producto: { icon: '📦', label: 'Productos', titleField: 'nombre_producto', idField: 'id_producto', fkField: { key: 'id_grupo_producto', label: 'Grupo' } }
        };

        /* ── Columnas excluidas de la tabla (campos de auditoría o muy largos) ── */
        const HIDDEN_BY_DEFAULT = ['created_at', 'updated_by'];

        /* ── Campos estatus para badges de color ── */
        const STATUS_FIELDS = ['estado', 'nivel_criticalidad', 'modelo_negocio'];

        /* ── Mock data por entidad (entorno local sin GAS) ── */
        const MOCK_DATA = {
            Portafolio: [
                { id_portafolio: 'PORT-1710000001', nombre: 'Portafolio Digital', descripcion: 'Productos digitales core', temas_estrategicos: 'Transformación,IA', flujos_valor: 'SaaS,API', clientes_segmentos: 'Enterprise', presupuesto: 500000, kpis_metricas: 'NPS,CAC', estado: 'Activo', created_at: '2026-03-01', updated_by: 'admin@co.com' },
                { id_portafolio: 'PORT-1710000002', nombre: 'Portafolio Operativo', descripcion: 'Plataformas internas', temas_estrategicos: 'Eficiencia', flujos_valor: 'B2B', clientes_segmentos: 'Interno', presupuesto: 120000, kpis_metricas: 'MTTR', estado: 'Borrador', created_at: '2026-03-05', updated_by: 'ops@co.com' },
                { id_portafolio: 'PORT-1710000003', nombre: 'Portafolio Innovación', descripcion: 'Nuevas iniciativas', temas_estrategicos: 'Crecimiento,Web3', flujos_valor: 'Marketplace', clientes_segmentos: 'SMB,Enterprise', presupuesto: 250000, kpis_metricas: 'OKR', estado: 'En Revisión', created_at: '2026-03-10', updated_by: 'innov@co.com' }
            ],
            Grupo_Productos: [
                { id_grupo_producto: 'GRUP-001', nombre: 'Plataforma Cloud', descripcion: 'Servicios en la nube', id_portafolio: 'PORT-1710000001', naturaleza_valor: 'Escalabilidad', modelo_negocio: 'SaaS', created_at: '2026-03-02', updated_by: 'admin@co.com' },
                { id_grupo_producto: 'GRUP-002', nombre: 'MarketPlace B2B', descripcion: 'Comercio electrónico empresarial', id_portafolio: 'PORT-1710000001', naturaleza_valor: 'Comisiones', modelo_negocio: 'Marketplace', created_at: '2026-03-03', updated_by: 'admin@co.com' },
                { id_grupo_producto: 'GRUP-003', nombre: 'Ops Interna', descripcion: 'Herramientas internas', id_portafolio: 'PORT-1710000002', naturaleza_valor: 'Eficiencia', modelo_negocio: 'B2B', created_at: '2026-03-06', updated_by: 'ops@co.com' }
            ],
            Producto: [
                { id_producto: 'PROD-001', nombre_producto: 'API Gateway', nivel_criticalidad: 'Tier 1 (Crítico)', slo_objetivo: 99.99, id_grupo_producto: 'GRUP-001', created_at: '2026-03-04' },
                { id_producto: 'PROD-002', nombre_producto: 'Auth Service', nivel_criticalidad: 'Tier 2 (Alto)', slo_objetivo: 99.9, id_grupo_producto: 'GRUP-001', created_at: '2026-03-04' },
                { id_producto: 'PROD-003', nombre_producto: 'Vendor Portal', nivel_criticalidad: 'Tier 3 (Medio)', slo_objetivo: 99.5, id_grupo_producto: 'GRUP-002', created_at: '2026-03-05' },
                { id_producto: 'PROD-004', nombre_producto: 'HR Tool', nivel_criticalidad: 'Tier 4 (Bajo)', slo_objetivo: 98.0, id_grupo_producto: 'GRUP-003', created_at: '2026-03-07' }
            ]
        };

        /* ────────────────────────────────────────────
           Estado interno por entidad
        ───────────────────────────────────────────── */
        let _state = {
            entityName: '',
            data: [],   // todos los registros (sin filtro)
            filtered: [],   // tras búsqueda
            page: 1,
            pageSize: 25,
            sortCol: '',
            sortDir: 'asc',
            view: 'table',  // 'table' | 'grid'
            columns: [],   // { key, label, visible, sortable }
            containerId: ''
        };

        /* ────────────────────────────────────────────
           Helpers
        ───────────────────────────────────────────── */
        function _slugify(str) {
            return (str || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        }

        function _badgeClass(value) {
            const slug = _slugify(String(value));
            const map = {
                'activo': 'activo', 'borrador': 'borrador', 'en-revis-n': 'en-revision', 'en-revision': 'en-revision',
                'tier-1-cr-tico': 'tier-1-critico', 'tier-1-critico': 'tier-1-critico',
                'tier-2-alto': 'tier-2-alto', 'tier-3-medio': 'tier-3-medio', 'tier-4-bajo': 'tier-4-bajo',
                'saas': 'saas', 'marketplace': 'marketplace', 'b2b': 'b2b', 'b2c': 'b2c', 'transaccional': 'transaccional'
            };
            return 'dv-badge dv-badge-' + (map[slug] || 'default');
        }

        function _formatValue(key, value) {
            if (value === null || value === undefined || value === '') return '<span style="color:var(--dv-text-light)">—</span>';
            const strVal = String(value);
            if (STATUS_FIELDS.includes(key)) {
                return `<span class="${_badgeClass(strVal)}">${strVal}</span>`;
            }
            if (key === 'presupuesto' || key === 'slo_objetivo') {
                const num = parseFloat(strVal);
                if (!isNaN(num)) return key === 'presupuesto'
                    ? '$' + num.toLocaleString('es-MX')
                    : num + '%';
            }
            if (key.startsWith('id_')) {
                return `<code style="font-size:.78rem;background:var(--dv-bg);padding:1px 5px;border-radius:3px;">${strVal}</code>`;
            }
            return strVal.length > 60 ? strVal.substring(0, 58) + '…' : strVal;
        }

        function _labelFromKey(key) {
            // Encuentra en APP_SCHEMAS si está disponible
            const schema = window.APP_SCHEMAS && window.APP_SCHEMAS[_state.entityName];
            if (schema) {
                const field = schema.fields.find(f => f.name === key);
                if (field) return field.label;
            }
            return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        /* ────────────────────────────────────────────
           Derivar columnas desde schema o datos
        ───────────────────────────────────────────── */
        function _buildColumns(entityName, rows) {
            const schema = window.APP_SCHEMAS && window.APP_SCHEMAS[entityName];
            let keys = [];

            if (schema) {
                keys = schema.fields.map(f => f.name);
                // agregar claves presentes en datos pero no en schema (ej. created_at)
                if (rows.length > 0) {
                    Object.keys(rows[0]).forEach(k => { if (!keys.includes(k)) keys.push(k); });
                }
            } else if (rows.length > 0) {
                keys = Object.keys(rows[0]);
            }

            return keys.map(key => ({
                key,
                label: _labelFromKey(key),
                visible: !HIDDEN_BY_DEFAULT.includes(key),
                sortable: true
            }));
        }

        /* ────────────────────────────────────────────
           Fetch data (GAS o Mock)
        ───────────────────────────────────────────── */
        function _fetchData(entityName, cb) {
            const isGAS = typeof google !== 'undefined' && google.script && google.script.run;
            if (isGAS) {
                google.script.run
                    .withSuccessHandler(function (response) {
                        if (response && response.status === 'success') {
                            cb(null, response.data ? response.data.rows || [] : []);
                        } else {
                            cb(new Error(response ? response.message : 'Error desconocido'));
                        }
                    })
                    .withFailureHandler(function (err) {
                        cb(err || new Error('Error de comunicación con el servidor'));
                    })
                    .API_Universal_Router('read', entityName, {});
            } else {
                // Entorno local — usar mock
                setTimeout(function () {
                    const mockRows = MOCK_DATA[entityName] || [];
                    cb(null, mockRows);
                }, 700);
            }
        }

        /* ────────────────────────────────────────────
           Búsqueda y Ordenación
        ───────────────────────────────────────────── */
        function _applyFilter(query) {
            if (!query.trim()) {
                _state.filtered = [..._state.data];
            } else {
                const q = query.toLowerCase();
                _state.filtered = _state.data.filter(row =>
                    Object.values(row).some(v => String(v).toLowerCase().includes(q))
                );
            }
            _state.page = 1;
            _rerender();
        }

        function _applySort(colKey) {
            if (_state.sortCol === colKey) {
                _state.sortDir = _state.sortDir === 'asc' ? 'desc' : 'asc';
            } else {
                _state.sortCol = colKey;
                _state.sortDir = 'asc';
            }
            _state.filtered.sort((a, b) => {
                const av = String(a[colKey] ?? '').toLowerCase();
                const bv = String(b[colKey] ?? '').toLowerCase();
                const cmp = av.localeCompare(bv, 'es', { numeric: true });
                return _state.sortDir === 'asc' ? cmp : -cmp;
            });
            _rerender();
        }

        /* ────────────────────────────────────────────
           Paginación
        ───────────────────────────────────────────── */
        function _getPage() {
            const start = (_state.page - 1) * _state.pageSize;
            return _state.filtered.slice(start, start + _state.pageSize);
        }

        function _totalPages() {
            return Math.max(1, Math.ceil(_state.filtered.length / _state.pageSize));
        }

        /* ────────────────────────────────────────────
           Renderers
        ───────────────────────────────────────────── */
        function _renderSkeleton() {
            let rows = '';
            for (let i = 0; i < 5; i++) {
                const widths = [80, 160, 120, 100, 90];
                const cells = widths.map(w => `<div class="dv-skeleton-cell" style="width:${w}px;"></div>`).join('');
                rows += `<div class="dv-skeleton-row">${cells}</div>`;
            }
            return `<div class="dv-card" style="padding:4px 0;">${rows}</div>`;
        }

        function _renderEmpty() {
            return `
        <div class="dv-card">
          <div class="dv-empty">
            <div class="dv-empty-icon">🗃️</div>
            <h3>Sin resultados</h3>
            <p>No se encontraron registros. Prueba con otros términos de búsqueda o crea un nuevo registro.</p>
          </div>
        </div>`;
        }

        function _renderTableView(rows) {
            const visibleCols = _state.columns.filter(c => c.visible);
            if (visibleCols.length === 0 || rows.length === 0) return _renderEmpty();

            const thead = visibleCols.map(col => {
                const isSorted = _state.sortCol === col.key;
                const arrow = isSorted
                    ? `<span class="dv-sort-icon active">${_state.sortDir === 'asc' ? '↑' : '↓'}</span>`
                    : `<span class="dv-sort-icon">↕</span>`;
                return `<th class="${isSorted ? 'sorted' : ''}" onclick="window.DataViewEngine._onSort('${col.key}')">${col.label}${arrow}</th>`;
            }).join('');

            const tbody = rows.map(row => {
                const cells = visibleCols.map(col =>
                    `<td title="${String(row[col.key] ?? '')}">${_formatValue(col.key, row[col.key])}</td>`
                ).join('');
                return `<tr>${cells}</tr>`;
            }).join('');

            return `
        <div class="dv-card">
          <div class="dv-table-wrap">
            <table class="dv-table">
              <thead><tr>${thead}</tr></thead>
              <tbody>${tbody}</tbody>
            </table>
          </div>
          ${_renderPaginationHTML()}
        </div>`;
        }

        function _renderGridView(rows) {
            const meta = ENTITY_META[_state.entityName] || { titleField: 'nombre', idField: 'id', fkField: null };
            const MAX_ATTRS = 5;

            if (rows.length === 0) return _renderEmpty();

            const cards = rows.map(row => {
                const title = row[meta.titleField] || row[meta.idField] || '—';
                const id = row[meta.idField] || '';
                const fkChip = meta.fkField && row[meta.fkField.key]
                    ? `<span class="dv-card-item-fk-chip">🔗 ${meta.fkField.label}: ${row[meta.fkField.key]}</span>`
                    : '';

                const attrKeys = Object.keys(row)
                    .filter(k => k !== meta.titleField && k !== meta.idField &&
                        !(meta.fkField && k === meta.fkField.key) &&
                        !HIDDEN_BY_DEFAULT.includes(k))
                    .slice(0, MAX_ATTRS);

                const attrs = attrKeys.map(k => `
          <div class="dv-card-item-attr">
            <span class="dv-card-item-attr-key">${_labelFromKey(k)}</span>
            <span class="dv-card-item-attr-val">${_formatValue(k, row[k])}</span>
          </div>`).join('');

                return `
          <div class="dv-card-item">
            <div class="dv-card-item-title" title="${title}">${title}</div>
            <div class="dv-card-item-id">${id}</div>
            <div class="dv-card-item-attrs">${attrs}</div>
            ${fkChip}
          </div>`;
            }).join('');

            return `
        <div class="dv-card">
          <div class="dv-grid">${cards}</div>
          ${_renderPaginationHTML()}
        </div>`;
        }

        function _renderPaginationHTML() {
            const total = _state.filtered.length;
            const start = total === 0 ? 0 : (_state.page - 1) * _state.pageSize + 1;
            const end = Math.min(_state.page * _state.pageSize, total);
            const tPages = _totalPages();

            const sizes = [10, 25, 50, 100].map(s =>
                `<option value="${s}" ${s === _state.pageSize ? 'selected' : ''}>${s}</option>`
            ).join('');

            return `
        <div class="dv-pagination">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="dv-pagination-info">Mostrando <strong>${start}–${end}</strong> de <strong>${total}</strong></span>
            <select class="dv-page-size-select" onchange="window.DataViewEngine._onPageSize(this.value)">${sizes}</select>
          </div>
          <div class="dv-pagination-controls">
            <button class="dv-page-btn" title="Primera" onclick="window.DataViewEngine._onPage(1)" ${_state.page === 1 ? 'disabled' : ''}>«</button>
            <button class="dv-page-btn" title="Anterior" onclick="window.DataViewEngine._onPage(${_state.page - 1})" ${_state.page === 1 ? 'disabled' : ''}>‹</button>
            <span style="padding:0 10px;font-size:.83rem;color:var(--dv-text-secondary);">Pág. ${_state.page} / ${tPages}</span>
            <button class="dv-page-btn" title="Siguiente" onclick="window.DataViewEngine._onPage(${_state.page + 1})" ${_state.page >= tPages ? 'disabled' : ''}>›</button>
            <button class="dv-page-btn" title="Última" onclick="window.DataViewEngine._onPage(${tPages})" ${_state.page >= tPages ? 'disabled' : ''}>»</button>
          </div>
        </div>`;
        }

        function _renderToolbarHTML() {
            const colItems = _state.columns.map((col, i) => `
        <label class="dv-popover-item">
          <input type="checkbox" ${col.visible ? 'checked' : ''}
            onchange="window.DataViewEngine._onColToggle(${i}, this.checked)">
          ${col.label}
        </label>`).join('');

            return `
        <div class="dv-toolbar">
          <div class="dv-toolbar-left">
            <div class="dv-search-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input class="dv-search" id="dv-search-input" placeholder="Buscar en todos los campos…"
                oninput="window.DataViewEngine._onSearch(this.value)" autocomplete="off">
            </div>
          </div>
          <div class="dv-toolbar-right">
            <div class="dv-popover-wrap">
              <button class="dv-btn dv-btn-ghost" id="dv-col-toggle-btn"
                onclick="window.DataViewEngine._toggleColPopover()" title="Configurar columnas">
                ⊞ Columnas
              </button>
              <div class="dv-popover" id="dv-col-popover">
                <div class="dv-popover-header">Columnas visibles</div>
                ${colItems}
              </div>
            </div>
            <button class="dv-btn-icon ${_state.view === 'table' ? 'active' : ''}" id="dv-view-table-btn"
              onclick="window.DataViewEngine._onViewToggle('table')" title="Vista de lista">
              ☰
            </button>
            <button class="dv-btn-icon ${_state.view === 'grid' ? 'active' : ''}" id="dv-view-grid-btn"
              onclick="window.DataViewEngine._onViewToggle('grid')" title="Vista de cuadrícula">
              ⊞
            </button>
          </div>
        </div>`;
        }

        function _renderHeader() {
            const meta = ENTITY_META[_state.entityName] || { icon: '📋', label: _state.entityName };
            const total = _state.data.length;
            return `
        <div class="dv-header">
          <div class="dv-header-left">
            <h2>${meta.icon} ${meta.label}</h2>
            <p>${total} registro${total !== 1 ? 's' : ''} en total</p>
          </div>
          <div class="dv-header-actions">
            <button class="dv-btn dv-btn-outline" onclick="window.DataViewEngine._exportCSV()">
              ⤓ Exportar CSV
            </button>
            <button class="dv-btn dv-btn-primary" onclick="renderForm('${_state.entityName}')">
              + Crear ${meta.label.replace(/s$/, '')}
            </button>
          </div>
        </div>`;
        }

        /* ────────────────────────────────────────────
           Re-render (sólo zona de datos)
        ───────────────────────────────────────────── */
        function _rerender() {
            const container = document.getElementById(_state.containerId);
            if (!container) return;

            const pageRows = _getPage();
            const dataHTML = _state.view === 'table'
                ? _renderTableView(pageRows)
                : _renderGridView(pageRows);

            const dataZone = container.querySelector('#dv-data-zone');
            if (dataZone) {
                dataZone.innerHTML = _renderToolbarHTML() + dataHTML;
            }
        }

        /* ────────────────────────────────────────────
           Render principal (entrada pública)
        ───────────────────────────────────────────── */
        function render(entityName, containerId) {
            _state = {
                entityName, containerId,
                data: [], filtered: [],
                page: 1, pageSize: 25,
                sortCol: '', sortDir: 'asc',
                view: 'table', columns: []
            };

            const container = document.getElementById(containerId);
            if (!container) return;

            // Header + skeleton
            container.innerHTML = `
        <div class="dv-root">
          ${_renderHeader()}
          <div id="dv-data-zone">${_renderSkeleton()}</div>
        </div>`;

            // Actualizar título global del header de Ionic
            const headerTitle = document.getElementById('main-header-title');
            if (headerTitle) {
                const meta = ENTITY_META[entityName] || { label: entityName };
                headerTitle.textContent = meta.label;
            }
            const backBtn = document.getElementById('global-back-btn');
            if (backBtn) backBtn.style.display = 'flex';

            // Fetch
            _fetchData(entityName, function (err, rows) {
                if (err) {
                    const zone = document.getElementById('dv-data-zone');
                    if (zone) zone.innerHTML = `<div class="dv-card"><div class="dv-empty">
            <div class="dv-empty-icon">⚠️</div>
            <h3>Error al cargar datos</h3>
            <p>${err.message}</p>
          </div></div>`;
                    return;
                }

                _state.data = rows;
                _state.filtered = [...rows];
                _state.columns = _buildColumns(entityName, rows);

                // Reconstruir header (ahora tenemos el total real)
                const root = container.querySelector('.dv-root');
                if (root) {
                    root.querySelector('.dv-header').outerHTML = _renderHeader();
                }

                _rerender();
            });
        }

        /* ────────────────────────────────────────────
           CSV Export
        ───────────────────────────────────────────── */
        function _exportCSV() {
            const visibleCols = _state.columns.filter(c => c.visible);
            const header = visibleCols.map(c => `"${c.label}"`).join(',');
            const bodyRows = _state.filtered.map(row =>
                visibleCols.map(col => {
                    const v = String(row[col.key] ?? '').replace(/"/g, '""');
                    return `"${v}"`;
                }).join(',')
            ).join('\n');

            const csv = '\uFEFF' + header + '\n' + bodyRows; // BOM para Excel/UTF-8
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${_state.entityName}_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        /* ────────────────────────────────────────────
           Event handlers (accesibles desde HTML inline)
        ───────────────────────────────────────────── */
        function _onSearch(query) { _applyFilter(query); }

        function _onSort(colKey) { _applySort(colKey); }

        function _onPage(p) {
            const tp = _totalPages();
            _state.page = Math.max(1, Math.min(p, tp));
            _rerender();
        }

        function _onPageSize(size) {
            _state.pageSize = parseInt(size, 10);
            _state.page = 1;
            _rerender();
        }

        function _onColToggle(idx, visible) {
            _state.columns[idx].visible = visible;
            _rerender();
            // Re-abrir popover tras re-render
            const pop = document.getElementById('dv-col-popover');
            if (pop) pop.classList.add('open');
        }

        function _toggleColPopover() {
            const pop = document.getElementById('dv-col-popover');
            if (pop) pop.classList.toggle('open');
        }

        function _onViewToggle(view) {
            _state.view = view;
            _rerender();
        }

        /* Cerrar popover al hacer click fuera */
        document.addEventListener('click', function (e) {
            const wrap = document.querySelector('.dv-popover-wrap');
            if (wrap && !wrap.contains(e.target)) {
                const pop = document.getElementById('dv-col-popover');
                if (pop) pop.classList.remove('open');
            }
        });

        /* API pública */
        return {
            render,
            _exportCSV,
            _onSearch, _onSort, _onPage, _onPageSize,
            _onColToggle, _toggleColPopover, _onViewToggle
        };
    })();
</script>

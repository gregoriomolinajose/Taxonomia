<script>
    /**
     * FormBuilder_Inputs.html
     * 
     * [S12.1] Architectural Splitting: Pure Factory Component
     * Responsable único de generar Nodos DOM (document.createElement) a partir de un Schema.
     * Cero dependencias de estado de red ni inyección en el DOM raíz.
     */
    (function (global) {
        
        // Base Initialization si no existe (creado por UI_Components.html previamente)
        global.UI_Factory = global.UI_Factory || {};

        /**
         * Generic Base Configurator for Inputs
         */
        function _applyBaseAttributes(inputEl, field, isComplex = false) {
            if (!isComplex) {
                inputEl.setAttribute('label', field.label + (field.type === 'lookup' ? ' (Buscar ' + field.lookupTarget + ')' : ''));
                inputEl.setAttribute('label-placement', 'floating');
                inputEl.setAttribute('fill', 'outline');
                inputEl.setAttribute('name', field.name);
                inputEl.style.marginBottom = 'var(--spacing-4)';
                inputEl.style.setProperty('--background', 'var(--ion-color-step-100)');
                inputEl.style.borderRadius = 'var(--rounded-sm)';

                if (field.required) inputEl.setAttribute('required', 'true');
                if (field.readonly && field.type !== 'lookup') {
                    inputEl.setAttribute('readonly', 'true');
                    inputEl.readonly = true;
                }
            }
        }

        global.UI_Factory.buildHidden = function(field, entityName, defaultValue) {
            const hiddenInput = document.createElement('input');
            hiddenInput.setAttribute('type', 'hidden');
            hiddenInput.setAttribute('name', field.name);
            
            if (field.primaryKey) {
                const prefix = entityName.substring(0, 4).toUpperCase();
                const sufix = Math.random().toString(36).substring(2, 7).toUpperCase();
                hiddenInput.value = `${prefix}-${sufix}`;
            } else if (defaultValue !== undefined) {
                hiddenInput.value = defaultValue;
            } else if (field.defaultValue !== undefined) {
                hiddenInput.value = field.defaultValue;
            }
            return hiddenInput;
        };

        global.UI_Factory.buildInput = function(field, entityName) {
            const inputEl = document.createElement('ion-input');
            inputEl.setAttribute('type', field.type === 'number' ? 'number' : (field.type === 'date' ? 'date' : 'text'));
            
            if (field.readonly && field.name.startsWith('id_')) {
                const prefix = entityName.substring(0, 4).toUpperCase();
                const sufix = Math.random().toString(36).substring(2, 7).toUpperCase();
                inputEl.value = `${prefix}-${sufix}`;
            }
            
            _applyBaseAttributes(inputEl, field);
            return inputEl;
        };

        global.UI_Factory.buildTextarea = function(field) {
            const inputEl = document.createElement('ion-textarea');
            inputEl.setAttribute('rows', '4');
            _applyBaseAttributes(inputEl, field);
            return inputEl;
        };

        global.UI_Factory.buildSelect = function(field) {
            const inputEl = document.createElement('ion-select');
            inputEl.setAttribute('interface', window.innerWidth < 768 ? 'action-sheet' : 'popover');
            
            if (field.options && Array.isArray(field.options)) {
                field.options.forEach(opt => {
                    const ionOption = document.createElement('ion-select-option');
                    if (typeof opt === 'object' && opt !== null) {
                        ionOption.value = opt.value;
                        ionOption.textContent = opt.label;
                    } else {
                        ionOption.value = opt;
                        ionOption.textContent = opt;
                    }
                    inputEl.appendChild(ionOption);
                });
            }
            _applyBaseAttributes(inputEl, field);
            return inputEl;
        };

        global.UI_Factory.buildLookup = function(field) {
            const inputEl = document.createElement('ion-input');
            inputEl.setAttribute('readonly', 'true');
            _applyBaseAttributes(inputEl, field);
            return inputEl;
        };

        global.UI_Factory.buildChipInput = function(field) {
            const inputEl = document.createElement('div');
            inputEl.style.marginBottom = 'var(--spacing-4)';

            const cLabel = document.createElement('div');
            cLabel.style.fontSize = 'var(--sys-font-small)';
            cLabel.style.color = 'var(--ion-color-medium)';
            cLabel.style.marginBottom = 'var(--spacing-1)';
            cLabel.style.paddingLeft = 'var(--spacing-1)';
            cLabel.textContent = field.label + (field.required ? ' *' : '');
            inputEl.appendChild(cLabel);

            const chipItem = document.createElement('ion-item');
            chipItem.setAttribute('lines', 'none');
            chipItem.style.setProperty('--background', 'var(--ion-color-step-100)');
            chipItem.style.borderRadius = 'var(--rounded-sm)';
            chipItem.style.marginBottom = 'var(--spacing-2)';
            chipItem.style.border = '1px solid var(--ion-color-step-300)';

            const innerInput = document.createElement('ion-input');
            innerInput.setAttribute('placeholder', `Añadir ${field.label}...`);

            const addBtn = document.createElement('ion-button');
            addBtn.setAttribute('slot', 'end');
            addBtn.setAttribute('fill', 'clear');
            addBtn.textContent = 'Agregar';

            chipItem.appendChild(innerInput);
            chipItem.appendChild(addBtn);

            const chipContainer = document.createElement('div');
            chipContainer.className = 'chip-container';
            chipContainer.setAttribute('data-chip-name', field.name);
            chipContainer.classList.remove('ion-hide');
            chipContainer.style.flexWrap = 'wrap';
            chipContainer.style.gap = 'var(--spacing-2)';

            inputEl.appendChild(chipItem);
            inputEl.appendChild(chipContainer);

            const addChip = () => {
                const val = innerInput.value.trim();
                if (val) {
                    const chip = document.createElement('ion-chip');
                    chip.setAttribute('color', 'primary');

                    const chipLabel = document.createElement('ion-label');
                    chipLabel.textContent = val;

                    const chipIcon = document.createElement('ion-icon');
                    chipIcon.setAttribute('name', 'close-circle');
                    chipIcon.addEventListener('click', () => { chip.remove(); });

                    chip.appendChild(chipLabel);
                    chip.appendChild(chipIcon);
                    chipContainer.appendChild(chip);

                    innerInput.value = '';
                }
            };

            addBtn.addEventListener('click', addChip);
            innerInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addChip();
                }
            });

            return inputEl;
        };

        global.UI_Factory.buildDynamicList = function(field, data) {
            const inputEl = document.createElement('div');
            inputEl.setAttribute('data-dynamic-list', field.name);
            inputEl.style.border = '0px solid var(--ion-border-color)';
            inputEl.style.padding = 'var(--spacing-0)';
            inputEl.style.marginBottom = 'var(--spacing-4)';
            
            const dlHeader = document.createElement('div');
            dlHeader.style.fontSize = 'var(--sys-font-small)';
            dlHeader.style.color = 'var(--ion-color-medium)';
            dlHeader.style.marginBottom = 'var(--spacing-2)';
            dlHeader.style.paddingLeft = 'var(--spacing-1)';
            dlHeader.textContent = field.label + (field.required ? ' *' : '');
            inputEl.appendChild(dlHeader);

            const listRowsContainer = document.createElement('div');
            inputEl.appendChild(listRowsContainer);

            const addBtn = document.createElement('ion-button');
            addBtn.setAttribute('fill', 'outline');
            addBtn.setAttribute('size', 'small');
            const addIcon = document.createElement('ion-icon');
            addIcon.setAttribute('slot', 'start');
            addIcon.setAttribute('name', 'add');
            addBtn.appendChild(addIcon);
            addBtn.appendChild(document.createTextNode(' Agregar'));
            
            let initialData = [];
            if (data && data[field.name]) {
                try {
                    initialData = typeof data[field.name] === 'string' ? JSON.parse(data[field.name]) : data[field.name];
                } catch(e) {}
            }
            
            const createRow = (rowData = {}) => {
                const row = document.createElement('ion-row');
                row.classList.add('dynamic-list-row');
                row.style.alignItems = 'center';
                row.style.marginBottom = 'var(--spacing-2)';

                field.subFields.forEach(sub => {
                    const col = document.createElement('ion-col');
                    col.setAttribute('size-md', String(sub.width || 12));
                    col.setAttribute('size', '12');

                    const subInput = document.createElement(sub.type === 'select' ? 'ion-select' : 'ion-input');
                    subInput.setAttribute('name', sub.name);
                    subInput.setAttribute('label', sub.label);
                    subInput.setAttribute('label-placement', 'floating');
                    subInput.setAttribute('fill', 'outline');
                    subInput.style.setProperty('--background', 'var(--ion-color-step-100)');
                    
                    if (rowData[sub.name]) {
                        subInput.value = rowData[sub.name];
                    }

                    if (sub.type === 'select' && sub.lookupSource) {
                        subInput.setAttribute('interface', window.innerWidth < 768 ? 'action-sheet' : 'popover');
                        if (sub.options && Array.isArray(sub.options)) {
                            sub.options.forEach(opt => {
                                const ionOption = document.createElement('ion-select-option');
                                ionOption.value = (typeof opt === 'object' && opt !== null) ? opt.value : opt;
                                ionOption.textContent = (typeof opt === 'object' && opt !== null) ? opt.label : opt;
                                subInput.appendChild(ionOption);
                            });
                        }
                    }
                    col.appendChild(subInput);
                    row.appendChild(col);
                });

                const delCol = document.createElement('ion-col');
                delCol.setAttribute('size-md', '1');
                delCol.setAttribute('size', '2');
                const delBtn = document.createElement('ion-button');
                delBtn.setAttribute('color', 'danger');
                delBtn.setAttribute('fill', 'clear');
                const delIcon = document.createElement('ion-icon');
                delIcon.setAttribute('name', 'trash-outline');
                delBtn.appendChild(delIcon);
                delBtn.onclick = () => row.remove();
                
                delCol.appendChild(delBtn);
                row.appendChild(delCol);

                listRowsContainer.appendChild(row);
            };

            if (initialData.length > 0 && Array.isArray(initialData)) {
                initialData.forEach(item => createRow(item));
            }

            addBtn.onclick = () => createRow();

            inputEl.appendChild(addBtn);
            return inputEl;
        };

        global.UI_Factory.drawChip = function(id, labelText, onRemoveCallback) {
            const chip = document.createElement('ion-chip');
            chip.color = 'primary';
            const lbl = document.createElement('ion-label');
            lbl.textContent = labelText;
            chip.appendChild(lbl);
            if (typeof onRemoveCallback === 'function') {
                const icon = document.createElement('ion-icon');
                icon.name = 'close-circle';
                icon.onclick = (e) => onRemoveCallback(e, id);
                chip.appendChild(icon);
            }
            return chip;
        };

        global.UI_Factory.buildSearchableMulti = function(fieldDef, dataset, initialSelection, localEventBus) {
            const mainContainer = document.createElement('div');
            let selectedIds = Array.isArray(initialSelection) ? [...initialSelection] : [];
            
            const hidden = document.createElement('input');
            hidden.type = 'hidden';
            hidden.name = fieldDef.name;
            hidden.value = JSON.stringify(selectedIds);
            hidden.id = `hidden_${fieldDef.name}`;
            hidden.dataset.parser = 'json_array';
            mainContainer.appendChild(hidden);

            const visualWrapper = document.createElement('div');
            visualWrapper.style.width = '100%';
            visualWrapper.style.marginBottom = '16px';
            
            const headerRow = document.createElement('div');
            headerRow.classList.remove('ion-hide');
            headerRow.style.justifyContent = 'space-between';
            headerRow.style.alignItems = 'center';
            headerRow.style.width = '100%';
            headerRow.style.marginBottom = '8px';
            
            const label = document.createElement('div');
            label.style.fontSize = 'var(--sys-font-small)';
            label.style.color = 'var(--ion-color-medium)';
            label.style.fontWeight = 'bold';
            label.textContent = fieldDef.label + (fieldDef.required ? ' *' : '');
            
            const addBtn = document.createElement('ion-button');
            addBtn.fill = 'clear';
            addBtn.size = 'small';
            const addIco2 = document.createElement('ion-icon');
            addIco2.setAttribute('name', 'add');
            addIco2.setAttribute('slot', 'start');
            addBtn.appendChild(addIco2);
            addBtn.appendChild(document.createTextNode(' AGREGAR'));

            headerRow.appendChild(label);
            headerRow.appendChild(addBtn);

            const chipsBox = document.createElement('div');
            chipsBox.classList.remove('ion-hide');
            chipsBox.style.flexWrap = 'wrap';
            chipsBox.style.gap = '8px';
            chipsBox.style.minHeight = '32px';

            visualWrapper.appendChild(headerRow);
            visualWrapper.appendChild(chipsBox);
            mainContainer.appendChild(visualWrapper);

            addBtn.onclick = () => {
                let draftIds = [...selectedIds];
                
                const pickerModal = document.createElement('ion-modal');
                pickerModal.isOpen = true;
                
                const header = document.createElement('ion-header');
                const toolbar = document.createElement('ion-toolbar');
                const title = document.createElement('ion-title');
                title.textContent = `Seleccionar ${fieldDef.targetEntity}`;
                
                const buttonsStart = document.createElement('ion-buttons');
                buttonsStart.slot = 'start';
                const cancelBtn = document.createElement('ion-button');
                cancelBtn.textContent = 'Cerrar';
                pickerModal.addEventListener('ionModalDidDismiss', () => pickerModal.remove(), { once: true });
                cancelBtn.onclick = () => { pickerModal.isOpen = false; };
                buttonsStart.appendChild(cancelBtn);

                const buttonsEnd = document.createElement('ion-buttons');
                buttonsEnd.slot = 'end';
                const confirmBtn = document.createElement('ion-button');
                confirmBtn.textContent = 'Confirmar';
                confirmBtn.color = 'primary';
                confirmBtn.onclick = () => {
                    selectedIds = [...draftIds];
                    renderChips();
                    pickerModal.isOpen = false;
                    
                    // Notificar el EventBus a toda la topología sobre la selección múltiple
                    if (localEventBus && typeof localEventBus.publish === 'function') {
                        localEventBus.publish('MULTISELECT_CHANGED', { fieldName: fieldDef.name, value: selectedIds });
                    }
                };
                buttonsEnd.appendChild(confirmBtn);

                toolbar.appendChild(buttonsStart);
                toolbar.appendChild(title);
                toolbar.appendChild(buttonsEnd);
                header.appendChild(toolbar);

                const content = document.createElement('ion-content');
                content.classList.add('ion-padding');
                
                const searchbar = document.createElement('ion-searchbar');
                searchbar.placeholder = `Buscar ${fieldDef.targetEntity}...`;
                searchbar.debounce = 100;

                const draftChipsBox = document.createElement('div');
                draftChipsBox.classList.remove('ion-hide');
                draftChipsBox.style.flexWrap = 'wrap';
                draftChipsBox.style.gap = '8px';
                draftChipsBox.style.marginBottom = '16px';
                
                const renderDraftChips = () => {
                    draftChipsBox.innerHTML = '';
                    draftIds.forEach(id => {
                        const match = dataset.find(d => String(d[fieldDef.valueField]) === String(id));
                        const labelText = match && match[fieldDef.labelField] ? `${match[fieldDef.valueField]} - ${match[fieldDef.labelField]}` : id;
                        const chip = global.UI_Factory.drawChip(id, labelText, (e, chipId) => {
                            draftIds = draftIds.filter(sid => sid !== chipId);
                            renderDraftChips();
                        });
                        draftChipsBox.appendChild(chip);
                    });
                };
                renderDraftChips();

                const list = document.createElement('ion-list');

                searchbar.addEventListener('ionInput', (e) => {
                    const term = (e.detail.value || '').toLowerCase().trim();
                    list.innerHTML = '';
                    if (!term) return;
                    
                    const matches = dataset.filter(d => {
                        const l = d[fieldDef.labelField] || '';
                        return String(l).toLowerCase().includes(term) && !draftIds.includes(String(d[fieldDef.valueField]));
                    }).slice(0, 15);
                    
                    matches.forEach(m => {
                        const item = document.createElement('ion-item');
                        item.button = true;
                        item.textContent = `${m[fieldDef.valueField]} - ${m[fieldDef.labelField]}`;
                        item.onclick = () => {
                            draftIds.push(String(m[fieldDef.valueField]));
                            searchbar.value = '';
                            list.innerHTML = '';
                            renderDraftChips();
                        };
                        list.appendChild(item);
                    });
                });

                content.appendChild(searchbar);
                content.appendChild(draftChipsBox);
                content.appendChild(list);

                pickerModal.appendChild(header);
                pickerModal.appendChild(content);
                document.body.appendChild(pickerModal);
            };
            
            const renderChips = () => {
                chipsBox.innerHTML = '';
                hidden.value = JSON.stringify(selectedIds);
                
                if (selectedIds.length === 0) {
                    const emptyNode = document.createElement('div');
                    emptyNode.style.width = '100%';
                    emptyNode.style.textAlign = 'center';
                    emptyNode.style.color = 'var(--ion-color-medium)';
                    emptyNode.style.padding = '16px';
                    emptyNode.style.border = '1px dashed var(--ion-color-step-300, #c8c7cc)';
                    emptyNode.style.borderRadius = '8px';
                    
                    const emptyIcon = document.createElement('ion-icon');
                    emptyIcon.setAttribute('name', 'layers-outline');
                    emptyIcon.style.fontSize = '24px';
                    
                    const emptyText = document.createElement('div');
                    emptyText.style.fontSize = '14px';
                    emptyText.style.marginTop = '8px';
                    emptyText.textContent = 'Sin registros vinculados';
                    
                    emptyNode.appendChild(emptyIcon);
                    emptyNode.appendChild(emptyText);
                    
                    window.DOM.clear(chipsBox);
                    chipsBox.appendChild(emptyNode);
                    return;
                }

                selectedIds.forEach(id => {
                    const match = dataset.find(d => String(d[fieldDef.valueField]) === String(id));
                    const labelText = match && match[fieldDef.labelField] ? `${match[fieldDef.valueField]} - ${match[fieldDef.labelField]}` : id;
                    
                    const chip = global.UI_Factory.drawChip(id, labelText, (e, chipId) => {
                        e.stopPropagation();
                        selectedIds = selectedIds.filter(sid => sid !== chipId);
                        renderChips();
                        
                        // Notificar el EventBus a toda la topología sobre la des-selección
                        if (localEventBus && typeof localEventBus.publish === 'function') {
                            localEventBus.publish('MULTISELECT_CHANGED', { fieldName: fieldDef.name, value: selectedIds });
                        }
                    });
                    chipsBox.appendChild(chip);
                });
            };
            
            renderChips();
            return mainContainer;
        };

        global.UI_Factory.populateSelectOptions = function(selectEl, dataArr, field) {
            if (!Array.isArray(dataArr)) return;
            
            dataArr.forEach(d => {
                const opt = document.createElement('ion-select-option');
                opt.value = typeof d[field.valueField] !== 'undefined' ? d[field.valueField] : d.id_registro;
                opt.textContent = `${opt.value} - ${typeof d[field.labelField] !== 'undefined' ? d[field.labelField] : d.nombre}`;
                selectEl.appendChild(opt);
            });
        };

        global.UI_Factory.bindLevelChangeRepaint = function(selectEl, activeData, field, emptyOptNode, localBus) {
            if (!Array.isArray(activeData)) return;

            if (localBus) {
                localBus.subscribe('TAXONOMY_LEVEL_CHANGED', (ev) => {
                    const newLevel = ev.detail.newLevel;
                    const rulesContext = ev.detail.rules;
                    
                    // Isomorphic State Resolution (Zero DOM dependencies in logic)
                    const uiState = window.SubgridState ? 
                        window.SubgridState.evaluateFieldState(rulesContext, newLevel, field.relationType) : 
                        { isDisabled: false, opacity: '1', placeholder: '— Sin asignar —' };
                    
                    selectEl.disabled = uiState.isDisabled;
                    selectEl.style.opacity = uiState.opacity;
                    emptyOptNode.textContent = uiState.placeholder;
                    
                    let freshFiltered = activeData;
                    
                    if (rulesContext) {
                        if (rulesContext.levelFiltering === true && rulesContext.strictLevelJumps === true && field.relationType === 'padre') {
                            freshFiltered = activeData.filter(d => Number(d.nivel_tipo) === newLevel - 1);
                        }
                        
                        if (rulesContext.rootRequiresNoParent === true && newLevel === 1 && field.relationType === 'padre') {
                            freshFiltered = []; 
                        }
                    }
                    
                    // REPAINT
                    selectEl.innerHTML = '';
                    selectEl.appendChild(emptyOptNode);
                    
                    global.UI_Factory.populateSelectOptions(selectEl, freshFiltered, field);
                });
            }
        };

        // ==========================================
        // [S16.4] Inversion of Control: Input Builder Registry
        // ==========================================
        global.UI_Factory.BuilderRegistry = {};
        
        global.UI_Factory.registerBuilder = function(type, builderFn) {
            this.BuilderRegistry[type] = builderFn;
        };

        // --- Core Builders Automatic Registration ---
        global.UI_Factory.registerBuilder('text', (f, e) => global.UI_Factory.buildInput(f, e));
        global.UI_Factory.registerBuilder('number', (f, e) => global.UI_Factory.buildInput(f, e));
        global.UI_Factory.registerBuilder('date', (f, e) => global.UI_Factory.buildInput(f, e));
        global.UI_Factory.registerBuilder('textarea', (f) => global.UI_Factory.buildTextarea(f));
        global.UI_Factory.registerBuilder('select', (f) => global.UI_Factory.buildSelect(f));
        global.UI_Factory.registerBuilder('dynamic_list', (f, e, d) => global.UI_Factory.buildDynamicList(f, d));
        global.UI_Factory.registerBuilder('lookup', (f) => global.UI_Factory.buildLookup(f));
        global.UI_Factory.registerBuilder('chip-input', (f) => global.UI_Factory.buildChipInput(f));

        // --- Specialized Builders Registration ---
        global.UI_Factory.registerBuilder('relation', function(field, entityName, data, localEventBus, currentEditId) {
            const inputEl = document.createElement('div');
            inputEl.setAttribute('data-relation-type', field.relationType || 'relacionado');
            inputEl.style.width = '100%';
            inputEl.style.marginBottom = 'var(--spacing-2)';
            
            const liveData = (window.__APP_CACHE__ && window.__APP_CACHE__[field.targetEntity]) ? window.__APP_CACHE__[field.targetEntity] : [];
            const activeData = liveData.filter(d => d.estado !== 'Eliminado' && typeof d === 'object');
            
            let initialValues = [];
            
            // UAT Point 3: Auto-populate existing relation records using Zero-Latency Graph resolution
            if (field.isTemporalGraph && field.graphEntity && window.__APP_CACHE__ && window.__APP_CACHE__[field.graphEntity]) {
                const currentPK = data ? (data.id_dominio || data.id_registro) : null;
                if (currentPK) {
                    const aristas = window.__APP_CACHE__[field.graphEntity].filter(e => e.es_version_actual !== false);
                    if (field.relationType === 'padre') {
                        initialValues = aristas.filter(e => window.UI_FormUtils.normalizeId(e.id_nodo_hijo) === window.UI_FormUtils.normalizeId(currentPK)).map(e => window.UI_FormUtils.normalizeId(e.id_nodo_padre));
                    } else if (field.relationType === 'hijo') {
                        initialValues = aristas.filter(e => window.UI_FormUtils.normalizeId(e.id_nodo_padre) === window.UI_FormUtils.normalizeId(currentPK)).map(e => window.UI_FormUtils.normalizeId(e.id_nodo_hijo));
                    }
                }
            } else if (data && data[field.name]) {
                try {
                    initialValues = Array.isArray(data[field.name]) ? data[field.name] : JSON.parse(data[field.name]);
                } catch(e) { initialValues = (typeof data[field.name] === 'string') ? [data[field.name]] : []; } // fallback
            }

            if (field.uiComponent === 'searchable_multi') {
                const multiNodes = global.UI_Factory.buildSearchableMulti(field, activeData, initialValues, localEventBus);
                inputEl.appendChild(multiNodes);
            } else if (field.uiComponent === 'select_single') {
                const basicSel = document.createElement('ion-select');
                basicSel.setAttribute('interface', window.innerWidth < 768 ? 'action-sheet' : 'popover');
                basicSel.setAttribute('name', field.name);
                basicSel.setAttribute('label', field.label);
                basicSel.setAttribute('label-placement', 'stacked');
                basicSel.setAttribute('fill', 'outline');
                basicSel.style.marginBottom = 'var(--spacing-3)';

                const emptyOpt = document.createElement('ion-select-option');
                emptyOpt.value = "";
                emptyOpt.textContent = "— Sin asignar —";
                basicSel.appendChild(emptyOpt);

                if (initialValues.length > 0) basicSel.value = initialValues[0];
                
                let filteredActiveData = activeData;
                const rules = window.APP_SCHEMAS && window.APP_SCHEMAS[entityName] ? window.APP_SCHEMAS[entityName].topologyRules : null;
                const cLevel = Number(data ? (data.nivel_tipo || 1) : 1);
                
                if (rules) {
                    const uiStateInit = window.SubgridState ? 
                        window.SubgridState.evaluateFieldState(rules, cLevel, field.relationType) : 
                        { isDisabled: false, opacity: '1', placeholder: '— Sin asignar —' };
                    
                    if (uiStateInit.isDisabled) basicSel.setAttribute('disabled', 'true');
                    basicSel.style.opacity = uiStateInit.opacity;
                    emptyOpt.textContent = uiStateInit.placeholder;

                    if (rules.levelFiltering === true && rules.strictLevelJumps === true && field.relationType === 'padre') {
                        filteredActiveData = activeData.filter(d => Number(d.nivel_tipo) === cLevel - 1);
                    }
                    if (rules.rootRequiresNoParent === true && cLevel === 1 && field.relationType === 'padre') {
                        filteredActiveData = []; 
                    }
                }
                
                global.UI_Factory.populateSelectOptions(basicSel, filteredActiveData, field);
                global.UI_Factory.bindLevelChangeRepaint(basicSel, activeData, field, emptyOpt, localEventBus);

                if (field.isTemporalGraph && field.relationType === 'padre') {
                    let originalVal = initialValues.length > 0 ? initialValues[0] : "";
                    basicSel.addEventListener('ionChange', async (ev) => {
                        const newVal = ev.detail.value;
                        const isNewContext = { currentEditId: currentEditId, data: data };
                        const isNewRecord = window.SubgridState ? window.SubgridState.isNewRecord(isNewContext) : (!currentEditId && (!data || !data.id_registro));
                        if (!isNewRecord && originalVal && originalVal !== "" && newVal !== originalVal) {
                            const alert = document.createElement('ion-alert');
                            alert.header = 'Cambio de Jerarquía Detectado';
                            alert.message = 'Estás reasignando el nodo padre. Si guardas este cambio, toda la rama se trasladará a la nueva ubicación. ¿Estás seguro de continuar?';
                            alert.buttons = [
                                { text: 'Cancelar', role: 'cancel', handler: () => basicSel.value = originalVal },
                                { text: 'Sí, reubicar rama', handler: () => originalVal = newVal }
                            ];
                            document.body.appendChild(alert);
                            await alert.present();
                        } else if (!originalVal || originalVal === "") {
                            originalVal = newVal;
                        }
                    });
                }
                inputEl.appendChild(basicSel);
            }
            return inputEl;
        });

        // ==========================================
        // [S16.4] THE DISMANTLED ROUTER
        // ==========================================
        global.UI_Factory.buildFieldNode = function(field, entityName, data, localEventBus, currentEditId) {
            try {
                const builder = global.UI_Factory.BuilderRegistry[field.type] || global.UI_Factory.BuilderRegistry['text'];
                return builder(field, entityName, data, localEventBus, currentEditId);
            } catch (err) {
                console.error("[UI_Factory] Error construyendo FieldNode para:", field.name, err);
                const errDiv = document.createElement('div');
                const errText = document.createElement('ion-text');
                errText.setAttribute('color', 'danger');
                const errSmall = document.createElement('small');
                errSmall.textContent = `⚠ Error UI: ${field.name}`;
                errText.appendChild(errSmall);
                errDiv.appendChild(errText);
                return errDiv;
            }
        };

    })(window);
</script>

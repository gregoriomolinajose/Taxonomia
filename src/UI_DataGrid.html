<script>
    /* ============================================================
       UI_DataGrid.html — Factoría Visual de Tablas y Cuadrículas
       Incluido via GAS: <?!= include('UI_DataGrid'); ?>
       
       Módulo Puro: Sólo recibe datos de estado (config) y devuelve HTML.
       ============================================================ */

    window.UI_DataGrid = {
        
        /* ── Constantes Estéticas ── */
        HIDDEN_BY_DEFAULT: ['created_at', 'updated_by'],
        STATUS_FIELDS: ['estado', 'nivel_criticalidad', 'modelo_negocio'],

        /* ── Punto de Entrada Central de la Factoría ── */
        buildLayout: function(config) {
            this.cfg = config; // { view, entityName, filteredData, page, pageSize, sortCol, sortDir, columns }
            
            if (config.loading) return this._renderSkeleton();
            if (config.error) return this._renderErrorState(config.error);
            if (!config.filteredData || config.filteredData.length === 0) return this._renderEmpty();

            if (config.view === 'table') {
                return this._renderTableView();
            } else if (config.view === 'grid') {
                return this._renderGridView();
            }
            return this._renderEmpty();
        },

        /* ── Renderers Estructurales ── */
        _renderSkeleton: function() {
            let rows = '';
            for (let i = 0; i < 5; i++) {
                const widths = [80, 160, 120, 100, 90];
                const cells = widths.map(w => `<div class="dv-skeleton-cell" style="width:${w}px;"></div>`).join('');
                rows += `<div class="dv-skeleton-row">${cells}</div>`;
            }
            return `<div class="dv-card dv-card-skel">${rows}</div>`;
        },

        _renderErrorState: function(error) {
            return `
                <div class="dv-card">
                    <div class="dv-empty">
                        <div class="dv-empty-icon">⚠️</div>
                        <h3 class="dv-error-title">No pudimos cargar la información.</h3>
                        <p>Por favor, refresca la página para intentar de nuevo.</p>
                        <p class="dv-error-desc">(Detalle: ${error ? error.message : 'Error de red'})</p>
                    </div>
                </div>`;
        },

        _renderEmpty: function() {
            return `
                <div class="dv-card">
                    <div class="dv-empty">
                        <div class="dv-empty-icon">
                            <ion-icon class="dv-folder-icon" name="folder-open-outline"></ion-icon>
                        </div>
                        <h3>Sin resultados</h3>
                        <p>No se encontraron registros. Prueba con otros términos de búsqueda o crea un nuevo registro.</p>
                    </div>
                </div>`;
        },

        _renderTableView: function() {
            const visibleCols = this.cfg.columns.filter(c => c.visible);
            const rows = this._getPageData();
            
            if (visibleCols.length === 0 || rows.length === 0) return this._renderEmpty();

            const thead = visibleCols.map(col => {
                const colIdx = this.cfg.columns.indexOf(col);
                const isSorted = this.cfg.sortCol === col.key;
                const arrow = isSorted
                    ? `<span class="dv-sort-icon active">${this.cfg.sortDir === 'asc' ? '↑' : '↓'}</span>`
                    : `<span class="dv-sort-icon">↕</span>`;
                
                return `
                    <th class="${isSorted ? 'sorted' : ''}" data-colidx="${colIdx}" 
                        draggable="true" 
                        onclick="${this.cfg.onSort ? `${this.cfg.onSort}('${col.key}')` : ''}" 
                        ondragstart="${this.cfg.onDragStart ? `${this.cfg.onDragStart}(${colIdx}, event)` : ''}" 
                        ondragover="${this.cfg.onDragOver ? `${this.cfg.onDragOver}(${colIdx}, event)` : ''}" 
                        ondragleave="${this.cfg.onDragLeave ? `${this.cfg.onDragLeave}(event)` : ''}" 
                        ondrop="${this.cfg.onDrop ? `${this.cfg.onDrop}(${colIdx}, event)` : ''}" 
                        ondragend="${this.cfg.onDragEnd ? `${this.cfg.onDragEnd}(event)` : ''}">
                        ${col.label} ${arrow} <span class="dv-drag-handle" title="Arrastra para reordenar">⣿</span>
                    </th>`;
            }).join('');

            return `
                <div class="dv-card">
                    <div class="dv-table-wrap">
                        <table class="dv-table">
                            <thead>
                                <tr>
                                    <th class="dv-th-num">#</th>
                                    ${thead}
                                    <th class="dv-th-action"></th>
                                </tr>
                            </thead>
                            <tbody>${this._renderTableBody(rows, visibleCols)}</tbody>
                        </table>
                    </div>
                    ${this._renderPaginationHTML()}
                </div>`;
        },

        _renderTableBody: function(rows, visibleCols) {
            const startIdx = (this.cfg.page - 1) * this.cfg.pageSize;
            
            return rows.map((row, idx) => {
                const rowNum = startIdx + idx + 1;
                const indexCell = `<td class="dv-td-num">${rowNum}</td>`;

                const cells = visibleCols.map(col => {
                    const val = typeof row[col.key] !== "undefined" ? String(row[col.key]) : '';
                    return `<td title="${val}">${this._formatValue(col.key, row[col.key])}</td>`;
                }).join('');

                const meta = (window.ENTITY_META && window.ENTITY_META[this.cfg.entityName]) || { idField: 'id' };
                const id = row[meta.idField] || '';
                const actionCell = `
                    <td class="dv-td-action">
                        <button class="dv-btn-icon dv-btn-danger" onclick="event.stopPropagation(); ${this.cfg.onDelete ? `${this.cfg.onDelete}('${id}')` : ''}" title="Eliminar">
                            <ion-icon name="trash"></ion-icon>
                        </button>
                    </td>`;

                return `<tr>${indexCell}${cells}${actionCell}</tr>`;
            }).join('');
        },

        _renderGridView: function() {
            const rows = this._getPageData();
            if (rows.length === 0) return this._renderEmpty();

            const meta = (window.ENTITY_META && window.ENTITY_META[this.cfg.entityName]) || { titleField: 'nombre', idField: 'id', fkField: null };
            const MAX_ATTRS = 5;

            const cols = rows.map(row => {
                const title = row[meta.titleField] || row[meta.idField] || '—';
                const id = row[meta.idField] || '';

                const fkChip = meta.fkField && row[meta.fkField.key]
                    ? `<ion-badge class="dv-fk-badge">🔗 ${meta.fkField.label}: ${row[meta.fkField.key]}</ion-badge>`
                    : '';

                const attrKeys = Object.keys(row).filter(k => {
                    return k !== meta.titleField && k !== meta.idField &&
                           !(meta.fkField && k === meta.fkField.key) &&
                           !this.HIDDEN_BY_DEFAULT.includes(k);
                }).slice(0, MAX_ATTRS);

                const attrs = attrKeys.map(k => `
                    <div class="dv-card-item-attr">
                        <span class="dv-card-item-attr-key">${this._labelFromKey(k)}</span>
                        <span class="dv-card-item-attr-val">${this._formatValue(k, row[k])}</span>
                    </div>`).join('');

                return `
                    <ion-col size="12" size-sm="6" size-md="4" size-xl="3" class="dv-grid-col">
                        <ion-card class="dv-ion-card">
                            <ion-card-header class="dv-card-header-flex">
                                <div>
                                    <ion-card-subtitle onclick="${this.cfg.onEdit ? `${this.cfg.onEdit}('${id.replace(/'/g, "\\'")}')` : ''}" class="dv-code-link">${id}</ion-card-subtitle>
                                    <ion-card-title class="dv-card-title-clamp" title="${title}">${title}</ion-card-title>
                                </div>
                                <button class="dv-btn-icon dv-btn-danger-lite" onclick="event.stopPropagation(); ${this.cfg.onDelete ? `${this.cfg.onDelete}('${id}')` : ''}" title="Eliminar">
                                    <ion-icon name="trash"></ion-icon>
                                </button>
                            </ion-card-header>
                            <ion-card-content>
                                <div class="dv-card-item-attrs">${attrs}</div>
                                ${fkChip}
                            </ion-card-content>
                        </ion-card>
                    </ion-col>`;
            }).join('');

            return `
                <ion-grid class="dv-ionic-grid"><ion-row>${cols}</ion-row></ion-grid>
                <div class="dv-card-footer">${this._renderPaginationHTML()}</div>`;
        },

        _renderPaginationHTML: function() {
            const total = this.cfg.filteredData.length;
            const start = total === 0 ? 0 : (this.cfg.page - 1) * this.cfg.pageSize + 1;
            const end = Math.min(this.cfg.page * this.cfg.pageSize, total);
            const tPages = Math.max(1, Math.ceil(total / this.cfg.pageSize));
            
            const sizes = [10, 25, 50, 100].map(s => {
                return `<option value="${s}" ${s === this.cfg.pageSize ? 'selected' : ''}>${s}</option>`;
            }).join('');

            return `
                <div class="dv-pagination">
                    <div class="dv-flex-group">
                        <span class="dv-pagination-info">Mostrando <strong>${start}–${end}</strong> de <strong>${total}</strong></span>
                        <select class="dv-page-size-select" onchange="${this.cfg.onPageSize ? `${this.cfg.onPageSize}(this.value)` : ''}">${sizes}</select>
                    </div>
                    <div class="dv-pagination-controls">
                        <button class="dv-page-btn" title="Primera" onclick="${this.cfg.onPage ? `${this.cfg.onPage}(1)` : ''}" ${this.cfg.page === 1 ? 'disabled' : ''}>«</button>
                        <button class="dv-page-btn" title="Anterior" onclick="${this.cfg.onPage ? `${this.cfg.onPage}(${this.cfg.page - 1})` : ''}" ${this.cfg.page === 1 ? 'disabled' : ''}>‹</button>
                        <span class="dv-page-info">Pág. ${this.cfg.page} / ${tPages}</span>
                        <button class="dv-page-btn" title="Siguiente" onclick="${this.cfg.onPage ? `${this.cfg.onPage}(${this.cfg.page + 1})` : ''}" ${this.cfg.page >= tPages ? 'disabled' : ''}>›</button>
                        <button class="dv-page-btn" title="Última" onclick="${this.cfg.onPage ? `${this.cfg.onPage}(${tPages})` : ''}" ${this.cfg.page >= tPages ? 'disabled' : ''}>»</button>
                    </div>
                </div>`;
        },

        /* ── Helpers y Formateadores (Extirpados de DataView_UI) ── */
        _getPageData: function() {
            const start = (this.cfg.page - 1) * this.cfg.pageSize;
            return this.cfg.filteredData.slice(start, start + this.cfg.pageSize);
        },

        _slugify: function(str) {
            return (str || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        },

        _badgeClass: function(value) {
            const slug = this._slugify(String(value));
            const map = (window.APP_SCHEMAS && window.APP_SCHEMAS._UI_CONFIG && window.APP_SCHEMAS._UI_CONFIG.badgeMap) || {};
            return `dv-badge dv-badge-${map[slug] || 'default'}`;
        },

        _formatValue: function(key, value) {
            if (value === null || value === undefined || value === '') return `<span class="dv-empty-text">—</span>`;

            if (Array.isArray(value)) {
                if (value.length === 0) return `<span class="dv-empty-text">—</span>`;
                const labels = value.map(item => {
                    if (typeof item === 'object' && item !== null) {
                        return item.nombre || item.name || item.label || item.nombre_producto
                            || Object.values(item).find(v => typeof v === 'string' && !String(v).startsWith('id_') && v.length > 0)
                            || '—';
                    }
                    return String(item);
                });
                return labels.map(l => `<span class="dv-chip">${l}</span>`).join(' ');
            }

            const strVal = String(value);
            let isPrimaryKey = false;

            if (this.cfg && this.cfg.entityName && window.APP_SCHEMAS) {
                const schemaDef = window.APP_SCHEMAS[this.cfg.entityName];
                let fieldsArray = [];
                if (schemaDef) {
                    if (Array.isArray(schemaDef)) fieldsArray = schemaDef;
                    else if (schemaDef.fields) fieldsArray = schemaDef.fields;
                    else fieldsArray = Object.keys(schemaDef).map(k => Object.assign({ name: k }, schemaDef[k]));
                    
                    const f = fieldsArray.find(field => field.name === key);
                    if (f && f.primaryKey) isPrimaryKey = true;
                }
            }

            if (isPrimaryKey) {
                // Return link format - notice we escape the quotes
                return `<code class="dv-pk-code" onclick="${this.cfg && this.cfg.onEdit ? `${this.cfg.onEdit}('${strVal.replace(/'/g, "\\'")}')` : ''}">${strVal}</code>`;
            }

            if (window._LOOKUP_DATA && window._LOOKUP_DATA[key]) {
                const lookupArr = window._LOOKUP_DATA[key];
                const found = lookupArr.find(opt => String(opt.value) === strVal);
                if (found) return found.label;
            }

            if (this.STATUS_FIELDS.includes(key)) {
                return `<span class="${this._badgeClass(strVal)}">${strVal}</span>`;
            }
            if (key === 'presupuesto' || key === 'slo_objetivo') {
                const num = parseFloat(strVal);
                if (!isNaN(num)) return key === 'presupuesto' ? `$${num.toLocaleString('es-MX')}` : `${num}%`;
            }

            return strVal.length > 60 ? `${strVal.substring(0, 58)}…` : strVal;
        },

        _normalizeFields: function(entityName) {
            const schemaDef = window.APP_SCHEMAS && window.APP_SCHEMAS[entityName];
            if (!schemaDef) return null;
            if (Array.isArray(schemaDef)) return schemaDef;
            if (schemaDef.fields) return schemaDef.fields;
            return Object.keys(schemaDef).map(k => Object.assign({ name: k }, schemaDef[k]));
        },

        _labelFromKey: function(key, entityName) {
            const ent = entityName || (this.cfg && this.cfg.entityName);
            const fields = this._normalizeFields(ent);
            if (fields) {
                const field = fields.find(f => f.name === key);
                if (field && field.label) return field.label;
            }
            return window.formatLabelString ? window.formatLabelString(key) : key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }
    };
</script>

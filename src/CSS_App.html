<style>
  /* ═══════════════════════════════════════════════════════
     CSS_App.html — Motor Estructural (Regla UI §14)
     EXCLUSIVO: Sidebar 3-State, Grid, Bento Box, UI Components
     Z-INDEX GOVERNANCE (Regla UI §14.2):
       10   → Sticky Footers
       50   → Sidebar Overlay móvil
       100  → Modales
       9999 → Toasts y Loaders
     Inyectado via: <?!= include('CSS_App'); ?>
  ═══════════════════════════════════════════════════════ */

  /* SIDEBAR 3-STATE — Regla UI §13 */
  @media (min-width: 992px) {
    .shell-mini ion-menu[side="start"] {
      --width:     var(--sidebar-width-mini) !important;
      --min-width: var(--sidebar-width-mini) !important;
      --max-width: var(--sidebar-width-mini) !important;
      min-width:   var(--sidebar-width-mini) !important;
      max-width:   var(--sidebar-width-mini) !important;
      width:       var(--sidebar-width-mini) !important;
    }
    .shell-mini .nav-item ion-label,
    .shell-mini .nav-item span:not(.nav-tooltip) { display: none !important; }
    .shell-mini .sidebar-app-title { display: none !important; }
  }

  @media (min-width: 992px) {
    ion-split-pane { --side-width: 240px; }
    ion-split-pane.shell-mini { --side-width: 72px; }
    ion-split-pane.shell-mini ion-menu {
      --width:   72px !important;
      min-width: 72px !important;
      max-width: 72px !important;
    }
    .shell-mini .nav-item span:not(.nav-tooltip),
    .shell-mini .nav-item ion-label { display: none !important; }
    ion-split-pane.shell-hidden { --side-width: 0px; }
    .shell-hidden ion-menu[side="start"] { display: none !important; }
  }

  /* Nav item base */
  .nav-item {
    width: calc(100% - 32px); height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: flex-start;
    padding: 0 16px; gap: 16px; cursor: pointer;
    margin: 4px auto;
    transition: background 0.18s, width 0.25s, padding 0.25s;
    color: var(--sidebar-icon-color); flex-direction: row;
  }
  .nav-item:hover  { background: var(--sidebar-item-hover); color: var(--ion-text-color); }
  .nav-item.active { background: rgba(108,99,255,0.18); color: var(--sidebar-icon-active); }
  .nav-item ion-icon { font-size: 22px; flex-shrink: 0; }
  .nav-item ion-label, .nav-item span:not(.nav-tooltip) {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem;
  }

  @media (min-width: 992px) {
    .shell-mini .nav-item {
      width: 48px !important; height: 48px !important; padding: 4px 0 !important;
      justify-content: center !important; flex-direction: column !important;
      gap: 2px !important; overflow: hidden !important;
    }
    .shell-mini .nav-item ion-label,
    .shell-mini .nav-item span:not(.nav-tooltip) {
      font-size: 0.65rem !important; text-align: center !important;
      white-space: nowrap !important; overflow: hidden !important;
      text-overflow: ellipsis !important; width: 100% !important; display: block !important;
    }
  }

  .sidebar-brand-container {
    display: flex; align-items: center; gap: 12px;
    padding: 16px; margin-top: 8px; transition: all 0.25s ease;
  }
  .sidebar-logo-box {
    width: 48px; height: 48px; background: var(--ion-color-primary);
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; transition: all 0.25s ease;
    flex-shrink: 0;
  }
  .sidebar-logo-box ion-icon { font-size: 24px; color: var(--ion-color-light, #fff); }
  .sidebar-app-title {
    font-size: 1rem; color: var(--ion-color-medium); font-weight: 600;
    transition: opacity 0.25s ease; white-space: nowrap; overflow: hidden;
  }
  @media (min-width: 992px) {
    .shell-mini .sidebar-brand-container { padding: 16px 0; justify-content: center; }
    .shell-mini .sidebar-logo-box { width: 40px !important; height: 40px !important; }
    .shell-mini .sidebar-app-title { display: none !important; }
  }
  .sidebar-divider { width: 32px; height: 1px; background: var(--sidebar-border); margin: 8px auto; }
  .nav-spacer { flex: 1; }

  /* Sidebar Heading metamorfico */
  .sidebar-heading { width: calc(100% - 32px); margin: 16px auto 8px; padding: 0 16px; transition: all 0.25s; }
  .sidebar-heading span { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ion-color-medium); white-space: nowrap; }
  @media (min-width: 992px) {
    .shell-mini .sidebar-heading { width: 32px !important; height: 1px !important; background: rgba(0,0,0,0.1) !important; padding: 0 !important; margin: 12px auto !important; }
    .shell-mini .sidebar-heading span { display: none !important; }
  }

  /* Build tracker */
  .build-tracker { padding: 8px 16px 8px; border-top: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; gap: 2px; transition: all 0.25s; }
  .build-tracker .build-version { font-size: 0.7rem; font-weight: 600; color: var(--ion-color-medium); white-space: nowrap; }
  .build-tracker .build-hash { font-size: 0.62rem; color: rgba(100,116,139,0.6); white-space: nowrap; font-family: monospace; }
  @media (min-width: 992px) {
    .shell-mini .build-tracker { padding: 8px 0; border-top: none; align-items: center; }
    .shell-mini .build-tracker .build-version,
    .shell-mini .build-tracker .build-hash { display: none !important; }
  }

  /* Grid responsivo */
  ion-grid { --ion-grid-padding: 12px; --ion-grid-column-padding: 4px; padding: var(--ion-grid-padding); max-width: 100%; }
  ion-grid ion-col { padding: var(--ion-grid-column-padding); }
  @media (min-width: 768px)  { ion-grid { --ion-grid-padding: 24px; --ion-grid-column-padding: 8px; } }
  @media (min-width: 1280px) { ion-grid { --ion-grid-padding: 32px; --ion-grid-column-padding: 12px; max-width: 1280px; margin: 0 auto; } }
  @media (min-width: 1536px) { ion-grid { max-width: 1536px; } }

  /* Bento Box */
  ion-grid.bento ion-card { margin: 0 !important; height: 100%; width: 100%; box-shadow: var(--shadow-default) !important; transition: box-shadow 0.2s; }
  ion-grid.bento ion-card:hover { box-shadow: var(--shadow-hover) !important; }

  /* Stat cards */
  .stat-inner  { display: flex; flex-direction: column; gap: 8px; padding: 4px 0; }
  .stat-value  { font-size: 2rem; font-weight: 700; line-height: 1; }
  .stat-delta  { font-size: 0.75rem; font-weight: 500; padding: 2px 8px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; width: fit-content; }
  .delta-up    { background: rgba(16,185,129,0.15); color: #34D399; }
  .delta-down  { background: rgba(239,68,68,0.15);  color: #F87171; }

  /* Spark bars */
  .spark-bars  { display: flex; align-items: flex-end; gap: 4px; height: 40px; margin-top: 8px; }
  .spark-bar   { flex: 1; border-radius: 3px 3px 0 0; background: rgba(108,99,255,0.3); }
  .spark-bar.hi{ background: var(--ion-color-primary); }

  /* Activity feed */
  .activity-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .activity-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Progress bars */
  .prog-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .prog-label { font-size: 0.78rem; color: var(--ion-color-medium); flex: 1; }
  .prog-track { flex: 3; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .prog-fill  { height: 100%; border-radius: 3px; }
  .prog-pct   { font-size: 0.75rem; color: var(--ion-text-color); min-width: 30px; text-align: right; }

  /* Avatar cluster */
  .avatar-cluster { display: flex; }
  .avatar-chip { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--ion-card-background); margin-left: -8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; }
  .avatar-chip:first-child { margin-left: 0; }

  /* Section title */
  .section-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ion-color-medium); padding: 24px 4px 12px; }

  /* Wizard */
  .wizard-step-panel        { display: none; }
  .wizard-step-panel.active { display: block; }
  .wizard-step-panel ion-col { padding-bottom: 16px; }

  /* Toast — z-index: 9999 (maxima prioridad — Regla UI §14.2) */
  .sim-toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1E293B; border: 1px solid rgba(108,99,255,0.3);
    border-radius: 12px; padding: 14px 24px;
    display: flex; align-items: center; gap: 10px;
    z-index: 9999; font-size: 0.875rem; color: var(--ion-text-color);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .sim-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }

  /* ── Extraído de Index.html (Regla UI §14) ── */
  body { margin: 0; padding: 0; }
  ion-menu { --ion-background-color: var(--color-bg-body); border-right: 1px solid var(--color-border); }
  .header-bg { background-color: var(--color-bg-body); border-bottom: 1px solid var(--color-border); }
  ion-toolbar.header-bg { --background: var(--color-bg-body); --color: var(--color-text); }
  @media (max-width: 991px) { .hide-on-mobile  { display: none !important; } }
  @media (min-width: 992px) { .hide-on-desktop { display: none !important; } }
  /* Eliminado: .build-version legado (ahora .build-tracker maneja footer state) */
</style>

<style>
  /* ═══════════════════════════════════════════════════════
     CSS_DesignSystem.html — Motor de Diseño (Regla UI §14)
     EXCLUSIVO: Brand Tokens, Alias Tokens Ionic, Tipografía Fluida
     PROHIBIDO: clases estructurales, lógica de layout o sidebar
     Inyectado via: <?!= include('CSS_DesignSystem'); ?>
  ═══════════════════════════════════════════════════════ */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    /* NIVEL 1: BRAND TOKENS */
    --color-interactive-primary:        #1C42E8;
    --color-interactive-primary-hover:  #081754;
    --color-interactive-primary-press:  #05297A;
    --color-interactive-secondary:      #F3F3F3;
    --color-interactive-secondary-hover:#C9C9C9;
    --color-interactive-secondary-press:#DEDEDE;
    --color-interactive-error:          #FF594D;
    --color-interactive-error-hover:    #A26267;
    --color-interactive-error-press:    #C8180D;

    --color-text:           #081754;
    --color-text-soft:      #A4A4A4;
    --color-text-inactive:  #8C8C8C;
    --color-text-invert:    #FFFFFF;
    --color-text-error:     #C8180D;
    --color-text-warning:   #CF4600;
    --color-text-success:   #2E8A41;
    --color-text-info:      #0062A5;

    --color-bg-0:           #F3F3F3;
    --color-bg-body:        #FFFFFF;
    --color-bg-dark:        #4A4A4A;
    --color-bg-error:       #FF594D;
    --color-bg-success:     #0ABF4F;
    --color-bg-warning:     #FFAE43;
    --color-bg-info:        #1CA8F7;
    --color-bg-inactive:    #DEDEDE;

    --color-icon:           #081754;
    --color-icon-soft:      #4A4A4A;
    --color-icon-inactive:  #8C8C8C;
    --color-icon-invert:    #FFFFFF;
    --color-icon-error:     #FF594D;
    --color-icon-success:   #0ABF4F;
    --color-icon-warning:   #FFAE43;
    --color-icon-info:      #1CA8F7;

    --color-border:         #C9C9C9;
    --color-border-error:   #FF594D;
    --color-border-success: #0ABF4F;
    --color-border-warning: #FFAE43;
    --color-border-info:    #1CA8F7;

    --color-brand-coppel:    #F0D224;
    --color-brand-bancoppel: #05297A;
    --color-brand-sales:     #C8180D;

    --rounded-none: 0px;
    --rounded-sm:   8px;
    --rounded-md:   16px;
    --rounded-full: 999px;

    --spacing-0:  0px;  --spacing-1:  4px;  --spacing-2:  8px;
    --spacing-3:  12px; --spacing-4:  16px; --spacing-5:  20px;
    --spacing-6:  24px; --spacing-7:  32px; --spacing-8:  40px;
    --spacing-9:  48px; --spacing-10: 56px;

    --shadow-default:  0px 6px 24px 0px rgba(25,75,123,0.04);
    --shadow-hover:    0px 6px 24px 0px rgba(25,75,123,0.12);
    --shadow-primary:  0px 6px 24px 0px rgba(25,75,123,0.18);
    --shadow-floating: 0px 4px 16px rgba(25,75,123,0.24),0px 6px 24px rgba(25,75,123,0.16);

    /* NIVEL 2: ALIAS TOKENS IONIC */
    --ion-color-primary:           var(--color-interactive-primary);
    --ion-color-primary-rgb:       28,66,232;
    --ion-color-primary-contrast:  var(--color-text-invert);
    --ion-color-primary-shade:     var(--color-interactive-primary-hover);
    --ion-color-primary-tint:      var(--color-interactive-primary-press);

    --ion-color-secondary:         var(--color-interactive-secondary);
    --ion-color-secondary-rgb:     243,243,243;
    --ion-color-secondary-contrast: var(--color-text);
    --ion-color-secondary-shade:   var(--color-interactive-secondary-hover);
    --ion-color-secondary-tint:    var(--color-interactive-secondary-press);

    --ion-color-danger:            var(--color-interactive-error);
    --ion-color-danger-rgb:        255,89,77;
    --ion-color-danger-contrast:   var(--color-text-invert);
    --ion-color-danger-shade:      var(--color-interactive-error-hover);
    --ion-color-danger-tint:       var(--color-interactive-error-press);

    --ion-color-success:           var(--color-bg-success);
    --ion-color-success-rgb:       10,191,79;
    --ion-color-success-contrast:  var(--color-text-invert);

    --ion-color-warning:           var(--color-bg-warning);
    --ion-color-warning-rgb:       255,174,67;
    --ion-color-warning-contrast:  var(--color-text);

    --ion-color-tertiary:          var(--color-bg-info);
    --ion-color-tertiary-rgb:      28,168,247;
    --ion-color-tertiary-contrast: var(--color-text-invert);

    --ion-background-color:       var(--color-bg-body);
    --ion-background-color-rgb:   255,255,255;
    --ion-card-background:        var(--color-bg-0);
    --ion-item-background:        var(--color-bg-body);
    --ion-text-color:             var(--color-text);
    --ion-text-color-rgb:         8,23,84;
    --ion-color-medium:           var(--color-text-inactive);
    --ion-color-medium-rgb:       140,140,140;
    --ion-card-border-radius:     var(--rounded-md);
    --ion-item-border-radius:     var(--rounded-sm);

    --ion-toolbar-background:     var(--color-interactive-primary);
    --ion-tab-bar-background:     var(--color-bg-0);
    --ion-color-light:            var(--color-bg-0);
    --ion-color-dark:             var(--color-text);
    --ion-font-family:            'DM Sans','Segoe UI',sans-serif;

    /* Font Scale */
    --font-size-display: 40px; --font-size-display-mobile: 32px;
    --font-size-h1:      32px; --font-size-h1-mobile:     26px;
    --font-size-h2:      24px; --font-size-h2-mobile:     20px;
    --font-size-h3:      20px; --font-size-h3-mobile:     18px;
    --font-size-subheader: 16px; --font-size-subheader-mobile: 15px;
    --font-size-body:    14px; --font-size-small:         12px;
    --font-size-caption: 11px; --font-size-caption-mini:  10px;

    /* Sidebar Blueprint — Regla UI §13 */
    --sidebar-width-mini:  72px;
    --sidebar-bg:          var(--color-bg-body);
    --sidebar-icon-color:  var(--color-icon-inactive);
    --sidebar-icon-active: var(--color-interactive-primary);
    --sidebar-item-hover:  rgba(28,66,232,0.08);
    --sidebar-border:      var(--color-border);
    --bento-gap:           var(--spacing-4);
  }

  /* TIPOGRAFIA FLUIDA — Mobile First */
  :root {
    --sys-font-display:   var(--font-size-display-mobile);
    --sys-font-h1:        var(--font-size-h1-mobile);
    --sys-font-h2:        var(--font-size-h2-mobile);
    --sys-font-h3:        var(--font-size-h3-mobile);
    --sys-font-subheader: var(--font-size-subheader-mobile);
    --sys-font-body:      var(--font-size-body);
    --sys-font-small:     var(--font-size-small);
    --sys-font-caption:   var(--font-size-caption);
    --sys-font-mini:      var(--font-size-caption-mini);
  }
  @media (min-width: 768px) {
    :root {
      --sys-font-display:   var(--font-size-display);
      --sys-font-h1:        var(--font-size-h1);
      --sys-font-h2:        var(--font-size-h2);
      --sys-font-h3:        var(--font-size-h3);
      --sys-font-subheader: var(--font-size-subheader);
    }
  }

  html, body, ion-app { height: 100%; font-family: var(--ion-font-family); }
  body, ion-app, ion-content { font-size: var(--sys-font-body); color: var(--ion-text-color); }
  ion-content { --background: var(--ion-background-color); }

  .text-display { font-size: var(--sys-font-display); line-height: 1.1; font-weight: 700; }
  .text-h1      { font-size: var(--sys-font-h1);      line-height: 1.2; font-weight: 700; }
  .text-h2      { font-size: var(--sys-font-h2);      line-height: 1.25; font-weight: 600; }
  .text-h3      { font-size: var(--sys-font-h3);      line-height: 1.3; font-weight: 600; }
  .text-sub     { font-size: var(--sys-font-subheader); font-weight: 500; }
  .text-small   { font-size: var(--sys-font-small); }
  .text-caption { font-size: var(--sys-font-caption); }
  .text-mini    { font-size: var(--sys-font-mini); text-transform: uppercase; letter-spacing: 0.05em; }

  /* Modo Oscuro (Grises Originales - Especificidad Blindada) */
  body.dark {
    /* Variables Nativas Ionic */
    --ion-background-color:     #4A4A4A !important;
    --ion-background-color-rgb: 74,74,74 !important;
    --ion-card-background:      #333333 !important;
    --ion-item-background:      #333333 !important;
    --ion-toolbar-background:   #4A4A4A !important;
    --ion-tab-bar-background:   #333333 !important;
    --ion-text-color:           #FFFFFF !important;
    --ion-text-color-rgb:       255,255,255 !important;
    --ion-color-medium:         #C9C9C9 !important;
    --ion-color-medium-rgb:     201,201,201 !important;

    /* Variables Custom del Sistema y Sidebar */
    --color-bg-body:            #4A4A4A !important;
    --color-text:               #FFFFFF !important;
    --color-border:             rgba(255,255,255,0.1) !important;
    --sidebar-bg:               #333333 !important;
    --sidebar-icon-color:       #C9C9C9 !important;
    --sidebar-border:           rgba(255,255,255,0.1) !important;
  }
</style>

<style>
  /* 1. Purga del Scrollbar (ion-segment) */
  ion-segment::-webkit-scrollbar { display: none; }
  ion-segment { -ms-overflow-style: none; scrollbar-width: none; }

  .design-kit-card { margin-bottom: var(--spacing-4); }

  /* 2. Sticky Flow Pattern (Evitar Nested Content Doom) */
  .dk-sticky-tabs {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--color-bg-body);
    border-bottom: 1px solid var(--color-border);
  }

  /* 3. Breathing Room */
  .dk-tab-content {
    padding: var(--spacing-6) var(--spacing-2);
    display: none;
  }
  .dk-tab-content.active {
    display: block;
    animation: fade-in 0.3s ease;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* 4. Swatches de Color Inquebrantables */
  .color-swatch {
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-default);
    border: 1px solid var(--color-border);
    border-radius: var(--rounded-md);
    overflow: hidden;
    margin-bottom: var(--spacing-4);
  }
  .color-swatch-color {
    flex-grow: 1;
    min-height: 80px;
    width: 100%;
  }
  .color-swatch-info {
    background: var(--color-bg-body);
    padding: var(--spacing-2);
    text-align: center;
    border-top: 1px solid var(--color-border);
  }

  /* 5. Cajas de Radio Perfectas */
  .radius-box {
    width: 120px;
    height: 120px;
    background: var(--color-interactive-primary);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 6. Tarjetas de Sombra Reales */
  .shadow-card {
    width: 100%;
    max-width: 200px;
    height: 120px;
    background: var(--color-bg-body);
    border-radius: var(--rounded-md);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 7. Theme Control Card */
  .theme-control-item {
    --padding-start: var(--spacing-4);
    --inner-padding-end: var(--spacing-4);
  }
  .color-picker-wrapper {
    position: relative;
    width: 32px;
    height: 32px;
    border-radius: var(--rounded-full);
    overflow: hidden;
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-default);
    margin-right: var(--spacing-3);
  }
  .color-picker-input {
    position: absolute;
    top: -10px;
    left: -10px;
    width: 60px;
    height: 60px;
    opacity: 0;
    cursor: pointer;
  }
  .hex-display {
    font-family: monospace;
    color: var(--color-text-soft);
    font-size: 14px;
    margin-top: 4px;
  }
</style>

<script>
  window.switchDesignKitTab = function(event) {
    if (!event || !event.detail) return;
    var tabName = event.detail.value;
    var tabs = document.querySelectorAll('.dk-tab-content');
    tabs.forEach(function(tab) {
      tab.classList.remove('active');
    });
    var target = document.getElementById('dk-tab-' + tabName);
    if (target) {
      target.classList.add('active');
    }
  };

  window.openTestModal = function() {
    var modal = document.getElementById('enterpriseModalTest');
    if (modal) window.PresentSafe(modal);
  };

  // Helper: Hex to RGB Converter
  window.hexToRgb = function(hex) {
    var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? 
      parseInt(result[1], 16) + ', ' + parseInt(result[2], 16) + ', ' + parseInt(result[3], 16) 
      : null;
  };

  // Helper: Luminance Engine
  window.calculateContrast = function(hex) {
    var rgb = window.hexToRgb(hex);
    if (!rgb) return '#ffffff';
    var parts = rgb.split(',').map(Number);
    // Fórmula YIQ para brillo visual humano
    var yiq = ((parts[0] * 299) + (parts[1] * 587) + (parts[2] * 114)) / 1000;
    return (yiq >= 128) ? '#000000' : '#ffffff';
  };

  // Failsafe: Reset Theme Engine
  window.resetThemeEngine = function() {
    var mutators = document.querySelectorAll('.theme-mutator');
    mutators.forEach(function(mutator) {
      var cssVar = mutator.getAttribute('data-token');
      var ionBase = mutator.getAttribute('data-ion-token');
      
      document.documentElement.style.removeProperty(cssVar);
      if (ionBase) {
        document.documentElement.style.removeProperty('--ion-color-' + ionBase);
        document.documentElement.style.removeProperty('--ion-color-' + ionBase + '-rgb');
        document.documentElement.style.removeProperty('--ion-color-' + ionBase + '-contrast');
        document.documentElement.style.removeProperty('--ion-color-' + ionBase + '-contrast-rgb');
      }
    });
    // Re-initialize values to reflect original CSS
    window.initThemeMutators();
  };

  window.initThemeMutators = function() {
    var mutators = document.querySelectorAll('.theme-mutator');
    const rootStyle = getComputedStyle(document.documentElement);
    
    mutators.forEach(function(mutator) {
      var cssVar = mutator.getAttribute('data-token');
      var currentValue = rootStyle.getPropertyValue(cssVar).trim();
      
      // Update the input value and bg color
      if (currentValue && currentValue.startsWith('#')) {
        mutator.value = currentValue;
        var wrapper = mutator.parentElement;
        if (wrapper) wrapper.style.backgroundColor = currentValue;
        
        var hexDisplay = document.getElementById(mutator.id.replace('mutator', 'hex-display'));
        if (hexDisplay) hexDisplay.textContent = currentValue.toUpperCase();
      }
    });
  };

    window.mountDesignKit = function() {
    // 1. Inicializar selectores en vivo
    const selects = document.querySelectorAll('.smart-select-demo');
    const isDesktop = window.innerWidth >= 768;
    selects.forEach(select => {
      select.interface = isDesktop ? 'popover' : 'action-sheet';
    });

    // 2. Anclar el View Switcher Engine a ion-segment nativo
    const segment = document.getElementById('dk-segment');
    if (segment) {
      segment.addEventListener('ionChange', window.switchDesignKitTab);
    }

    // 3. Inicializar Dynamic Token Mutator
    window.initThemeMutators();
    
    // Anclar listeners de mutación
    document.querySelectorAll('.theme-mutator').forEach(function(mutator) {
      // Remover posible evento huérfano para evitar duplicados en SPA
      const newMutator = mutator.cloneNode(true);
      mutator.parentNode.replaceChild(newMutator, mutator);
      
      newMutator.addEventListener('input', function(e) {
        var newColor = e.target.value;
        var cssVar = newMutator.getAttribute('data-token');
        var ionBase = newMutator.getAttribute('data-ion-token');
        
        // Mute Global App Brand
        document.documentElement.style.setProperty(cssVar, newColor);
        
        // Mute Ionic Shadow DOM bindings (Solid + RGB + Contrast for ripples/opacities/text)
        if (ionBase) {
          document.documentElement.style.setProperty('--ion-color-' + ionBase, newColor);
          var rgb = window.hexToRgb(newColor);
          if (rgb) {
            document.documentElement.style.setProperty('--ion-color-' + ionBase + '-rgb', rgb);
          }
          var contrast = window.calculateContrast(newColor);
          document.documentElement.style.setProperty('--ion-color-' + ionBase + '-contrast', contrast);
          var contrastRgb = window.hexToRgb(contrast);
          if (contrastRgb) {
            document.documentElement.style.setProperty('--ion-color-' + ionBase + '-contrast-rgb', contrastRgb);
          }
        }
        
        // Update UI
        var wrapper = newMutator.parentElement;
        if (wrapper) wrapper.style.backgroundColor = newColor;
        var hexDisplay = document.getElementById(newMutator.id.replace('mutator', 'hex-display'));
        if (hexDisplay) hexDisplay.textContent = newColor.toUpperCase();
      });
    });

    // 4. White-Label Typography Panel Initialization
    try {
      const ctx = typeof window.__ABAC_CONTEXT__ === 'string' ? JSON.parse(window.__ABAC_CONTEXT__) : (window.__ABAC_CONTEXT__ || null);
      // Hardcode temporal bypass para que el config siempre se muestre a cualquiera con acceso a DesignKit
      var authLvl = "ALL (Admin Total)"; 
      
      if (authLvl.startsWith('ALL')) {
        const typographyAdmin = document.getElementById('typography-admin-panel');
        if (typographyAdmin) typographyAdmin.style.display = 'block';
        
        const select = document.getElementById('white-label-font-select');
        const labelsD = document.querySelectorAll('.font-display-label');
        const labelsB = document.querySelectorAll('.font-body-label');
        
        // Cargar Diccionario Tipográfico Dinámico (CRUD)
        if (select) {
           select.innerHTML = '<ion-select-option value="">Cargando catálogo...</ion-select-option>';
           google.script.run.withSuccessHandler(function(res) {
               select.innerHTML = '';
               
               // Catálogo por Defecto (Escala 8-Campos)
               let catalog = [
                   { nombre_pack: "Clásico (Poppins + Playfair)", font_body: "Poppins, sans-serif", font_sub: "Poppins, sans-serif", font_caption: "Poppins, sans-serif", font_mini: "Poppins, sans-serif", font_display: "Playfair Display, serif", font_h1: "Playfair Display, serif", font_h2: "Poppins, sans-serif", font_h3: "Poppins, sans-serif" },
                   { nombre_pack: "Moderno (Inter puro)", font_body: "Inter, sans-serif", font_sub: "Inter, sans-serif", font_caption: "Inter, sans-serif", font_mini: "Inter, sans-serif", font_display: "Inter, sans-serif", font_h1: "Inter, sans-serif", font_h2: "Inter, sans-serif", font_h3: "Inter, sans-serif" },
                   { nombre_pack: "Corporativo (Roboto + Montserrat)", font_body: "Roboto, sans-serif", font_sub: "Roboto, sans-serif", font_caption: "Roboto, sans-serif", font_mini: "Roboto, sans-serif", font_display: "Montserrat, sans-serif", font_h1: "Montserrat, sans-serif", font_h2: "Montserrat, sans-serif", font_h3: "Montserrat, sans-serif" },
                   { nombre_pack: "Vanguardista (Montserrat puro)", font_body: "Montserrat, sans-serif", font_sub: "Montserrat, sans-serif", font_caption: "Montserrat, sans-serif", font_mini: "Montserrat, sans-serif", font_display: "Montserrat, sans-serif", font_h1: "Montserrat, sans-serif", font_h2: "Montserrat, sans-serif", font_h3: "Montserrat, sans-serif" },
                   { nombre_pack: "Minimalista (Roboto puro)", font_body: "Roboto, sans-serif", font_sub: "Roboto, sans-serif", font_caption: "Roboto, sans-serif", font_mini: "Roboto, sans-serif", font_display: "Roboto, sans-serif", font_h1: "Roboto, sans-serif", font_h2: "Roboto, sans-serif", font_h3: "Roboto, sans-serif" }
               ];

               // Concatenar con los resultados del CRUD en la Base de Datos
               if (res && res.data && res.data.rows && res.data.rows.length > 0) {
                   catalog = catalog.concat(res.data.rows);
               }
               
               catalog.forEach(function(row) {
                   const opt = document.createElement('ion-select-option');
                   const valObj = {
                       font_body: row.font_body || row.body_font,
                       font_sub: row.font_sub || row.body_font,
                       font_caption: row.font_caption || row.body_font,
                       font_mini: row.font_mini || row.body_font,
                       font_display: row.font_display || row.display_font,
                       font_h1: row.font_h1 || row.display_font,
                       font_h2: row.font_h2 || row.display_font,
                       font_h3: row.font_h3 || row.display_font
                   };
                   opt.value = JSON.stringify(valObj);
                   opt.textContent = row.nombre_pack || 'Personalizada';
                   select.appendChild(opt);
               });
               
               // Initial binding
               if (window.WHITE_LABEL) {
                   select.value = JSON.stringify(window.WHITE_LABEL);
                   const w = window.WHITE_LABEL;
                   labelsD.forEach(el => el.textContent = w.font_display || w.displayFont);
                   labelsB.forEach(el => el.textContent = w.font_body || w.bodyFont);
               }
           }).API_Universal_Router('read', 'Config_Typography', {});
        }
        
        // Live preview on change
        if (select) {
          select.addEventListener('ionChange', function(e) {
              if(!e.detail.value) return;
              const val = JSON.parse(e.detail.value);
              document.documentElement.style.setProperty('--font-body', val.font_body);
              document.documentElement.style.setProperty('--font-sub', val.font_sub);
              document.documentElement.style.setProperty('--font-caption', val.font_caption);
              document.documentElement.style.setProperty('--font-mini', val.font_mini);
              document.documentElement.style.setProperty('--font-display', val.font_display);
              document.documentElement.style.setProperty('--font-h1', val.font_h1);
              document.documentElement.style.setProperty('--font-h2', val.font_h2);
              document.documentElement.style.setProperty('--font-h3', val.font_h3);
              labelsD.forEach(el => el.textContent = val.font_display);
              labelsB.forEach(el => el.textContent = val.font_body);
          });
        }
        
        // Save remote
        const saveBtn = document.querySelector('[data-action="theme:save-typography"]');
        if (saveBtn) {
          saveBtn.addEventListener('click', function() {
              if(!select.value) return;
              const val = JSON.parse(select.value);
              const btn = this;
              btn.disabled = true;
              btn.textContent = "Guardando...";
              
              google.script.run.withSuccessHandler(function(res) {
                   window.WHITE_LABEL = val; // Mute active ref
                   btn.disabled = false;
                   btn.textContent = "Aplicar Globalmente";
                   const toast = document.createElement('ion-toast');
                   toast.message = 'Tipografía global actualizada para todos los usuarios.';
                   toast.duration = 3000;
                   toast.color = 'success';
                   toast.position = 'top';
                   document.body.appendChild(toast);
                   toast.present();
              }).withFailureHandler(function(err) {
                   btn.disabled = false;
                   btn.textContent = "Aplicar Globalmente";
                   const toast = document.createElement('ion-toast');
                   toast.message = 'Error de Permisos: ' + err.message;
                   toast.duration = 4000;
                   toast.color = 'danger';
                   toast.position = 'top';
                   document.body.appendChild(toast);
                   toast.present();
              }).API_UpdateGlobalConfig(val);
          });
        }
      }
    } catch(e) {
      console.warn("ABAC Parsing failed for Typography Panel: ", e);
    }
  };
</script>

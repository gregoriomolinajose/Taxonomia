<style>
  /* 1. Purga del Scrollbar (ion-segment) */
  ion-segment::-webkit-scrollbar { display: none; }
  ion-segment { -ms-overflow-style: none; scrollbar-width: none; }

  .design-kit-card { margin-bottom: var(--spacing-4); }

  /* 2. Sticky Flow Pattern (Evitar Nested Content Doom) */
  .dk-sticky-tabs {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--color-bg-body);
    border-bottom: 1px solid var(--color-border);
  }

  /* 3. Breathing Room */
  .dk-tab-content {
    padding: var(--spacing-6) var(--spacing-2);
    display: none;
  }
  .dk-tab-content.active {
    display: block;
    animation: fade-in 0.3s ease;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* 4. Swatches de Color Inquebrantables */
  .color-swatch {
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-default);
    border: 1px solid var(--color-border);
    border-radius: var(--rounded-md);
    overflow: hidden;
    margin-bottom: var(--spacing-4);
  }
  .color-swatch-color {
    flex-grow: 1;
    min-height: 80px;
    width: 100%;
  }
  .color-swatch-info {
    background: var(--color-bg-body);
    padding: var(--spacing-2);
    text-align: center;
    border-top: 1px solid var(--color-border);
  }

  /* 5. Cajas de Radio Perfectas */
  .radius-box {
    width: 120px;
    height: 120px;
    background: var(--color-interactive-primary);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 6. Tarjetas de Sombra Reales */
  .shadow-card {
    width: 100%;
    max-width: 200px;
    height: 120px;
    background: var(--color-bg-body);
    border-radius: var(--rounded-md);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 7. Theme Control Card */
  .theme-control-item {
    --padding-start: var(--spacing-4);
    --inner-padding-end: var(--spacing-4);
  }
  .color-picker-wrapper {
    position: relative;
    width: 32px;
    height: 32px;
    border-radius: var(--rounded-full);
    overflow: hidden;
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-default);
    margin-right: var(--spacing-3);
  }
  .color-picker-input {
    position: absolute;
    top: -10px;
    left: -10px;
    width: 60px;
    height: 60px;
    opacity: 0;
    cursor: pointer;
  }
  .hex-display {
    font-family: monospace;
    color: var(--color-text-soft);
    font-size: 14px;
    margin-top: 4px;
  }
</style>

<script>
  window.switchDesignKitTab = function(event) {
    if (!event || !event.detail) return;
    var tabName = event.detail.value;
    var tabs = document.querySelectorAll('.dk-tab-content');
    tabs.forEach(function(tab) {
      tab.classList.remove('active');
    });
    var target = document.getElementById('dk-tab-' + tabName);
    if (target) {
      target.classList.add('active');
    }
  };

  window.openTestModal = function() {
    var modal = document.getElementById('enterpriseModalTest');
    if (modal) window.PresentSafe(modal);
  };

  // Helper: Hex to RGB Converter
  window.hexToRgb = function(hex) {
    var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? 
      parseInt(result[1], 16) + ', ' + parseInt(result[2], 16) + ', ' + parseInt(result[3], 16) 
      : null;
  };

  // Helper: Luminance Engine
  window.calculateContrast = function(hex) {
    var rgb = window.hexToRgb(hex);
    if (!rgb) return '#ffffff';
    var parts = rgb.split(',').map(Number);
    // Fórmula YIQ para brillo visual humano
    var yiq = ((parts[0] * 299) + (parts[1] * 587) + (parts[2] * 114)) / 1000;
    return (yiq >= 128) ? '#000000' : '#ffffff';
  };

  // Failsafe: Reset Theme Engine
  window.resetThemeEngine = function() {
    var mutators = document.querySelectorAll('.theme-mutator');
    mutators.forEach(function(mutator) {
      var cssVar = mutator.getAttribute('data-token');
      var ionBase = mutator.getAttribute('data-ion-token');
      
      document.documentElement.style.removeProperty(cssVar);
      if (ionBase) {
        document.documentElement.style.removeProperty('--ion-color-' + ionBase);
        document.documentElement.style.removeProperty('--ion-color-' + ionBase + '-rgb');
        document.documentElement.style.removeProperty('--ion-color-' + ionBase + '-contrast');
        document.documentElement.style.removeProperty('--ion-color-' + ionBase + '-contrast-rgb');
      }
    });
    // Re-initialize values to reflect original CSS
    window.initThemeMutators();
  };

  window.initThemeMutators = function() {
    var mutators = document.querySelectorAll('.theme-mutator');
    const rootStyle = getComputedStyle(document.documentElement);
    
    mutators.forEach(function(mutator) {
      var cssVar = mutator.getAttribute('data-token');
      var currentValue = rootStyle.getPropertyValue(cssVar).trim();
      
      // Update the input value and bg color
      if (currentValue && currentValue.startsWith('#')) {
        mutator.value = currentValue;
        var wrapper = mutator.parentElement;
        if (wrapper) wrapper.style.backgroundColor = currentValue;
        
        var hexDisplay = document.getElementById(mutator.id.replace('mutator', 'hex-display'));
        if (hexDisplay) hexDisplay.textContent = currentValue.toUpperCase();
      }
    });
  };

  window.mountDesignKit = function() {
    // 1. Inicializar selectores en vivo
    const selects = document.querySelectorAll('.smart-select-demo');
    const isDesktop = window.innerWidth >= 768;
    selects.forEach(select => {
      select.interface = isDesktop ? 'popover' : 'action-sheet';
    });

    // 2. Anclar el View Switcher Engine a ion-segment nativo
    const segment = document.getElementById('dk-segment');
    if (segment) {
      segment.addEventListener('ionChange', window.switchDesignKitTab);
    }

    // 3. Inicializar Dynamic Token Mutator
    window.initThemeMutators();
    
    // Anclar listeners de mutación
    document.querySelectorAll('.theme-mutator').forEach(function(mutator) {
      // Remover posible evento huérfano para evitar duplicados en SPA
      const newMutator = mutator.cloneNode(true);
      mutator.parentNode.replaceChild(newMutator, mutator);
      
      newMutator.addEventListener('input', function(e) {
        var newColor = e.target.value;
        var cssVar = newMutator.getAttribute('data-token');
        var ionBase = newMutator.getAttribute('data-ion-token');
        
        // Mute Global App Brand
        document.documentElement.style.setProperty(cssVar, newColor);
        
        // Mute Ionic Shadow DOM bindings (Solid + RGB + Contrast for ripples/opacities/text)
        if (ionBase) {
          document.documentElement.style.setProperty('--ion-color-' + ionBase, newColor);
          var rgb = window.hexToRgb(newColor);
          if (rgb) {
            document.documentElement.style.setProperty('--ion-color-' + ionBase + '-rgb', rgb);
          }
          var contrast = window.calculateContrast(newColor);
          document.documentElement.style.setProperty('--ion-color-' + ionBase + '-contrast', contrast);
          var contrastRgb = window.hexToRgb(contrast);
          if (contrastRgb) {
            document.documentElement.style.setProperty('--ion-color-' + ionBase + '-contrast-rgb', contrastRgb);
          }
        }
        
        // Update UI
        var wrapper = newMutator.parentElement;
        if (wrapper) wrapper.style.backgroundColor = newColor;
        var hexDisplay = document.getElementById(newMutator.id.replace('mutator', 'hex-display'));
        if (hexDisplay) hexDisplay.textContent = newColor.toUpperCase();
      });
    });
  };
</script>

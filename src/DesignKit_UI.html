<style>
  /* 1. Purga del Scrollbar (ion-segment) */
  ion-segment::-webkit-scrollbar { display: none; }
  ion-segment { -ms-overflow-style: none; scrollbar-width: none; }

  .design-kit-card { margin-bottom: var(--spacing-4); }

  /* 2. Sticky Flow Pattern (Evitar Nested Content Doom) */
  .dk-sticky-tabs {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--color-bg-body);
    border-bottom: 1px solid var(--color-border);
  }

  /* 3. Breathing Room */
  .dk-tab-content {
    padding: var(--spacing-6) var(--spacing-2);
    display: none;
  }
  .dk-tab-content.active {
    display: block;
    animation: fade-in 0.3s ease;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* 4. Swatches de Color Inquebrantables */
  .color-swatch {
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-default);
    border: 1px solid var(--color-border);
    border-radius: var(--rounded-md);
    overflow: hidden;
    margin-bottom: var(--spacing-4);
  }
  .color-swatch-color {
    flex-grow: 1;
    min-height: 80px;
    width: 100%;
  }
  .color-swatch-info {
    background: var(--color-bg-body);
    padding: var(--spacing-2);
    text-align: center;
    border-top: 1px solid var(--color-border);
  }

  /* 5. Cajas de Radio Perfectas */
  .radius-box {
    width: 120px;
    height: 120px;
    background: var(--color-interactive-primary);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 6. Tarjetas de Sombra Reales */
  .shadow-card {
    width: 100%;
    max-width: 200px;
    height: 120px;
    background: var(--color-bg-body);
    border-radius: var(--rounded-md);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 7. Theme Control Card */
  .theme-control-item {
    --padding-start: var(--spacing-4);
    --inner-padding-end: var(--spacing-4);
  }
  .color-picker-wrapper {
    position: relative;
    width: 32px;
    height: 32px;
    border-radius: var(--rounded-full);
    overflow: hidden;
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-default);
    margin-right: var(--spacing-3);
  }
  .color-picker-input {
    position: absolute;
    top: -10px;
    left: -10px;
    width: 60px;
    height: 60px;
    opacity: 0;
    cursor: pointer;
  }
  .hex-display {
    font-family: monospace;
    color: var(--color-text-soft);
    font-size: 14px;
    margin-top: 4px;
  }
</style>

<script>
  window.switchDesignKitTab = function(event) {
    if (!event || !event.detail) return;
    var tabName = event.detail.value;
    var tabs = document.querySelectorAll('.dk-tab-content');
    tabs.forEach(function(tab) {
      tab.classList.remove('active');
    });
    var target = document.getElementById('dk-tab-' + tabName);
    if (target) {
      target.classList.add('active');
    }
  };

  window.openTestModal = function() {
    var modal = document.getElementById('enterpriseModalTest');
    if (modal) window.PresentSafe(modal);
  };

  // Helper: Hex to RGB Converter
  window.hexToRgb = function(hex) {
    var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? 
      parseInt(result[1], 16) + ', ' + parseInt(result[2], 16) + ', ' + parseInt(result[3], 16) 
      : null;
  };

  // Helper: Luminance Engine
  window.calculateContrast = function(hex) {
    var rgb = window.hexToRgb(hex);
    if (!rgb) return '#ffffff';
    var parts = rgb.split(',').map(Number);
    // Fórmula YIQ para brillo visual humano
    var yiq = ((parts[0] * 299) + (parts[1] * 587) + (parts[2] * 114)) / 1000;
    return (yiq >= 128) ? '#000000' : '#ffffff';
  };

  // Failsafe: Reset Theme Engine
  window.resetThemeEngine = function() {
    var mutators = document.querySelectorAll('.theme-mutator');
    mutators.forEach(function(mutator) {
      var cssVar = mutator.getAttribute('data-token');
      var ionBase = mutator.getAttribute('data-ion-token');
      
      document.documentElement.style.removeProperty(cssVar);
      if (ionBase) {
        document.documentElement.style.removeProperty('--ion-color-' + ionBase);
        document.documentElement.style.removeProperty('--ion-color-' + ionBase + '-rgb');
        document.documentElement.style.removeProperty('--ion-color-' + ionBase + '-contrast');
        document.documentElement.style.removeProperty('--ion-color-' + ionBase + '-contrast-rgb');
      }
    });
    // Re-initialize values to reflect original CSS
    window.initThemeMutators();
  };

  window.initThemeMutators = function() {
    var mutators = document.querySelectorAll('.theme-mutator');
    const rootStyle = getComputedStyle(document.documentElement);
    
    mutators.forEach(function(mutator) {
      var cssVar = mutator.getAttribute('data-token');
      var currentValue = rootStyle.getPropertyValue(cssVar).trim();
      
      // Update the input value and bg color
      if (currentValue && currentValue.startsWith('#')) {
        mutator.value = currentValue;
        var wrapper = mutator.parentElement;
        if (wrapper) wrapper.style.backgroundColor = currentValue;
        
        var hexDisplay = document.getElementById(mutator.id.replace('mutator', 'hex-display'));
        if (hexDisplay) hexDisplay.textContent = currentValue.toUpperCase();
      }
    });
  };

    window.mountDesignKit = function() {
    // 1. Inicializar selectores en vivo
    const selects = document.querySelectorAll('.smart-select-demo');
    const isDesktop = window.innerWidth >= 768;
    selects.forEach(select => {
      select.interface = isDesktop ? 'popover' : 'action-sheet';
    });

    // 2. Anclar el View Switcher Engine a ion-segment nativo
    const segment = document.getElementById('dk-segment');
    if (segment) {
      segment.addEventListener('ionChange', window.switchDesignKitTab);
    }

    // 3. Inicializar Dynamic Token Mutator
    window.initThemeMutators();
    
    // Anclar listeners de mutación
    document.querySelectorAll('.theme-mutator').forEach(function(mutator) {
      // Remover posible evento huérfano para evitar duplicados en SPA
      const newMutator = mutator.cloneNode(true);
      mutator.parentNode.replaceChild(newMutator, mutator);
      
      newMutator.addEventListener('input', function(e) {
        var newColor = e.target.value;
        var cssVar = newMutator.getAttribute('data-token');
        var ionBase = newMutator.getAttribute('data-ion-token');
        
        // Mute Global App Brand
        document.documentElement.style.setProperty(cssVar, newColor);
        
        // Mute Ionic Shadow DOM bindings (Solid + RGB + Contrast for ripples/opacities/text)
        if (ionBase) {
          document.documentElement.style.setProperty('--ion-color-' + ionBase, newColor);
          var rgb = window.hexToRgb(newColor);
          if (rgb) {
            document.documentElement.style.setProperty('--ion-color-' + ionBase + '-rgb', rgb);
          }
          var contrast = window.calculateContrast(newColor);
          document.documentElement.style.setProperty('--ion-color-' + ionBase + '-contrast', contrast);
          var contrastRgb = window.hexToRgb(contrast);
          if (contrastRgb) {
            document.documentElement.style.setProperty('--ion-color-' + ionBase + '-contrast-rgb', contrastRgb);
          }
        }
        
        // Update UI
        var wrapper = newMutator.parentElement;
        if (wrapper) wrapper.style.backgroundColor = newColor;
        var hexDisplay = document.getElementById(newMutator.id.replace('mutator', 'hex-display'));
        if (hexDisplay) hexDisplay.textContent = newColor.toUpperCase();
      });
    });

    // 4. White-Label Typography Panel Initialization
    window.refreshTypographyTable = function() {
        var tbody = document.getElementById('typography-metrics-tbody');
        if (!tbody) return;
        window.DOM.clear(tbody);
        
        var testDiv = document.createElement('div');
        testDiv.style.position = 'absolute';
        testDiv.style.visibility = 'hidden';
        testDiv.style.top = '-9999px';
        document.body.appendChild(testDiv);
        
        var styles = [
            { id: 'Display', cssClass: 'text-display' },
            { id: 'Header.1', cssClass: 'text-h1' },
            { id: 'Header.2', cssClass: 'text-h2' },
            { id: 'Header.3', cssClass: 'text-h3' },
            { id: 'SubHeader', cssClass: 'text-sub' },
            { id: 'Body', cssClass: 'text-body' },
            { id: 'Small', cssClass: 'text-small' },
            { id: 'Caption', cssClass: 'text-caption' },
            { id: 'Caption-mini', cssClass: 'text-mini' },
            { id: 'Action', cssClass: 'text-action' }
        ];

        styles.forEach(function(s) {
            var el = document.createElement('div');
            el.className = s.cssClass;
            el.textContent = 'Test';
            testDiv.appendChild(el);
            
            var computed = window.getComputedStyle(el);
            var fontFamily = (computed.fontFamily || '').split(',')[0].replace(/['"]/g, '');
            var weight = computed.fontWeight;
            var sizeRaw = computed.fontSize;
            
            // Format 2 decimals
            var sizeNum = parseFloat(sizeRaw);
            var sizeFormatted = sizeRaw;
            if(!isNaN(sizeNum)) {
                // Remove decimals if it's a perfect integer, otherwise 2 decimals
                sizeFormatted = (sizeNum % 1 === 0 ? sizeNum : sizeNum.toFixed(2)) + 'px';
            }

            var lh = computed.lineHeight;
            if (lh !== 'normal' && lh.indexOf('px') === -1 && lh.indexOf('%') === -1) {
                lh = Math.round(parseFloat(lh) * 100) + '%';
            }
            if(lh.indexOf('px') > -1) {
                let lhNum = parseFloat(lh);
                if(!isNaN(lhNum)) lh = (lhNum % 1 === 0 ? lhNum : lhNum.toFixed(2)) + 'px';
            }
            
            var pSpace = computed.marginBottom || '0px';
            
            var tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid var(--color-border)';
            
            var tdStyle = document.createElement('td');
            tdStyle.style.padding = '16px 12px';
            if(s.id.indexOf('Header') > -1 || s.id === 'Display') tdStyle.style.fontWeight = 'bold';
            
            var stylePreview = document.createElement('div');
            stylePreview.className = s.cssClass;
            stylePreview.style.margin = '0';
            stylePreview.textContent = s.id;
            if (s.id === 'Display' || s.id.indexOf('Header') > -1) {
              stylePreview.style.fontSize = 'clamp(1rem, ' + sizeRaw + ', 2rem)';
            }
            tdStyle.appendChild(stylePreview);
            
            var tdFont = document.createElement('td'); tdFont.style.padding = '12px'; tdFont.textContent = fontFamily;
            var tdWeight = document.createElement('td'); tdWeight.style.padding = '12px'; tdWeight.textContent = weight;
            
            var tdSize = document.createElement('td'); 
            tdSize.style.padding = '12px';
            tdSize.style.textAlign = 'right';
            
            var varTagStr = s.cssClass.replace('text-', 'font.size.');
            if(s.cssClass === 'text-sub') varTagStr = 'font.size.subtitle';
            
            tdSize.innerHTML = `
              <div style="font-weight: 500;">${sizeFormatted}</div>
              <div style="font-size: 10px; color: var(--color-text-soft); font-family: monospace; margin-top: 4px;">--${varTagStr.replace(/\./g, '-')}</div>
            `;
            
            var tdLH = document.createElement('td'); tdLH.style.padding = '12px'; tdLH.textContent = lh;
            var tdSpace = document.createElement('td'); tdSpace.style.padding = '12px'; tdSpace.textContent = pSpace;
            
            tr.appendChild(tdStyle); tr.appendChild(tdFont); tr.appendChild(tdWeight);
            tr.appendChild(tdSize); tr.appendChild(tdLH); tr.appendChild(tdSpace);
            tbody.appendChild(tr);
        });
        document.body.removeChild(testDiv);
    };

    try {
      const ctx = typeof window.__ABAC_CONTEXT__ === 'string' ? JSON.parse(window.__ABAC_CONTEXT__) : (window.__ABAC_CONTEXT__ || null);
      // Hardcode temporal bypass para que el config siempre se muestre a cualquiera con acceso a DesignKit
      var authLvl = "ALL (Admin Total)"; 
      
      if (authLvl.startsWith('ALL')) {
        const typographyAdmin = document.getElementById('typography-admin-panel');
        if (typographyAdmin) typographyAdmin.style.display = 'block';
        
        setTimeout(function() { window.refreshTypographyTable(); }, 150);
        window.addEventListener('resize', function() { window.refreshTypographyTable(); });
        
        // Initialize CRUD list locally natively without modal encapsulation
        setTimeout(function() {
            if(window.DataViewEngine) window.DataViewEngine.render('Config_Typography', 'dk-typography-crud-container');
        }, 100);
        
        // Native Event Delegation for Master-Detail Selection
        const crudContainer = document.getElementById('dk-typography-crud-container');
        if (crudContainer) {
            crudContainer.addEventListener('click', function(e) {
                const tr = e.target.closest('tr');
                if (!tr || !tr.parentNode || tr.parentNode.tagName !== 'TBODY') return; // only click bodies
                
                // Read row index mapping from the # column explicitly OR from NodeList
                const tds = tr.querySelectorAll('td');
                if (!tds || tds.length === 0) return;
                
                let idxRaw = tds[0].textContent.trim();
                let idx = parseInt(idxRaw) - 1; // 1-based to 0-based
                if (isNaN(idx) || idx < 0) return;
                
                // Paging offset fix: DVE keeps local state if loaded
                if (window.DataViewEngine && typeof window.DataViewEngine._getState === 'function') {
                    const engState = window.DataViewEngine._getState();
                    if (!engState || !engState.filtered) return;
                    
                    const row = engState.filtered[idx];
                    if (!row) return;

                    const valObj = {
                        font_body: row.font_body || row.body_font,
                        font_sub: row.font_sub || row.body_font,
                        font_caption: row.font_caption || row.body_font,
                        font_mini: row.font_mini || row.body_font,
                        font_action: row.font_action || row.body_font,
                        font_display: row.font_display || row.display_font,
                        font_h1: row.font_h1 || row.display_font,
                        font_h2: row.font_h2 || row.display_font,
                        font_h3: row.font_h3 || row.display_font,
                        base_size: row.base_size || '16px',
                        scale_ratio: row.scale_ratio || '1.25',
                        heading_weight: row.heading_weight || '600',
                        heading_transform: row.heading_transform || 'none'
                    };

                    // Guardar para el botón "Aplicar Globalmente"
                    const hiddenInput = document.getElementById('white-label-font-select-hidden');
                    if (hiddenInput) hiddenInput.value = JSON.stringify(valObj);

                    // Llenado dinámico del Jira-Style Pane
                    const titleEl = document.getElementById('dk-typography-read-title');
                    if (titleEl) titleEl.textContent = row.nombre_pack || row.id || 'Pack Sin Nombre';
                    
                    const fontsEl = document.getElementById('dk-typography-read-fonts');
                    if (fontsEl) fontsEl.innerHTML = `Display/Titulares: <span style="color:var(--color-interactive-primary)">${valObj.font_display}</span><br>Cuerpo/Lectura: <span style="color:var(--color-interactive-primary)">${valObj.font_body}</span>`;
                    
                    const scaleEl = document.getElementById('dk-typography-read-scale');
                    if (scaleEl) scaleEl.innerHTML = `Base/Root: <strong>${valObj.base_size}</strong> <br>Proporción Áurea: <strong>x${valObj.scale_ratio}</strong> (${valObj.heading_weight})`;

                    // Transformar Grid (Slide in Detail)
                    const masterCol = document.getElementById('dk-typography-master');
                    if (masterCol) {
                        masterCol.setAttribute('size-lg', '8');
                        masterCol.style.paddingRight = '16px';
                    }
                    const detailCol = document.getElementById('dk-typography-detail');
                    if (detailCol) detailCol.style.display = 'block';

                    // Modificar preview CSS (Live)
                    document.documentElement.style.setProperty('--font-body', valObj.font_body);
                    document.documentElement.style.setProperty('--font-sub', valObj.font_sub);
                    document.documentElement.style.setProperty('--font-caption', valObj.font_caption);
                    document.documentElement.style.setProperty('--font-mini', valObj.font_mini);
                    document.documentElement.style.setProperty('--font-action', valObj.font_action);
                    document.documentElement.style.setProperty('--font-display', valObj.font_display);
                    document.documentElement.style.setProperty('--font-h1', valObj.font_h1);
                    document.documentElement.style.setProperty('--font-h2', valObj.font_h2);
                    document.documentElement.style.setProperty('--font-h3', valObj.font_h3);
                    document.documentElement.style.setProperty('--wl-base-size', valObj.base_size);
                    document.documentElement.style.setProperty('--wl-scale-ratio', parseFloat(valObj.scale_ratio) || 1.25);
                    document.documentElement.style.setProperty('--wl-heading-weight', valObj.heading_weight);
                    document.documentElement.style.setProperty('--wl-heading-transform', valObj.heading_transform);
                   
                    setTimeout(function() { window.refreshTypographyTable(); }, 100);
                }
            });
            
            // Cerrar el panel al hacer clic en un área externa
            document.addEventListener('click', function(e) {
                const detailCol = document.getElementById('dk-typography-detail');
                const masterCol = document.getElementById('dk-typography-master');
                
                if (detailCol && detailCol.style.display === 'block') {
                    const isClickInsideDetail = detailCol.contains(e.target);
                    // Prevent closing if we are interacting with the crud list itself
                    const isClickOnMasterNode = e.target.closest('#dk-typography-crud-container');
                    
                    if (!isClickInsideDetail && !isClickOnMasterNode) {
                        detailCol.style.display = 'none';
                        if (masterCol) {
                            masterCol.setAttribute('size-lg', '12');
                            masterCol.style.paddingRight = '0px';
                        }
                    }
                }
            });
        }
        
        // Save remote
        const saveBtns = document.querySelectorAll('[data-action="theme:save-typography"]');
        saveBtns.forEach(function(saveBtn) {
            saveBtn.addEventListener('click', function(btnTarget) {
                const btn = btnTarget.currentTarget;
                const val = document.getElementById('white-label-font-select-hidden').value;
                if(!val) return;
                
                let parsedVal;
                try {
                    parsedVal = JSON.parse(val);
                } catch(e) {
                    console.error("Configuración tipográfica corrupta - Error de parseo JSON: ", e);
                    return;
                }
                
                btn.disabled = true;
                btn.textContent = "Guardando...";
                
                google.script.run.withSuccessHandler(function() {
                    btn.disabled = false;
                    btn.textContent = "Aplicar al Sistema";
                    const toast = document.createElement('ion-toast');
                    toast.message = 'Tipografía global actualizada.';
                    toast.duration = 3000;
                    toast.color = 'success';
                    document.body.appendChild(toast);
                    toast.present();
                }).withFailureHandler(function(err) {
                    btn.disabled = false;
                    btn.textContent = "Aplicar al Sistema";
                    const toast = document.createElement('ion-toast');
                    toast.message = 'Error: ' + err.message;
                    toast.duration = 4000;
                    toast.color = 'danger';
                    document.body.appendChild(toast);
                    toast.present();
                }).API_UpdateGlobalConfig(parsedVal);
            });
        });
      }
    } catch(e) {
      console.warn("ABAC Parsing failed for Typography Panel: ", e);
    }
  };
</script>

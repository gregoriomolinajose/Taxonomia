<script>
  /* ═══════════════════════════════════════════════════════
     DomainMap_UI.html — Apache ECharts Treemap Renderer
     CONTIENE: Logica nativa O(N) para instanciar mapa ortogonal (S6.3)
     Inyectado via: <?!= include('DomainMap_UI'); ?>
  ═══════════════════════════════════════════════════════ */

  window.triggerDomainEditFromTooltip = function() {
      var record = window._domainMapHoverRecord;
      if (!record || typeof window.openEditForm !== 'function') return;
      
      var oDVE = window.DataViewEngine;
      var oGS = oDVE ? oDVE._getState : null;
      if (!window.DataViewEngine) window.DataViewEngine = {};
      window.DataViewEngine._getState = function() {
          return { entityName: 'Dominio', data: window.DataStore.get('Dominio') || [record], entityMeta: { idField: window.Schema_Utils.getPrimaryKey('Dominio') } };
      };
      
      if (window.DomainTreemapInstance) window.DomainTreemapInstance.dispatchAction({ type: 'hideTip' });

      window.openEditForm(record.id_dominio).finally(function() {
          if (oGS) window.DataViewEngine._getState = oGS;
          else if (!oDVE) window.DataViewEngine = undefined; 
      });
  };

  // [S24.5] Domain Module Event Subscription (Decoupled from Global Router)
  document.addEventListener('DOMContentLoaded', function() {
      if (window.AppEventBus) {
          window.AppEventBus.subscribe('DOM::CLICK_ACTION', function(payload) {
              if (payload && payload.action === 'domain:edit') {
                  window.triggerDomainEditFromTooltip();
              }
          });
      }
  });

  window.renderDomainMap = function(containerEl) {
    // 1. Limpiar contenedor principal y armar envoltorio
    window.DOM.clear(containerEl);
    var grid = document.createElement('ion-grid');
    grid.className = 'ion-no-padding';
    
    var row = document.createElement('ion-row');
    row.className = 'ion-no-padding';
    
    var col = document.createElement('ion-col');
    col.setAttribute('size', '12');
    col.className = 'ion-no-padding';
    
    var card = document.createElement('ion-card');
    card.style.height = 'calc(100vh - 230px)';
    card.style.margin = '6px';
    card.style.borderRadius = '12px';
    card.style.display = 'flex';
    card.style.flexDirection = 'column';
    
    var header = document.createElement('ion-card-header');
    
    var title = document.createElement('ion-card-title');
    title.textContent = 'Mapa de Relaciones: Dominios';
    var subtitle = document.createElement('ion-card-subtitle');
    subtitle.textContent = 'Jerarquía Treemap (Clic para explorar rama. Mantén pulsado o usa Clic Derecho para configurar)';
    
    header.appendChild(title);
    header.appendChild(subtitle);
    
    var content = document.createElement('ion-card-content');
    content.className = 'ion-no-padding';
    content.style.flex = '1';
    
    var divContent = document.createElement('div');
    divContent.id = 'domain-treemap-container';
    divContent.style.width = '100%';
    divContent.style.height = '100%';
    
    content.appendChild(divContent);
    card.appendChild(header);
    card.appendChild(content);
    col.appendChild(card);
    row.appendChild(col);
    grid.appendChild(row);
    containerEl.appendChild(grid);

    // 2. Extraer datos procesados anidados via O(N) HashMap
    var graphData = window.Math_Engine.buildEChartsTreemapData(window.DataStore.getAll());
    var treemapContainer = document.getElementById('domain-treemap-container');

    if (!graphData || graphData.length === 0) {
      var errText = document.createElement('div');
      errText.style.padding = '20px';
      errText.style.textAlign = 'center';
      errText.textContent = 'No hay datos de Dominios para graficar.';
      treemapContainer.appendChild(errText);
      return;
    }

    // 3. Instanciar ECharts
    if (window.DomainTreemapInstance) {
        window.DomainTreemapInstance.dispose();
    }
    
    var chart = echarts.init(treemapContainer);
    
    // Tema dinámico y Extracción de Variables de Sistema
    var isDark = document.body.classList.contains('dark');
    var ionicTextColor = getComputedStyle(document.body).getPropertyValue('--ion-text-color').trim();
    var breadcrumbTextColor = ionicTextColor || (isDark ? 'var(--ion-color-light)' : 'var(--ion-color-light)');
    
    // 4. Configuracion Premium Treemap
    var option = {
        tooltip: {
            trigger: 'item',
            enterable: true,
            hideDelay: 250,
            backgroundColor: 'rgba(30, 32, 35, 0.95)',
            borderColor: 'var(--ion-color-light)',
            borderWidth: 1,
            formatter: function (info) {
                var val = info.value || 0;
                
                var percentage = 100;
                if (info.treePathInfo && info.treePathInfo.length > 1) {
                    var parentNode = info.treePathInfo[info.treePathInfo.length - 2];
                    if (parentNode && parentNode.value) {
                        percentage = ((val / parentNode.value) * 100).toFixed(1);
                    }
                }
                
                if (info.data && info.data._record) {
                    window._domainMapHoverRecord = info.data._record;
                }

                return '<div style="padding: 10px; min-width: 250px;">' +
                            '<div style="font-weight:bold; font-size: var(--sys-font-sub, 16px); margin-bottom:12px; color:var(--ion-color-light); white-space:normal; word-break:break-word;">' + (info.name || '') + '</div>' +
                            '<div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size: var(--sys-font-body, 14px); color:var(--ion-color-light);">' +
                                '<span>Subdominios: <b style="color:var(--ion-color-light);">' + val + '</b></span>' +
                                '<span>Densidad: <b style="color:var(--ion-color-light);">' + percentage + '%</b></span>' +
                            '</div>' +
                            '<div style="text-align:center;">' +
                                '<button data-action="domain:edit" style="width:100%; padding:8px; background:var(--ion-color-light); color: var(--ion-color-light); border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size: var(--sys-font-body, 14px); box-shadow: 0 2px 4px var(--color-shadow-xl); transition: 0.2s;">' +
                                    '<ion-icon name="create-outline" style="vertical-align:middle; margin-right:5px;"></ion-icon>Configurar Dominio' +
                                '</button>' +
                            '</div>' +
                        '</div>';
            }
        },
        series: [{
            type: 'treemap',
            data: graphData,
            left: '1%',
            right: '1%',
            top: '40px',
            bottom: '1%',
            leafDepth: 1, // UX: S7.2 Restaurado para restringir el visor a un solo nivel jerárquico a la vez
            roam: false, // Forzar uso del Clic Navigacional (Drill-down sin panneo)
            nodeClick: 'zoomToNode', 
            animationDurationUpdate: 500,
            itemStyle: {
                borderColor: 'var(--sidebar-item-hover)', 
                borderWidth: 2,
                gapWidth: 2, 
                borderRadius: 4 
            },
            label: {
                show: true,
                position: 'insideTopLeft',
                formatter: '{b}',
                fontSize: 14,
                fontWeight: '500',
                padding: [10, 10, 10, 10], 
                overflow: 'break' 
            },
            upperLabel: {
                show: true,
                height: 30,
                color: 'var(--ion-color-light)',
                backgroundColor: 'var(--ion-color-light)',
                fontSize: 12
            },
            levels: [
                {
                    itemStyle: { borderColor: 'var(--ion-color-light)', borderWidth: 4, gapWidth: 4 }
                },
                {
                    colorSaturation: [0.3, 0.6], 
                    itemStyle: { borderColorSaturation: 0.7, gapWidth: 2, borderWidth: 2 }
                },
                {
                    colorSaturation: [0.3, 0.5],
                    itemStyle: { borderColorSaturation: 0.6, gapWidth: 1 }
                }
            ],
            breadcrumb: {
                show: true,
                top: 0,
                bottom: 'auto',
                left: '1%',
                emptyItemWidth: 25,
                itemStyle: {
                    color: 'var(--ion-color-light)', 
                    borderWidth: 0,
                    borderRadius: 15,
                    shadowColor: 'var(--color-shadow-xl)',
                    shadowBlur: 5
                },
                textStyle: {
                    color: 'var(--ion-color-light)', 
                    fontSize: 14,
                    fontWeight: 'bold'
                }
            }
        }]
    };

    // UX: Si existe un único Dominio Raíz (ej. "Retail"), auto-perforarlo para no mostrar una caja gigante inútil
    if (graphData.length === 1) {
        chart.on('finished', function autoDrilldownHandler() {
            // Desligar inmediatamente el listener para que no se dispare en posteriores re-renders
            chart.off('finished', autoDrilldownHandler);
            try {
                chart.dispatchAction({
                    type: 'treemapRootToNode',
                    seriesIndex: 0,
                    targetNodeId: graphData[0].id,
                    targetNode: graphData[0].name
                });
            } catch(e) {
                console.warn("ECharts Auto-Drilldown fail:", e);
            }
        });
    }

    // Instanciar motor gráfico
    chart.setOption(option);

    // Responsive window resizing
    var resizeObserver = new ResizeObserver(function() {
         chart.resize();
    });
    resizeObserver.observe(treemapContainer);
    
    // 5. S6.8: Native Mobile UX & Desktop Context Menu Editing
    chart.on('contextmenu', function(params) {
        if (params.event && params.event.event) {
            params.event.event.preventDefault(); // Stop native browser menu
        }
        if (params.data && params.data._record) {
            window._domainMapHoverRecord = params.data._record;
            if (typeof window.triggerDomainEditFromTooltip === 'function') {
                window.triggerDomainEditFromTooltip();
            }
        }
    });

    window.DomainTreemapInstance = chart;
  };
</script>

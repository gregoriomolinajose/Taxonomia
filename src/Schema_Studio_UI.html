<!-- ═══ ENGINE ════════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  // ── Field Classification ────────────────────────────────────────────────────────────
  // SYNC [H9]: These name arrays MUST match FIELD_TEMPLATES.* in Schema_Engine.gs.
  // If a template field is added/renamed, update all three lists here.
  // Future: replace with getGovernedFieldNames() GAS API to eliminate drift risk.
  var SYSTEM_FIELD_NAMES  = ['lexical_id', 'estado'];
  var AUDIT_FIELD_NAMES   = ['created_at','created_by','updated_at','updated_by','deleted_at','deleted_by'];
  var VERSION_FIELD_NAMES = ['version'];

  function classifyField(fieldName) {
    if (AUDIT_FIELD_NAMES.includes(fieldName))   return 'audit';
    if (VERSION_FIELD_NAMES.includes(fieldName)) return 'version';
    if (SYSTEM_FIELD_NAMES.includes(fieldName))  return 'system';
    return 'custom';
  }

  // ── Chip HTML ─────────────────────────────────────────────────────────────
  function chipHtml(name, type, icon) {
    return '<span class="ss-field-chip ' + type + '">' +
           '<ion-icon name="' + icon + '"></ion-icon>' +
           name + '</span>';
  }

  function renderFieldChips(fields) {
    if (!fields || !fields.length) return '<span style="color:var(--ion-color-medium);font-size:0.8rem;">Sin campos</span>';
    return fields.map(function(f) {
      var t = f.type;
      if (t === 'relation') return chipHtml(f.name, 'relation', 'link-outline');
      if (t === 'divider' ) return ''; // skip UI-only
      var cls = classifyField(f.name);
      var icons = { system:'finger-print-outline', audit:'time-outline', version:'git-commit-outline', custom:'code-slash-outline' };
      return chipHtml(f.name, cls, icons[cls] || 'code-slash-outline');
    }).filter(Boolean).join('');
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function switchTab(tabId) {
    // [S31.10] Track _lastContentTab for Composer multi-context mode
    if (tabId === 'entities' || tabId === 'templates' || tabId === 'presets') {
      _lastContentTab = tabId;
    }
    var tabs = document.querySelectorAll('.ss-tab');
    tabs.forEach(function(t) {
      var active = t.getAttribute('data-tab') === tabId;
      t.style.color        = active ? 'var(--ion-color-warning)' : 'var(--ion-color-medium)';
      t.style.borderBottom = active ? '2px solid var(--ion-color-warning)' : '2px solid transparent';
    });
    // [S31.13] Dynamic badge label and visibility based on context
    var badge = document.querySelector('.ss-tab[data-tab="composer"] .ss-code-export-badge');
    if (badge) {
      if (tabId === 'entities' || tabId === 'composer') {
        badge.textContent = 'CODE EXPORT';
        badge.style.opacity = '1';
        badge.style.pointerEvents = 'auto';
        badge.title = '';
      } else if (tabId === 'templates') {
        badge.textContent = 'TEMPLATES';
        badge.style.opacity = '1';
        badge.style.pointerEvents = 'auto';
        badge.title = 'Abre composer de FIELD_TEMPLATES';
      } else if (tabId === 'presets') {
        badge.textContent = 'BEHAVIORS';
        badge.style.opacity = '1';
        badge.style.pointerEvents = 'auto';
        badge.title = 'Abre composer de TOPOLOGY_PRESETS';
      } else {
        badge.textContent = 'CODE EXPORT';
        badge.style.opacity = '0.25';
        badge.style.pointerEvents = 'none';
        badge.title = 'N/A en este tab';
      }
    }
    renderTab(tabId);
  }

  // ── Tab Renderers ─────────────────────────────────────────────────────────
  function renderTab(tabId) {
    var container = document.getElementById('ss-tab-content');
    if (!container) return;
    container.innerHTML = '';

    if (tabId === 'entities')       renderEntitiesTab(container);
    else if (tabId === 'templates') renderTemplatesTab(container);
    else if (tabId === 'presets')   renderPresetsTab(container);
    else if (tabId === 'db')        renderDbHealthTab(container);
    else if (tabId === 'composer')  renderComposerTab(container);
  }

  // ── Entities Tab ──────────────────────────────────────────────────────────
  function renderEntitiesTab(container) {
    var schemas = window.APP_SCHEMAS || {};
    var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">' +
      '<div>' +
        '<div style="font-weight:700;font-size:1rem;">Catálogo de Entidades</div>' +
        '<div style="font-size:0.78rem;color:var(--ion-color-medium);margin-top:2px;">' +
          Object.keys(schemas).filter(function(k){return k!=='_UI_CONFIG';}).length +
          ' entidades registradas en APP_SCHEMAS' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:8px;font-size:0.72rem;">' +
        '<span class="ss-field-chip system"><ion-icon name="finger-print-outline"></ion-icon>SYSTEM_FIELDS</span>' +
        '<span class="ss-field-chip audit"><ion-icon name="time-outline"></ion-icon>AUDIT_FIELDS</span>' +
        '<span class="ss-field-chip version"><ion-icon name="git-commit-outline"></ion-icon>VERSION</span>' +
        '<span class="ss-field-chip custom"><ion-icon name="code-slash-outline"></ion-icon>CUSTOM</span>' +
        '<span class="ss-field-chip relation"><ion-icon name="link-outline"></ion-icon>RELATION</span>' +
      '</div>' +
    '</div>';

    Object.keys(schemas).sort().forEach(function(entityName) {
      if (entityName === '_UI_CONFIG') return;
      var schema = schemas[entityName];
      var meta = schema.metadata || {};
      var fields = schema.fields || [];

      var fieldCount    = fields.filter(function(f){ return f.type !== 'divider'; }).length;
      var auditCount    = fields.filter(function(f){ return AUDIT_FIELD_NAMES.includes(f.name); }).length;
      var hasVersion    = fields.some(function(f){ return f.name === 'version'; });
      var hasLexical    = fields.some(function(f){ return f.name === 'lexical_id'; });
      var topologyKey   = schema.topologyRules ? (schema.topologyRules._preset || '—') : '—';

      // Compliance score
      var score = 0;
      if (auditCount === 6) score++;
      if (hasVersion) score++;
      if (hasLexical || entityName.startsWith('Sys_') || entityName.startsWith('Config_') || entityName.startsWith('Relacion_')) score++;

  // ── DB Health Tab ─────────────────────────────────────────────────────────
  function renderDbHealthTab(container) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ion-color-medium);">' +
      '<ion-spinner name="crescent" color="warning"></ion-spinner>' +
      '<div style="margin-top:12px;font-size:0.85rem;">Consultando estado de la base de datos...</div>' +
      '</div>';

    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(statusData) {
          renderDbHealthResults(container, statusData);
        })
        .withFailureHandler(function(err) {
          container.innerHTML = '<div style="text-align:center;padding:40px;">' +
            '<ion-icon name="cloud-offline-outline" style="font-size:3rem;color:var(--ion-color-danger);"></ion-icon>' +
            '<div style="margin-top:12px;font-weight:600;">Error consultando DB</div>' +
            '<div style="font-size:0.8rem;color:var(--ion-color-medium);margin-top:6px;">' + (err.message || String(err)) + '</div>' +
          '</div>';
        })
        .getSchemaProvisioningStatus();
    } else {
      // Dev fallback: derive from APP_SCHEMAS
      var mockData = Object.keys(window.APP_SCHEMAS || {})
        .filter(function(k){ return k !== '_UI_CONFIG'; })
        .map(function(entityName) {
          return { entity: entityName, exists: null, managed: null, isHealthy: null, missingColumns: [], orphanedColumns: [] };
        });
      renderDbHealthResults(container, mockData);
    }
  }

  function renderDbHealthResults(container, data) {
    var healthy  = (data || []).filter(function(r){ return r.isHealthy === true; }).length;
    var warn     = (data || []).filter(function(r){ return r.orphanedColumns && r.orphanedColumns.length > 0; }).length;
    var missing  = (data || []).filter(function(r){ return r.isHealthy === false || r.exists === false; }).length;
    var unknown  = (data || []).filter(function(r){ return r.isHealthy === null; }).length;

    var html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;">' +
      statsCard('checkmark-circle-outline', healthy, 'Saludables', 'var(--ion-color-success)') +
      statsCard('warning-outline',         warn,    'Con Huérfanas', 'var(--ion-color-warning-shade)') +
      statsCard('close-circle-outline',    missing, 'Con Defectos', 'var(--ion-color-danger)') +
      statsCard('help-circle-outline',     unknown, 'Sin Verificar', 'var(--ion-color-medium)') +
    '</div>';

    html += '<div style="font-weight:600;font-size:0.85rem;margin-bottom:10px;color:var(--ion-color-medium);">ESTADO POR ENTIDAD</div>';

    (data || []).forEach(function(r) {
      var statusIcon  = r.isHealthy === true ? 'checkmark-circle' : r.isHealthy === false ? 'close-circle' : 'help-circle';
      var statusColor = r.isHealthy === true ? 'var(--ion-color-success)' : r.isHealthy === false ? 'var(--ion-color-danger)' : 'var(--ion-color-medium)';
      var pill = r.isHealthy === true ? 'ok' : r.orphanedColumns && r.orphanedColumns.length ? 'warn' : r.isHealthy === false ? 'missing' : '';

      html += '<div class="ss-health-row">' +
        '<ion-icon name="' + statusIcon + '" style="font-size:20px;color:' + statusColor + ';flex-shrink:0;"></ion-icon>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-weight:600;font-size:0.85rem;">' + r.entity + '</div>' +
          (r.orphanedColumns && r.orphanedColumns.length
            ? '<div style="font-size:0.72rem;color:var(--ion-color-warning-shade);margin-top:2px;">Huérfanas: ' + r.orphanedColumns.join(', ') + '</div>'
            : ''
          ) +
          (r.missingColumns && r.missingColumns.length
            ? '<div style="font-size:0.72rem;color:var(--ion-color-danger);margin-top:2px;">Faltantes: ' + r.missingColumns.join(', ') + '</div>'
            : ''
          ) +
        '</div>' +
        (r.provisionedAt
          ? '<div style="font-size:0.68rem;color:var(--ion-color-medium);flex-shrink:0;">' + new Date(r.provisionedAt).toLocaleDateString() + '</div>'
          : ''
        ) +
        (pill ? '<span class="ss-pill ' + pill + '">' + (r.isHealthy === true ? 'OK' : r.orphanedColumns && r.orphanedColumns.length ? 'WARN' : 'FAIL') + '</span>' : '') +
      '</div>';
    });

    html += '<div style="margin-top:16px;padding:12px;background:var(--ion-color-step-50);border-radius:10px;font-size:0.75rem;color:var(--ion-color-medium);">' +
      '<ion-icon name="information-circle-outline"></ion-icon> ' +
      'Para reconciliar el esquema contra Google Sheets, usa el botón <strong>Reconciliar DB</strong> en la cabecera.' +
    '</div>';

    container.innerHTML = html;
  }

  function statsCard(icon, count, label, color) {
    return '<div style="background:var(--ion-item-background);border:1px solid var(--ion-color-step-100);border-radius:12px;padding:16px;text-align:center;">' +

      '<div style="font-size:0.72rem;color:var(--ion-color-medium);margin-top:4px;">' + label + '</div>' +
    '</div>';

  // ══════════════════════════════════════════════════════════════════════════
  // ── [E31-S31.6] BLUEPRINT COMPOSER ENGINE ────────────────────────────────
  // ══════════════════════════════════════════════════════════════════════════

  // Business entities eligible for Blueprint composition.
  // [O3-AR] Derived dynamically from APP_SCHEMAS using showInMenu + order metadata.
  // Automatically reflects new entities added to APP_SCHEMAS without code changes.
  function _getBusinessEntities() {
    return Object.keys(window.APP_SCHEMAS || {})
      .filter(function(k) {
        if (k === '_UI_CONFIG') return false;
        var meta = (window.APP_SCHEMAS[k].metadata || {});
        return meta.showInMenu === true;
      })
      .sort(function(a, b) {
        var oa = ((window.APP_SCHEMAS[a].metadata || {}).order) || 999;
        var ob = ((window.APP_SCHEMAS[b].metadata || {}).order) || 999;
        return oa - ob;
      });
  }

  // Template group definitions (mirrors FIELD_TEMPLATES)
  // SYNC [H9]: Field definitions here must match FIELD_TEMPLATES.* in Schema_Engine.gs.
  // Fields array uses objects {name, type} so composerInsertTemplate preserves correct types.
  var TEMPLATE_GROUPS = {
    SYSTEM_FIELDS:  { fields: [{ name:'lexical_id', type:'text', readonly:true }, { name:'estado', type:'hidden' }], label: 'SYSTEM_FIELDS', color: 'var(--ion-color-primary)' },
    ESTADO_FIELD:   { fields: [{ name:'estado', type:'hidden' }], label: 'ESTADO_FIELD', color: 'var(--ion-color-secondary)' },
    AUDIT_FIELDS:   { fields: ['created_at','created_by','updated_at','updated_by','deleted_at','deleted_by'].map(function(n){ return { name:n, type:'hidden', readonly:true }; }), label: 'AUDIT_FIELDS', color: 'var(--ion-color-success)' },
    VERSION_FIELD:  { fields: [{ name:'version', type:'hidden', readonly:true, defaultValue:1 }], label: 'VERSION_FIELD', color: 'var(--ion-color-warning-shade)' }
  };
  var FIELD_TYPES = ['text','textarea','number','email','tel','select','lookup','relation','avatar','hidden','divider','date'];

  // Composer state
  var _composer = {
    // Entity mode (original behaviour - unchanged)
    entityName:    null,
    fields:        [],   // working copy - mutable
    dirty:         false,
    // [S31.10] Multi-context extension
    mode:           'entity',  // 'entity' | 'template' | 'behavior'
    // Template mode
    templateKey:    null,
    templateFields: [],
    // Behavior mode
    behaviorKey:   null,
    behaviorRules: {}
  };

  // [S31.10] Tracks which content tab was last active before switching to Composer.
  // Determines the Composer mode: 'entities'->entity, 'templates'->template, 'presets'->behavior.
  var _lastContentTab = 'entities';

  // SYNC [H9]: Must stay in sync with FIELD_TEMPLATES.* in Schema_Engine.gs.
  // Covers: SYSTEM_FIELDS (lexical_id, estado), AUDIT_FIELDS (6 names), VERSION_FIELD.
  // Future: replace with getGovernedFieldNames() GAS API to eliminate drift risk.
  var GOVERNED_FIELD_NAMES = ['lexical_id','estado','created_at','created_by','updated_at',
    'updated_by','deleted_at','deleted_by','version'];

  // ── Composer Tab Renderer ─────────────────────────────────────────────────
  // [S31.10] Branch dispatcher — routes to the correct composer based on _lastContentTab.
  function renderComposerTab(container) {
    _composer.mode = _lastContentTab === 'templates' ? 'template'
                   : _lastContentTab === 'presets'   ? 'behavior'
                   : 'entity';
    if (_composer.mode === 'template')  renderTemplateComposer(container);
    else if (_composer.mode === 'behavior') renderBehaviorComposer(container);
    else                                renderEntityComposer(container);
  }

  // [S31.10] Original entity composer — renamed from renderComposerTab.
  function renderEntityComposer(container) {
    var schemas  = window.APP_SCHEMAS || {};
    var entities = _getBusinessEntities(); // [O3-AR] dynamic
    var sidebar  = buildComposerSidebar(schemas, entities);
    var panel    = buildComposerPanel();

    var layout = document.createElement('div');
    layout.className = 'ss-composer-layout';
    layout.appendChild(sidebar);
    layout.appendChild(panel);
    container.appendChild(layout);

    // Auto-select first business entity
    if (entities.length) composerSelectEntity(entities[0]);
  }

  function renderTemplateComposer(container) {
    var layout = document.createElement('div');

    var sidebar = document.createElement('div');

      'Selecciona un Template Group para editar</div>';

    layout.appendChild(sidebar);

    container.appendChild(layout);

    // Auto-select first template
    if (!_composer.templateKey && _TEMPLATE_CATALOGUE.length) {

  function composerTemplateSelect(key) {
    // Find in catalogue or in user-created templates
    var tmpl = _activeTemplate(); // [AR-R2]
    var tmpl = all.find(function(t) { return t.key === key; });
    if (!tmpl) return;

    _composer.templateKey    = key;
    _composer.templateFields = tmpl.fields.map(function(f) { return Object.assign({}, f); });

    // Re-render sidebar to update active state
    var sidebar = document.getElementById('ss-tmpl-sidebar');

      var items = sidebar.querySelectorAll('.ss-entity-item');

        '<span class="ss-field-chip system" style="flex-shrink:0;">' + f.name + '</span>' +

          '<ion-icon name="trash-outline"></ion-icon></button>' +

    html += '</div>';

    // Add field form
    html += '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">' +
      '<input id="ss-tmpl-new-name" type="text" placeholder="nombre_campo" style="flex:1;min-width:120px;background:var(--ion-color-step-100);border:1px solid var(--ion-color-step-150);border-radius:6px;padding:6px 10px;font-size:0.8rem;color:inherit;">' +
      '<select id="ss-tmpl-new-type" style="background:var(--ion-color-step-100);border:1px solid var(--ion-color-step-150);border-radius:6px;padding:6px 10px;font-size:0.8rem;color:inherit;">' +

        '<option value="relation">relation</option><option value="divider">divider</option></select>' +
      '<input id="ss-tmpl-new-hint" type="text" placeholder="Descripción / hint" style="flex:2;min-width:160px;background:var(--ion-color-step-100);border:1px solid var(--ion-color-step-150);border-radius:6px;padding:6px 10px;font-size:0.8rem;color:inherit;">' +
      '<button class="ss-btn-secondary" onclick="window.SchemaStudio.composerTemplateAddField()" style="font-size:0.78rem;padding:6px 12px;">' +

    var gasCode = _generateTemplateGas(tmpl.key, _composer.templateFields || []);

      '<div style="font-size:0.72rem;font-weight:700;color:#fbbf24;letter-spacing:0.08em;display:flex;align-items:center;gap:8px;">' +
        '<ion-icon name="code-download-outline"></ion-icon>' +
        'CODE EXPORT (GAS) \u2014 FIELD_TEMPLATES.' + tmpl.key + '</div>' +
      '<button class="ss-btn-primary" id="ss-copy-tmpl-export" onclick="window.SchemaStudio.composerTemplateCopy()" style="font-size:0.75rem;padding:5px 14px;display:flex;align-items:center;gap:6px;">' +
        '<ion-icon name="copy-outline"></ion-icon>Copiar GAS</button>' +
    '</div>';
    html += '<div class="ss-code-block" id="ss-tmpl-code-output" data-plain="">' + generateCodeHtml(gasCode) + '</div>';

    panel.innerHTML = html;
    var codeEl = panel.querySelector('#ss-tmpl-code-output');
    if (codeEl) codeEl.dataset.plain = gasCode;

  function _generateTemplateGas(key, fields) {
    var lines = ['  ' + key + ': function(label) {', '    return ['];
    fields.forEach(function(f) {
      var obj = '      { name: "' + f.name + '"';
      if (f.type && f.type !== 'text') obj += ', type: "' + f.type + '"';
      if (f.hint) obj += ', hint: "' + f.hint + '"';
      obj += ' }';
      lines.push(obj + ',');
    });
    lines.push('    ];');
    lines.push('  },');
    return '// FIELD_TEMPLATES.' + key + '\n' + lines.join('\n');
  }

  function composerTemplateAddField() {
    var name = (document.getElementById('ss-tmpl-new-name') || {}).value || '';
    var type = (document.getElementById('ss-tmpl-new-type') || {}).value || 'text';
    var hint = (document.getElementById('ss-tmpl-new-hint') || {}).value || '';
    if (!name.trim()) return;
    _composer.templateFields.push({ name: name.trim(), type: type, hint: hint.trim() });
    var tmpl = _activeTemplate(); // [AR-R2]
    if (tmpl) { tmpl.fields = _composer.templateFields; renderTemplatePanelContent(tmpl); }
  }

  function composerTemplateRemoveField(idx) {
    _composer.templateFields.splice(idx, 1);
    var tmpl = _activeTemplate(); // [AR-R2]
    if (tmpl) { tmpl.fields = _composer.templateFields; renderTemplatePanelContent(tmpl); }
  }

  function composerTemplateCopy() {
    var codeEl = document.getElementById('ss-tmpl-code-output');

  function composerTemplateNew() {
    var key = prompt('Nombre del nuevo template group (ej: COMPLIANCE_FIELDS):');
    if (!key || !key.trim()) return;
    key = key.trim().toUpperCase().replace(/\s+/g, '_');
    _composer._customTemplates = _composer._customTemplates || [];
    if (_TEMPLATE_CATALOGUE.some(function(t){ return t.key === key; }) ||
        _composer._customTemplates.some(function(t){ return t.key === key; })) {
      alert('Ya existe un template con ese nombre.'); return;
    }
    var newTmpl = { key: key, description: 'Nuevo template group personalizado.', fields: [] };
    _composer._customTemplates.push(newTmpl);
    _composer.templateKey = key;
    // Re-render
    var container = document.getElementById('ss-tab-content');
    if (container) { container.innerHTML = ''; renderTemplateComposer(container); }
  }

  // ══════════════════════════════════════════════════════════════════════════
  // S31.12 — BEHAVIOR COMPOSER
  // Composer context for TOPOLOGY_PRESETS: view, add, remove rules per preset.
  // CODE EXPORT produces Object.freeze({...}) GAS ready to paste in Schema_Engine.gs.
  // ══════════════════════════════════════════════════════════════════════════

  function _getPresetsFromSchemas() {
    var schemas = window.APP_SCHEMAS || {};
    var presets = {};
    Object.entries(schemas).forEach(function(e) {
      if (e[0] === '_UI_CONFIG') return;
      var rules = e[1].topologyRules;
      if (rules && rules._preset) {
        if (!presets[rules._preset]) {
          presets[rules._preset] = { key: rules._preset, rules: Object.assign({}, rules), users: [] };
        }
        presets[rules._preset].users.push(e[0]);
      }
    });
    // Merge any user-created behaviors
    (_composer._customBehaviors || []).forEach(function(b) {
      if (!presets[b.key]) presets[b.key] = b;
    });
    return Object.values(presets);
  }

  function renderBehaviorComposer(container) {
    var p = _activePreset(); // [AR-R2]
    var layout = document.createElement('div');
    layout.className = 'ss-composer-layout';

    // ── Sidebar ──────────────────────────────────────────────────────────────

    var sidebarHtml = '<div style="padding:12px 16px;border-bottom:1px solid var(--ion-color-step-100);">' +

        '<ion-icon name="git-network-outline"></ion-icon>TOPOLOGY_PRESETS</div>' +
    '</div>';

    presets.forEach(function(p) {
      var isActive = _composer.behaviorKey === p.key;
      sidebarHtml += '<div class="ss-entity-item' + (isActive ? ' active' : '') + '" ' +
        'onclick="window.SchemaStudio.composerBehaviorSelect(\'' + p.key + '\')" ' +
        'style="cursor:pointer;padding:10px 16px;border-bottom:1px solid var(--ion-color-step-50);">' +
        '<div style="font-size:0.82rem;font-weight:600;">' + p.key + '</div>' +
        '<div style="font-size:0.7rem;color:var(--ion-color-medium);margin-top:2px;">' +
          (p.users && p.users.length ? 'Usado por: ' + p.users.join(', ') : 'Sin entidades') + '</div>' +
      '</div>';
    });

    sidebarHtml += '<div style="padding:12px 16px;">' +
      '<button class="ss-btn-secondary" onclick="window.SchemaStudio.composerBehaviorNew()" style="width:100%;font-size:0.78rem;">' +
        '<ion-icon name="add-circle-outline"></ion-icon>Nuevo Graph Behavior</button></div>';

    sidebar.innerHTML = sidebarHtml;

    // ── Panel ─────────────────────────────────────────────────────────────────
    var panel = document.createElement('div');
    panel.className = 'ss-composer-panel';
    panel.id = 'ss-beh-panel';
    panel.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ion-color-medium);">' +
      '<ion-icon name="git-network-outline" style="font-size:2.5rem;opacity:0.3;display:block;margin-bottom:12px;"></ion-icon>' +

    container.appendChild(layout);

    if (presets.length) {
      var selectKey = _composer.behaviorKey || presets[0].key;
      composerBehaviorSelect(selectKey);
    }
  }

  function composerBehaviorSelect(key) {
    var p = _activePreset(); // [AR-R2]
    var preset = presets.find(function(p) { return p.key === key; });
    if (!preset) return;
    _composer.behaviorKey   = key;
    _composer.behaviorRules = Object.assign({}, preset.rules);
    delete _composer.behaviorRules._preset; // managed separately
    renderBehaviorPanelContent(preset);
  }

  function renderBehaviorPanelContent(preset) {
    var panel = document.getElementById('ss-beh-panel');
    if (!panel) return;
    var rules = _composer.behaviorRules;

    var html = '<div style="padding:12px 16px;background:var(--ion-color-step-50);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--ion-color-step-100);">' +
      '<div style="font-size:0.7rem;font-weight:700;color:var(--ion-color-medium);letter-spacing:0.06em;">' +
        '<ion-icon name="git-network-outline" style="color:var(--ion-color-primary);"></ion-icon>' +
        ' TOPOLOGY_PRESETS.' + preset.key + '</div>' +
    '</div>';

    // Usado por
    if (preset.users && preset.users.length) {
      html += '<div style="padding:12px 16px;border-bottom:1px solid var(--ion-color-step-100);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
        '<span style="font-size:0.7rem;color:var(--ion-color-medium);font-weight:600;">USADO POR:</span>';
      preset.users.forEach(function(u) {
        html += '<span class="ss-field-chip system">' + u + '</span>';
      });
      html += '</div>';
    }

    // Rules table
    html += '<div style="padding:16px;border-bottom:1px solid var(--ion-color-step-100);">' +
      '<div style="font-size:0.72rem;font-weight:700;color:var(--ion-color-medium);margin-bottom:10px;letter-spacing:0.06em;">REGLAS DE COMPORTAMIENTO</div>' +
      '<div id="ss-beh-rules-list">';

    Object.keys(rules).forEach(function(k, idx) {
      var val = rules[k];
      var valType = typeof val;
      html += '<div class="ss-field-row" style="align-items:center;">' +
        '<span class="ss-field-chip custom" style="flex-shrink:0;font-family:monospace;">' + k + '</span>' +
        '<span class="ss-field-chip ' + (valType === 'boolean' ? (val ? 'version' : 'warn') : 'audit') + '" style="flex-shrink:0;">' +
          (val === null ? 'null' : String(val)) + '</span>' +
        '<span style="font-size:0.7rem;color:var(--ion-color-medium);flex:1;">' + valType + '</span>' +
        '<button onclick="window.SchemaStudio.composerBehaviorRemoveRule(\'' + k + '\')" ' +
          'style="font-size:0.72rem;padding:3px 8px;background:rgba(var(--ion-color-danger-rgb),0.12);color:var(--ion-color-danger);border:none;border-radius:4px;cursor:pointer;">' +
          '<ion-icon name="trash-outline"></ion-icon></button>' +
      '</div>';
    });

    html += '</div>';

    // Add rule form
    html += '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">' +
      '<input id="ss-beh-new-key" type="text" placeholder="ruleKey" style="flex:1;min-width:120px;background:var(--ion-color-step-100);border:1px solid var(--ion-color-step-150);border-radius:6px;padding:6px 10px;font-size:0.8rem;color:inherit;">' +
      '<select id="ss-beh-new-type" style="background:var(--ion-color-step-100);border:1px solid var(--ion-color-step-150);border-radius:6px;padding:6px 10px;font-size:0.8rem;color:inherit;">' +
        '<option value="boolean">boolean</option><option value="integer">integer</option>' +
        '<option value="string">string</option></select>' +
      '<input id="ss-beh-new-val" type="text" placeholder="valor" style="flex:1;min-width:100px;background:var(--ion-color-step-100);border:1px solid var(--ion-color-step-150);border-radius:6px;padding:6px 10px;font-size:0.8rem;color:inherit;">' +
      '<button class="ss-btn-secondary" onclick="window.SchemaStudio.composerBehaviorAddRule()" style="font-size:0.78rem;padding:6px 12px;">' +
        '<ion-icon name="add-outline"></ion-icon>Agregar</button>' +
    '</div></div>';

    // CODE EXPORT
    var gasCode = _generateBehaviorGas(preset.key, rules);
    html += '<div style="margin-top:8px;padding:10px 16px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:space-between;">' +
      '<div style="font-size:0.72rem;font-weight:700;color:#fbbf24;letter-spacing:0.08em;display:flex;align-items:center;gap:8px;">' +
        '<ion-icon name="code-download-outline"></ion-icon>' +
        'CODE EXPORT (GAS) \u2014 TOPOLOGY_PRESETS.' + preset.key + '</div>' +
      '<button class="ss-btn-primary" id="ss-copy-beh-export" onclick="window.SchemaStudio.composerBehaviorCopy()" style="font-size:0.75rem;padding:5px 14px;display:flex;align-items:center;gap:6px;">' +
        '<ion-icon name="copy-outline"></ion-icon>Copiar GAS</button>' +
    '</div>';
    html += '<div class="ss-code-block" id="ss-beh-code-output" data-plain="">' + generateCodeHtml(gasCode) + '</div>';

    panel.innerHTML = html;
    var codeEl = panel.querySelector('#ss-beh-code-output');
    if (codeEl) codeEl.dataset.plain = gasCode;
  }

  function _generateBehaviorGas(key, rules) {
    var lines = ['  ' + key + ': Object.freeze({',
      '    _preset: \'' + key + '\',  // [E31] Studio Viewer identifier'];
    Object.keys(rules).forEach(function(k) {
      var v = rules[k];
      var val = typeof v === 'string' ? '"' + v + '"' : String(v);
      lines.push('    ' + k + ': ' + val + ',');
    });
    lines.push('  })');
    return '// TOPOLOGY_PRESETS.' + key + '\n' + lines.join('\n');
  }

  function composerBehaviorAddRule() {
    var key  = (document.getElementById('ss-beh-new-key') || {}).value || '';
    var type = (document.getElementById('ss-beh-new-type') || {}).value || 'string';
    var val  = (document.getElementById('ss-beh-new-val') || {}).value || '';
    if (!key.trim()) return;
    var parsed = val;
    if (type === 'boolean') parsed = val === 'true' || val === '1';
    else if (type === 'integer') parsed = parseInt(val, 10) || 0;
    _composer.behaviorRules[key.trim()] = parsed;
    var p = _activePreset(); // [AR-R2]
    var p = presets.find(function(x){ return x.key === _composer.behaviorKey; });
    if (p) { p.rules = Object.assign({ _preset: p.key }, _composer.behaviorRules); renderBehaviorPanelContent(p); }
  }

  function composerBehaviorRemoveRule(key) {
    delete _composer.behaviorRules[key];
    var p = _activePreset(); // [AR-R2]
    var p = presets.find(function(x){ return x.key === _composer.behaviorKey; });
    if (p) { p.rules = Object.assign({ _preset: p.key }, _composer.behaviorRules); renderBehaviorPanelContent(p); }
  }

  // [AR-R1] Delegates to _copyTabContent (single clipboard implementation)
  function composerBehaviorCopy() {
    var codeEl = document.getElementById('ss-beh-code-output');
    if (!codeEl) return;
    _copyTabContent(codeEl.dataset.plain || codeEl.textContent, 'ss-copy-beh-export', 'Copiar GAS');
  }

  function composerBehaviorNew() {
    var key = prompt('Nombre del nuevo Graph Behavior (ej: FLAT_TAXONOMY):');
    if (!key || !key.trim()) return;
    key = key.trim().toUpperCase().replace(/\s+/g, '_');
    var existing = _getPresetsFromSchemas();
    if (existing.some(function(p){ return p.key === key; })) {
      alert('Ya existe un preset con ese nombre.'); return;
    }
    _composer._customBehaviors = _composer._customBehaviors || [];
    _composer._customBehaviors.push({ key: key, rules: { _preset: key }, users: [] });
    _composer.behaviorKey = key;
    var container = document.getElementById('ss-tab-content');
    if (container) { container.innerHTML = ''; renderBehaviorComposer(container); }
  }

  // ── Entity Select ─────────────────────────────────────────────────────────
  function composerSelectEntity(entityName) {
    // Update sidebar active state
    document.querySelectorAll('.ss-sidebar-item').forEach(function(el) { el.classList.remove('active'); });
    var activeEl = document.getElementById('ss-side-' + entityName);
    if (activeEl) activeEl.classList.add('active');

    var schema = (window.APP_SCHEMAS || {})[entityName];
    if (!schema) return;
    _composer.entityName = entityName;
    _composer.fields     = JSON.parse(JSON.stringify(schema.fields || [])); // deep clone
    _composer.dirty      = false;

    renderComposerPanelContent();

      '</div>' +

      '</div>';
    }).join('');

  // ── Code Generator [GAS Format] ──────────────────────────────────────────────
  // ARCHITECTURE:
  //   generateCodeGas()  → template-aware GAS JS (clipboard payload, direct paste into Schema_Engine.gs)
  //   generateCodeHtml() → syntax-highlighted HTML (display only)
  //
  // Template group detection collapses governed fields back to FIELD_TEMPLATES.* spread refs
  // mirroring exactly how Schema_Engine.gs composes schemas (spread pattern).

  // SYNC [H9]: Must match FIELD_TEMPLATES.* field name order in Schema_Engine.gs.
  var TEMPLATE_SEQUENCES = [
    { key: 'SYSTEM_FIELDS', names: ['lexical_id', 'estado'] },
    { key: 'AUDIT_FIELDS',  names: ['created_at','created_by','updated_at','updated_by','deleted_at','deleted_by'] },
    { key: 'VERSION_FIELD', names: ['version'] }
  ];

  /**
   * Detect whether fields[idx..] starts a known template group.
   * Returns { groupKey, consumed } or null.
   */
  function _detectTemplateAt(fields, idx) {
    for (var t = 0; t < TEMPLATE_SEQUENCES.length; t++) {
      var tpl = TEMPLATE_SEQUENCES[t];
      if (idx + tpl.names.length > fields.length) continue;
      var match = true;
      for (var n = 0; n < tpl.names.length; n++) {
        if (fields[idx + n].name !== tpl.names[n]) { match = false; break; }
      }
      if (match) return { groupKey: tpl.key, consumed: tpl.names.length };
    }
    return null;
  }

  /**
   * Serialize a single field object to a GAS-compatible JS literal.
   * Omits defaults to keep output clean (matches Schema_Engine.gs style).
   */
  function _fieldToGasLiteral(f) {
    var parts = [];
    if (f.name)                         parts.push('name: "' + f.name + '"');
    if (f.type && f.type !== 'text')    parts.push('type: "' + f.type + '"');
    if (f.label)                        parts.push('label: "' + f.label + '"');
    if (f.required)                     parts.push('required: true');
    if (f.width && f.width !== 12)      parts.push('width: ' + f.width);
    if (f.primaryKey)                   parts.push('primaryKey: true');
    if (f.readonly)                     parts.push('readonly: true');
    if (f.relationType)                 parts.push('relationType: "' + f.relationType + '"');
    if (f.defaultValue !== undefined)   parts.push('defaultValue: ' + JSON.stringify(f.defaultValue));
    return '    { ' + parts.join(', ') + ' }';
  }

  /**
   * Generate a GAS-compatible JS block for pasting into Schema_Engine.gs.
   * Governed field groups are collapsed to FIELD_TEMPLATES.* spread references.
   * Dividers become GRAPH_SEPARATOR calls. Custom fields become object literals.
   * This is the clipboard payload — no HTML markup.
   */
  function generateCodeGas(entityName, fields, schema) {
    var pk = schema && schema.primaryKey;
    var lines = [];
    lines.push('  ' + entityName + ': {');
    if (pk) lines.push('    primaryKey: "' + pk + '",');
    lines.push('    fields: [');

    var i = 0;
    while (i < fields.length) {
      var f = fields[i];

      // Skip UI-only dividers (or emit as GRAPH_SEPARATOR for labeled ones)
      if (f.type === 'divider') {
        if (f.label) {
          lines.push('      ...FIELD_TEMPLATES.GRAPH_SEPARATOR("' + f.label + '"),');
        }
        i++;
        continue;
      }

      // Try to match a template group starting at current position
      var tplMatch = _detectTemplateAt(fields, i);
      if (tplMatch) {
        lines.push('      ...FIELD_TEMPLATES.' + tplMatch.groupKey + '(),');
        i += tplMatch.consumed;
        continue;
      }

      // Regular field — emit as JS object literal
      lines.push(_fieldToGasLiteral(f) + ',');
      i++;
    }

    lines.push('    ]');
    lines.push('  }');
    return lines.join('\n');
  }

  /**
   * GAS JS syntax highlighter for display in the code block.
   * Highlights: spread (...), template refs, string values, keywords, numbers.
   * NEVER use for clipboard — use generateCodeGas() directly.
   */
  function generateCodeHtml(plain) {
    return plain
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // Spread + FIELD_TEMPLATES reference  → highlighted in warning color
      .replace(/(\.\.\.FIELD_TEMPLATES\.[A-Z_]+\([^)]*\))/g, '<span class="ss-code-spread">$1</span>')
      // Object keys (word: )
      .replace(/\b([a-zA-Z_]+):/g, '<span class="ss-code-key">$1</span>:')
      // String values
      .replace(/:\s*"([^"]+)"/g, ': <span class="ss-code-str">"$1"</span>')
      // Boolean / numeric values
      .replace(/:\s*(true|false)\b/g, ': <span class="ss-code-bool">$1</span>')
      .replace(/:\s*(-?\d+)\b/g, ': <span class="ss-code-num">$1</span>')
      // Entity name (first identifier on a line followed by :)
      .replace(/^(\s{2})([A-Z][A-Za-z_]+)(<span class="ss-code-key">:)/, '$1<span class="ss-code-entity">$2</span>$3');
  }

  // ── Public Composer Actions ───────────────────────────────────────────────
  function composerAddField() {
    var name     = (document.getElementById('ss-new-name')     || {}).value || '';
    var type     = (document.getElementById('ss-new-type')     || {}).value || 'text';
    var label    = (document.getElementById('ss-new-label')    || {}).value || '';
    var width    = parseInt((document.getElementById('ss-new-width') || {}).value || '6', 10);
    var required = (document.getElementById('ss-new-required') || {}).checked || false;

    name = name.trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
    if (!name) { if (window.showToast) window.showToast('El nombre del campo es requerido', 'warning'); return; }
    if (_composer.fields.some(function(f){ return f.name === name; })) {
      if (window.showToast) window.showToast('Ya existe un campo con ese nombre', 'warning'); return;
    }

    _composer.fields.push({ name: name, type: type, label: label || undefined, width: width, required: required || undefined });
    _composer.dirty = true;
    renderComposerPanelContent();
  }

  function composerRemoveField(idx) {
    var f = _composer.fields[idx];
    if (!f || GOVERNED_FIELD_NAMES.includes(f.name) || f.primaryKey) return;
    _composer.fields.splice(idx, 1);
    _composer.dirty = true;
    renderComposerPanelContent();
  }

  function composerInsertTemplate(templateKey) {
    var group = TEMPLATE_GROUPS[templateKey];
    if (!group) return;
    var existingNames = _composer.fields.map(function(f){ return f.name; });
    var alreadyAll = group.fields.every(function(fd){ var n = typeof fd === 'string' ? fd : fd.name; return existingNames.includes(n); });
    if (alreadyAll) { if (window.showToast) window.showToast(templateKey + ' ya está incluido', 'warning'); return; }
    group.fields.forEach(function(fieldDef) {
      var fn = typeof fieldDef === 'string' ? { name: fieldDef, type: 'hidden' } : fieldDef;
      if (!existingNames.includes(fn.name)) {
        _composer.fields.push(JSON.parse(JSON.stringify(fn)));
      }
    });
    _composer.dirty = true;
    renderComposerPanelContent();
    if (window.showToast) window.showToast(templateKey + ' insertado', 'success');
  }

  function composerReset() {
    if (!_composer.entityName) return;
    var schema = (window.APP_SCHEMAS || {})[_composer.entityName];
    if (!schema) return;
    _composer.fields = JSON.parse(JSON.stringify(schema.fields || []));
    _composer.dirty  = false;
    renderComposerPanelContent();
    if (window.showToast) window.showToast('Campos restaurados desde APP_SCHEMAS', 'success');
  }

  function composerExport() {
    var codeEl = document.getElementById('ss-code-output');
    if (!codeEl) return;
    codeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    composerCopyCode();

  function composerCopyCode() {
    var codeEl = document.getElementById('ss-code-output');
    if (!codeEl) return;
    // [C1-QR][O2-AR] data-plain holds pure JSON; no HTML tag contamination
    var plainText = codeEl.dataset.plain || codeEl.innerText || codeEl.textContent;

    function _onSuccess() {
      var btn = document.getElementById('ss-copy-btn');
      if (btn) {
        btn.innerHTML = '<ion-icon name="checkmark-outline"></ion-icon>Copiado!';
        setTimeout(function(){ btn.innerHTML = '<ion-icon name="copy-outline"></ion-icon>Copiar GAS'; }, 2000);
      }
      if (window.showToast) window.showToast('JSON copiado al portapapeles', 'success');
    }
    function _onError() {
      if (window.showToast) window.showToast('No se pudo copiar automaticamente', 'warning');
    }

    if (navigator.clipboard) {
      // Modern async API (HTTPS / same-origin contexts)
      navigator.clipboard.writeText(plainText).then(_onSuccess).catch(_onError);
    } else {
      // [C1-QR] Fallback: execCommand for HTTP / GAS WebApp iframe contexts
      try {
        var ta = document.createElement('textarea');
        ta.value = plainText;
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        _onSuccess();
      } catch(e) {
        _onError();
      }
    }
  }

  // ── Reconcile Handler ─────────────────────────────────────────────────────
  function runReconcile() {
    var btn = document.getElementById('ss-btn-reconcile');
    if (btn) { btn.disabled = true; btn.innerHTML = '<ion-spinner name="crescent" style="width:14px;height:14px;"></ion-spinner> Reconciliando...'; }

    var statusText = document.getElementById('ss-status-text');
    if (statusText) statusText.textContent = 'Reconciliando...';

    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(report) {
          if (btn) { btn.disabled = false; btn.innerHTML = '<ion-icon name="sync-outline"></ion-icon> Reconciliar DB'; }
          if (statusText) {
            var total = Object.keys(report.entities || {}).length;
            var orphan = (report.orphanedSheets || []).length;
            statusText.textContent = total + ' entidades · ' + orphan + ' hojas huérfanas';
          }
          if (window.showToast) window.showToast('Reconciliación completada', 'success');
          switchTab('db');
        })
        .withFailureHandler(function(err) {
          if (btn) { btn.disabled = false; btn.innerHTML = '<ion-icon name="sync-outline"></ion-icon> Reconciliar DB'; }
          if (window.showToast) window.showToast('Error: ' + (err.message || String(err)), 'danger');
        })
        .runSchemaReconcile();
    } else {
      setTimeout(function() {
        if (btn) { btn.disabled = false; btn.innerHTML = '<ion-icon name="sync-outline"></ion-icon> Reconciliar DB'; }
        if (statusText) statusText.textContent = 'Solo disponible en GAS';
        if (window.showToast) window.showToast('Reconciliación simulada (modo dev)', 'warning');
      }, 1200);
    }
  }


  // ── Context-aware tab export functions [Debug-fix] ─────────────────────────
  // These let Templates and Graph Behavior tabs export their own content,
  // eliminating the confusion of CODE EXPORT always producing entity data.


  // [AR-R2] Private helpers to avoid repeated catalogue.concat().find() pattern
  function _activeTemplate() {
    var all = _TEMPLATE_CATALOGUE.concat(_composer._customTemplates || []);
    return all.find(function(t) { return t.key === _composer.templateKey; }) || null;
    return all.find(function(t) { return t.key === _composer.templateKey; }) || null;
  }
  function _activePreset() {
    return _getPresetsFromSchemas().find(function(p) { return p.key === _composer.behaviorKey; }) || null;
  }
  function _copyTabContent(text, btnId, newLabel) {
    var btn = btnId ? document.getElementById(btnId) : null;
    function onCopied() {
      if (btn) {
        btn.innerHTML = '<ion-icon name="checkmark-outline"></ion-icon>Copiado!';
        setTimeout(function() {
          btn.innerHTML = '<ion-icon name="copy-outline"></ion-icon>' + (newLabel || 'Copiar GAS');
        }, 2000);
      }
    }
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(onCopied).catch(function() {
        var el = document.createElement('textarea'); el.value = text;
        document.body.appendChild(el); el.select(); document.execCommand('copy');
        document.body.removeChild(el); onCopied();
      });
    } else {
      var el = document.createElement('textarea'); el.value = text;
      document.body.appendChild(el); el.select(); document.execCommand('copy');
      document.body.removeChild(el); onCopied();
    }
  }

  function copyTemplatesGas() {
    var lines = [
      '// ─── FIELD_TEMPLATES — Reference Card ─────────────────────────────────',
      '// Paste these spreads into your entity fields array in Schema_Engine.gs:',
      '',
      '  ...FIELD_TEMPLATES.SYSTEM_FIELDS(),    // lexical_id, estado',
      '  ...FIELD_TEMPLATES.AUDIT_FIELDS(),     // created_at/by, updated_at/by, deleted_at/by',
      '  ...FIELD_TEMPLATES.VERSION_FIELD(),    // version (optimistic locking)',
      '  ...FIELD_TEMPLATES.GRAPH_SEPARATOR("Label"),  // section divider',
      '',
      '// Usage pattern:',
      '  MyEntity: {',
      '    primaryKey: "id_entity",',
      '    fields: [',
      '      { name: "id_entity", type: "hidden", primaryKey: true },',
      '      ...FIELD_TEMPLATES.SYSTEM_FIELDS(),',
      '      ...FIELD_TEMPLATES.AUDIT_FIELDS(),',
      '      ...FIELD_TEMPLATES.VERSION_FIELD(),',
      '      ...FIELD_TEMPLATES.GRAPH_SEPARATOR("Datos de Negocio"),',
      '      // ... custom fields',
      '    ]',
      '  }'
    ];
    _copyTabContent(lines.join('\n'), 'ss-copy-templates-btn', 'Copiar Templates GAS');
  }

  function copyPresetsGas() {
    var schemas = window.APP_SCHEMAS || {};
    var presets = Object.entries(schemas)
      .filter(function(e) { return e[0] !== '_UI_CONFIG'; })
      .reduce(function(acc, e) {
        var rules = e[1].topologyRules;
        if (rules && rules._preset && !acc[rules._preset]) {
          acc[rules._preset] = { key: rules._preset, rules: rules, users: [] };
        }
        if (rules && rules._preset) acc[rules._preset].users.push(e[0]);
        return acc;
      }, {});

    var lines = ['// ─── TOPOLOGY_PRESETS — Active Graph Behaviors ──────────────────────────────'];
    Object.values(presets).forEach(function(p) {
      var r = p.rules;
      lines.push('');
      lines.push('  // Used by: ' + p.users.join(', '));
      lines.push('  ' + p.key + ': Object.freeze({');
      Object.keys(r).forEach(function(k) {
        if (k !== '_preset') lines.push('    ' + k + ': ' + JSON.stringify(r[k]) + ',');
      });
      lines.push('  }),');
    });
    _copyTabContent(lines.join('\n'), 'ss-copy-presets-btn', 'Copiar Presets GAS');
  }

      if (!txt) return;
      var entityCount = Object.keys(window.APP_SCHEMAS || {}).filter(function(k){ return k !== '_UI_CONFIG'; }).length;
      txt.textContent = entityCount + ' entidades en schema';
      if (dot) dot.style.color = '#a5f3a5';
    }
  };

})();
</script>

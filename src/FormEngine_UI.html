
<script>
    /**
     * FormEngine_UI.html
     *
     * Client-side logic for dynamic UI generation.
     * Mobile-First: Strictly generates Ionic Web Components (<ion-*>).
     * Rule 5.1: Progressive Disclosure (Wizards).
     * Rule 5.2: Responsive Native Grids.
     */
 
    (function (global) {
        // Estado Global de Edición (Directiva 1)
        global.currentEditId = null;

        /**
         * Resolutor de opciones genérico para Dominios completos
         * (Requerido por M:N Subgrid en N-Dimensional Graph)
         */
        global.getDominioOptions = function(formCurrentState) {
            const cache = (window.__APP_CACHE__ && window.__APP_CACHE__['Dominio']) ? window.__APP_CACHE__['Dominio'] : [];
            const active = cache.filter(r => r.estado !== 'Eliminado');
            return active.map(p => ({
                value: p.id_dominio || p.id_registro,
                label: `[Nivel ${p.nivel_tipo}] ${p.nombre_ingles || p.n0_es || p.nombre || p.id_registro}`
            }));
        };

        /**
         * Resolutor de opciones (Limitado) para "Dominio Padre"
         * Usado por reliquias planas o vistas restrictivas.
         * Filtra desde el caché 100% Zero-Latency.
         */
        global.getDominiosPadreOptions = function(formCurrentState) {
            if (!formCurrentState) {
                const activeForm = document.querySelector('ion-modal');
                if (activeForm) {
                    const inputs = activeForm.querySelectorAll('ion-input, ion-select');
                    formCurrentState = Array.from(inputs).map(inp => ({ name: inp.name, value: inp.value }));
                } else {
                    formCurrentState = [];
                }
            }

            const nivelObj = formCurrentState.find(c => c.name === 'nivel_tipo');
            if (!nivelObj || !nivelObj.value) return [];
            
            const currentNivel = parseInt(nivelObj.value, 10);
            if (isNaN(currentNivel) || currentNivel <= 0) return []; // Strict N>0
            
            const cache = (window.__APP_CACHE__ && window.__APP_CACHE__['Dominio']) ? window.__APP_CACHE__['Dominio'] : [];
            const validParents = cache.filter(r => parseInt(r.nivel_tipo, 10) === currentNivel - 1 && r.estado !== 'Eliminado');
            
            return validParents.map(p => ({
                value: p.id_dominio || p.id_registro,
                label: `[Nivel ${p.nivel_tipo}] ${p.nombre_ingles || p.n0_es || p.nombre || p.id_registro}`
            }));
        };

        /* ─────────────────────────────────────────────────────────────────
           NOTA ARQUITECTURA (S7.1): Component Factory _buildSearchableMulti 
           fue extraída a UI_Components.html para cumplir reglas SOLID/H11.
           ─────────────────────────────────────────────────────────────── */

        /* ─────────────────────────────────────────────────────────────────
           PURE UTILITY FUNCTIONS (no side-effects, fully testable)
           ─────────────────────────────────────────────────────────────── */

        /**
         * Normaliza un ID de registro: trim + uppercase.
         * Garantiza comparaciones robustas con IDs sucios (espacios u otro case).
         */
        function _normalizeId(id) {
            return String(id || '').trim().toUpperCase();
        }

        /**
         * isRecordLinked(recordId, linkedRecordsArray, pkField)
         * Función pura: devuelve true si recordId ya está en la lista vinculada.
         * Maneja IDs sucios (espacios, diferencias de mayúsculas).
         *
         * @param {string} recordId       - ID del registro candidato a vincular.
         * @param {Array}  linkedRecords  - Arreglo de registros ya vinculados.
         * @param {string} pkField        - Campo PK dentro de linkedRecords.
         * @returns {boolean}
         */
        function isRecordLinked(recordId, linkedRecords, pkField) {
            const normalizedCandidate = _normalizeId(recordId);
            return (linkedRecords || []).some(r => _normalizeId(r[pkField]) === normalizedCandidate);
        }

        /**
         * _patchFrontendCache (H11 Simplification)
         * Inyección limpia en caché local post-Server Confirmation.
         */
        function _patchFrontendCache(entityName, response, payload) {
            if (!window.__APP_CACHE__) return;

            // 1. Root Entity Injection
            if (window.__APP_CACHE__[entityName] && Array.isArray(window.__APP_CACHE__[entityName])) {
                let pkField = response.pk;
                let pkValue = response.pkValue;

                if (!pkField || !pkValue) {
                    pkField = Object.keys(payload).find(k => k.startsWith('id_'));
                    pkValue = pkField ? payload[pkField] : null;
                }

                if (!pkField || !pkValue) {
                    const meta = (window.DataViewEngine && typeof window.DataViewEngine._getState === 'function')
                        ? window.DataViewEngine._getState().entityMeta
                        : null;
                    pkField = meta && meta.idField ? meta.idField : pkField;
                    pkValue = pkField ? payload[pkField] : null;
                }

                if (pkField && pkValue) {
                    const cleanRecord = { ...payload, [pkField]: pkValue };
                    const liveData = window.__APP_CACHE__[entityName];
                    const existingIdx = liveData.findIndex(r => _normalizeId(r[pkField]) === _normalizeId(pkValue));

                    window.__APP_CACHE__[entityName] = existingIdx !== -1
                        ? [...liveData.slice(0, existingIdx), cleanRecord, ...liveData.slice(existingIdx + 1)]
                        : [cleanRecord, ...liveData];

                    console.log(`[Cache] ${existingIdx !== -1 ? 'UPDATE' : 'INSERT'} para: ${entityName} [${pkField}=${pkValue}]. Total: ${window.__APP_CACHE__[entityName].length}`);
                } else {
                    console.warn(`[Cache] No se pudo resolver pkField/pkValue para ${entityName}. Cache no actualizado.`);
                }
            }

            // 2. Inyección Dinámica para Entidades Anidadas (Subgrids 0.0s latency)
            if (response.data && response.data.orchestratedChildren) {
                const orch = response.data.orchestratedChildren;
                Object.keys(orch).forEach(childEntity => {
                    if (Array.isArray(window.__APP_CACHE__[childEntity])) {
                        const freshChildren = orch[childEntity] || [];
                        const childPkField = 'id_' + childEntity.toLowerCase().replace(/s$/, '').replace(/es$/, '');
                        
                        let currentCache = [...window.__APP_CACHE__[childEntity]];
                        freshChildren.forEach(newChild => {
                            const cid = newChild[childPkField] || newChild['id_' + childEntity.toLowerCase()];
                            const idx = currentCache.findIndex(c => (c[childPkField] === cid) || (c['id_' + childEntity.toLowerCase()] === cid));
                            if (idx !== -1) {
                                currentCache = [...currentCache.slice(0, idx), newChild, ...currentCache.slice(idx + 1)];
                            } else {
                                currentCache = [newChild, ...currentCache]; // prepend
                            }
                        });
                        window.__APP_CACHE__[childEntity] = currentCache;
                        console.log(`[Cache] Inyectados ${freshChildren.length} registros anidados en caché de ${childEntity}`);
                    }
                });
            }
        }

        // Exponer para pruebas unitarias (solo en entornos sin google.script)
        if (typeof module !== 'undefined' && module.exports) {
            module.exports = { isRecordLinked, _normalizeId, _patchFrontendCache };
        }

        global.renderForm = async function (entityName, data = null) {
            // Asegurar reset de estado al abrir formulario nuevo (Directiva 1)
            global.currentEditId = null;
            window._lastSection = null; // Reset de secciones UI
            
            // Construcción del Modal de la Vista de Formularios (Keyboard-Aware Fix)
            const modal = document.createElement('ion-modal');
            global.currentFormModal = modal;
            
            // Header Nativo del Modal
            const header = document.createElement('ion-header');
            header.innerHTML = `
              <ion-toolbar>
                <ion-title>Taxonomia: ${window.formatEntityName(entityName)}</ion-title>
                <ion-buttons slot="end">
                  <ion-button onclick="if(window.currentFormModal) { window.currentFormModal.dismiss().then(() => window.currentFormModal.remove()); }">Cerrar</ion-button>
                </ion-buttons>
              </ion-toolbar>
            `;
            modal.appendChild(header);

            // Reemplazamos 'container' por el Content Nativo
            const container = document.createElement('ion-content');
            container.className = 'ion-padding';
            modal.appendChild(container);

            const schemas = global.APP_SCHEMAS;
            if (!schemas || !schemas[entityName]) {
                throw new Error("Schema not found for entity: " + entityName);
            }

            const schemaDef = schemas[entityName];
            // Normalize schema definition (flat array vs object containing steps)
            let fields = [];
            let steps = schemaDef.steps || null;

            if (Array.isArray(schemaDef)) {
                fields = schemaDef;
            } else if (schemaDef.fields) {
                fields = schemaDef.fields;
            } else {
                // Default to Portfolio Canvas layout
                fields = Object.keys(schemaDef).map(k => ({ name: k, ...schemaDef[k] }));

                if (!steps) {
                    const extractedGroups = [...new Set(fields.map(f => f.group).filter(Boolean))];
                    if (extractedGroups.length > 0) steps = extractedGroups;
                }

                // Map 'group' to 'step' for backward UI layout compatibility
                fields.forEach(f => {
                    if (f.group && !f.step) f.step = f.group;
                });
            }

            // --- MATH ENGINES (Delegado a Math_Engine.js universal) ---
            global.getGenericOrdenPath = function(formStateObj, params) {
                const cache = (window.__APP_CACHE__ && window.__APP_CACHE__[params.entity]) ? window.__APP_CACHE__[params.entity] : [];
                return window.Math_Engine ? window.Math_Engine.buildOrdenPath(formStateObj, params, cache) : '';
            };

            global.getGenericPathName = function(formStateObj, params) {
                const cache = (window.__APP_CACHE__ && window.__APP_CACHE__[params.entity]) ? window.__APP_CACHE__[params.entity] : [];
                return window.Math_Engine ? window.Math_Engine.buildPathName(formStateObj, params, cache) : '';
            };

            // --- DEPENDENCY RESOLVER: lookupSource Universal (Metadata-Driven) ---
            /**
             * Escanea el schema en busca de campos con `lookupSource`.
             * Llama en paralelo a cada función backend y rellena field.options.
             * Muestra ion-loading mientras resuelve; non-fatal si un lookup falla.
             */
            async function _resolveLookupSources(fields) {
                const fieldsWithLookup = [];
                fields.forEach(f => {
                    if (f.lookupSource || (f.type === 'relation' && f.targetEntity)) {
                        fieldsWithLookup.push(f);
                    }
                    if (f.type === 'dynamic_list' && f.subFields) {
                        f.subFields.forEach(sub => {
                            if (sub.lookupSource) fieldsWithLookup.push(sub);
                        });
                    }
                });
                if (fieldsWithLookup.length === 0) return;

                const loading = document.createElement('ion-loading');
                loading.message = 'Cargando opciones...';
                loading.spinner = 'crescent';
                document.body.appendChild(loading);
                await loading.present();

                try {
                    const promises = fieldsWithLookup.map(field => new Promise((resolve) => {
                        // REGLA SGMP (Bugfix): Intercepción Local (Zero-Latency)
                        const localResolver = window[field.lookupSource] || global[field.lookupSource];
                        if (field.lookupSource && typeof localResolver === 'function') {
                            const result = localResolver();
                            if (result instanceof Promise) {
                                result.then(opts => { field.options = opts || []; resolve(); }).catch(() => { field.options = []; resolve(); });
                            } else {
                                field.options = result || [];
                                resolve();
                            }
                            return; // Salir prematuramente, no llamar al backend
                        }

                        if (typeof google !== 'undefined' && google.script && google.script.run) {
                            const handler = google.script.run
                                .withSuccessHandler(opts => { field.options = opts || []; resolve(); })
                                .withFailureHandler(err => {
                                    console.error(`[FormEngine] lookupSource falló:`, err);
                                    resolve(); 
                                });
                            
                            if (field.lookupSource) {
                                handler[field.lookupSource]();
                            } else if (field.type === 'relation' && field.targetEntity) {
                                // Dynamic lookup for relations (Rules 15)
                                handler.getInitialPayload(field.targetEntity);
                            }
                        } else {
                            // Modo dev local
                            field.options = [{ value: 'MOCK-1', label: `Mock: ${field.lookupSource || field.targetEntity}` }];
                            resolve();
                        }
                    }));
                    await Promise.all(promises);
                } finally {
                    try {
                        await loading.dismiss();
                    } catch (_) {
                        // Race condition: Ionic overlay ya fue desreferenciado por mutación del DOM.
                        // Fallback: eliminar el elemento directamente.
                        if (loading.parentNode) loading.parentNode.removeChild(loading);
                    }
                }
            }
            // -----------------------------------------------------------------

            await _resolveLookupSources(fields);



            // Referencias al Split-Pane Layout
            const headerTitle = document.getElementById('main-header-title');
            const backBtn = document.getElementById('global-back-btn');

            if (headerTitle) headerTitle.textContent = (global.currentEditId ? "Editar: " : "Nuevo: ") + window.formatEntityName(entityName);
            if (backBtn) {
                backBtn.style.display = 'block';
                // Enrutamiento de la Flecha de Retroceso (Back Button) -> DataView
                backBtn.onclick = function() {
                    // Limpieza proactiva del formulario actual
                    while (container.firstChild) container.removeChild(container.firstChild);
                    if (window.DataViewEngine) {
                        window.DataViewEngine.render(entityName, 'app-container');
                    } else {
                        window.returnToDashboard();
                    }
                };
            }

            // Preparar Sidebar Contextual
            if (typeof window.showFormSidebar === 'function') {
                window.showFormSidebar(entityName);
            }

            // Reparación Crítica: Instanciar variable solicitada por el Stepper
            const sidebarList = document.getElementById('sidebarList');
            const sidebarSteps = document.getElementById('form-steps-container');

            // Validación de seguridad (Rule 5.3: Fault Tolerance)
            if (!sidebarList) {
                console.error("[FormEngine] No se encontró el contenedor #sidebarList en el DOM.");
                return;
            }

            const card = document.createElement('ion-card');
            card.style.borderRadius = 'var(--rounded-md)'; // Redondeo Figma
            card.style.boxShadow = 'var(--shadow-floating)'; // Sombra suave Figma

            const cardContent = document.createElement('ion-card-content');
            cardContent.style.padding = 'var(--spacing-6)';
            card.appendChild(cardContent);

            // Progressive Disclosure (Rule 5.1) - Contenedores Lógicos
            let stepContainers = {};
            let menuItems = {};
            const semanticIcons = {
                'Datos Personales': 'person-outline',
                'Ubicación': 'location-outline',
                'Corporativo': 'business-outline',
                'Operativa': 'briefcase-outline'
            };
            const defaultIcons = ['folder-open-outline', 'list-outline', 'options-outline', 'analytics-outline'];

            // 1. Extracción Dinámica de Menú (Secciones)
            const extractedSections = [...new Set(fields.filter(f => f.section).map(f => f.section))];
            if (extractedSections.length > 0) steps = extractedSections;
            if (!steps || steps.length === 0) steps = ['Configuración General'];

            // Estado y Linear Wizard
            let currentStepIndex = 0;
            const totalSteps = steps.length;

            // Indicador de Progreso
            let progressLabel = document.createElement('h3');
            progressLabel.style.color = 'var(--ion-color-medium)';
            progressLabel.style.fontSize = 'var(--sys-font-small)';
            progressLabel.style.marginTop = '0';
            progressLabel.style.marginBottom = '20px';
            progressLabel.style.fontWeight = '600';
            progressLabel.style.textTransform = 'uppercase';
            progressLabel.style.letterSpacing = '1px';
            cardContent.appendChild(progressLabel);

            // 2. Renderizado del Menú Lateral y Contenedores
            if (sidebarSteps) sidebarSteps.innerHTML = ''; // Vaciar contenedor lateral por seguridad

            steps.forEach((stepName, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.id = 'form-section-' + stepName.replace(/\s+/g, '-');
                stepDiv.style.display = index === 0 ? 'block' : 'none';
                stepContainers[stepName] = stepDiv;

                if (sidebarSteps) {
                    const item = document.createElement('ion-item');
                    item.button = true; // Efecto Ripple interactivo
                    item.setAttribute('lines', 'none');
                    item.style.borderRadius = '8px';
                    item.style.margin = '4px 12px';
                    item.style.setProperty('--min-height', '44px');
                    if (index === 0) item.style.setProperty('--background', 'var(--ion-color-step-100)');
                    
                    item.onclick = () => {
                        window.goToFormSection(stepName);
                        // Al estar en el listener, window.goToFormSection ya se encargará de sincronizar el currentStepIndex
                    };

                    const icon = document.createElement('ion-icon');
                    const iconName = semanticIcons[stepName] || defaultIcons[index % defaultIcons.length];
                    icon.setAttribute('name', iconName);
                    icon.setAttribute('slot', 'start');
                    if (index === 0) icon.setAttribute('color', 'primary');

                    const label = document.createElement('ion-label');
                    label.textContent = stepName;
                    label.style.fontWeight = '500';
                    if (index === 0) label.setAttribute('color', 'primary');

                    item.appendChild(icon);
                    item.appendChild(label);
                    sidebarSteps.appendChild(item);

                    menuItems[stepName] = { item, icon, label };
                }

                cardContent.appendChild(stepDiv);
            });

            // Iniciar Grillas Responsivas (Rule 5.2) por contenedor lógico
            const rows = {};
            Object.keys(stepContainers).forEach(key => {
                // Título de sección dentro del card
                const sectionTitle = document.createElement('h2');
                sectionTitle.textContent = (key === 'default' ? 'Configuración General' : key);
                sectionTitle.style.color = 'var(--ion-text-color)';
                sectionTitle.style.fontSize = 'var(--sys-font-h3)';
                sectionTitle.style.fontWeight = '600';
                sectionTitle.style.marginTop = '0';
                sectionTitle.style.marginBottom = '20px';
                stepContainers[key].appendChild(sectionTitle);

                const grid = document.createElement('ion-grid');
                grid.style.padding = '0';
                const row = document.createElement('ion-row');
                grid.appendChild(row);

                stepContainers[key].appendChild(grid);
                rows[key] = row; // Referencia rápida para inyectar las columnas (fields)
            });

            // Generación Segura de Componentes con Theming Activo
            fields.forEach(field => {
                // Soporte nativo y rápido para campos ocultos fuera del Grid UI
                if (field.type === 'hidden') {
                    const hiddenInput = document.createElement('input');
                    hiddenInput.setAttribute('type', 'hidden');
                    hiddenInput.setAttribute('name', field.name);
                    
                    if (field.primaryKey) {
                        const prefix = entityName.substring(0, 4).toUpperCase();
                        const sufix = Math.random().toString(36).substring(2, 7).toUpperCase();
                        hiddenInput.value = `${prefix}-${sufix}`;
                    } else if (field.defaultValue !== undefined) {
                        hiddenInput.value = field.defaultValue;
                    }

                    container.appendChild(hiddenInput); // Global persistency
                    return; // Skip drawing UI columns
                }

                // REGLA DE EXCLUSIÓN: Campos 'relation' sin uiComponent son manejados por el Subgrid component.
                if ((field.type === 'relation' && !field.uiComponent) || field.type === 'subgrid') {
                    return; // Skip — renderSubgrid() lo maneja en su propio flujo
                }

                // 3. Distribución de Campos JIT por Sección
                if (!field.section || !field.width) {
                    console.warn(`[FormEngine] ALERTA: La entidad ${entityName} se está renderizando con valores por defecto. Falta 'section' o 'width' en el campo '${field.name}'. Actualice al Blueprint V3.`);
                    field.section = field.section || "Datos Generales";
                    field.width = field.width || 12;
                }
                const targetRowName = field.section || steps[0];
                let targetRow = rows[targetRowName] || rows[Object.keys(rows)[0]];

                // Generar Columna Ionic Responsive
                const ionCol = document.createElement('ion-col');
                ionCol.setAttribute('size', '12'); // Mobile: ancho completo
                if (field.width) {
                    ionCol.setAttribute('size-md', String(field.width)); // Desktop: respeta el width en grid 12-columnas
                } else {
                    ionCol.setAttribute('size-md', '12'); // Desktop: ancho completo por defecto
                }

                // Usamos ion-input nativo pero configurando su "fill" y "label-placement"
                // para emular el Figma (label arriba transparente, caja contorno)
                let inputEl;

                let isComplex = false;

                switch (field.type) {
                    case 'relation':
                        inputEl = document.createElement('div');
                        inputEl.setAttribute('data-relation-type', field.relationType || 'relacionado');
                        inputEl.style.width = '100%';
                        inputEl.style.marginBottom = '10px';
                        
                        const liveData = (window.__APP_CACHE__ && window.__APP_CACHE__[field.targetEntity]) ? window.__APP_CACHE__[field.targetEntity] : [];
                        const activeData = liveData.filter(d => d.estado !== 'Eliminado' && typeof d === 'object');
                        
                        let initialValues = [];
                        
                        // UAT Point 3: Auto-populate existing relation records using Zero-Latency Graph resolution
                        if (field.isTemporalGraph && field.graphEntity && window.__APP_CACHE__ && window.__APP_CACHE__[field.graphEntity]) {
                            const currentPK = data ? (data.id_dominio || data.id_registro) : null;
                            if (currentPK) {
                                const aristas = window.__APP_CACHE__[field.graphEntity].filter(e => e.es_version_actual !== false);
                                if (field.relationType === 'padre') {
                                    // Mis padres (mi PK está en id_nodo_hijo)
                                    initialValues = aristas.filter(e => _normalizeId(e.id_nodo_hijo) === _normalizeId(currentPK)).map(e => _normalizeId(e.id_nodo_padre));
                                } else if (field.relationType === 'hijo') {
                                    // Mis hijos (mi PK está en id_nodo_padre)
                                    initialValues = aristas.filter(e => _normalizeId(e.id_nodo_padre) === _normalizeId(currentPK)).map(e => _normalizeId(e.id_nodo_hijo));
                                }
                            }
                        } else if (data && data[field.name]) {
                            try {
                                initialValues = Array.isArray(data[field.name]) ? data[field.name] : JSON.parse(data[field.name]);
                            } catch(e) { initialValues = (typeof data[field.name] === 'string') ? [data[field.name]] : []; } // fallback
                        }

                        if (field.uiComponent === 'searchable_multi') {
                            isComplex = true;
                            // Constructor del Componente Searchable+Chips Modal-like Inline
                            window._buildSearchableMulti(inputEl, field, activeData, initialValues);
                        } else if (field.uiComponent === 'select_single') {
                            const basicSel = document.createElement('ion-select');
                            basicSel.setAttribute('interface', window.innerWidth < 768 ? 'action-sheet' : 'popover');
                            basicSel.setAttribute('name', field.name);
                            basicSel.setAttribute('label', field.label);
                            basicSel.setAttribute('label-placement', 'stacked');
                            basicSel.setAttribute('fill', 'outline');
                            
                            // Prevent overlapping by adding a tiny margin
                            basicSel.style.marginBottom = '12px';

                            // Empty Default "Ninguno"
                            const emptyOpt = document.createElement('ion-select-option');
                            emptyOpt.value = "";
                            emptyOpt.textContent = "— Sin asignar —";
                            basicSel.appendChild(emptyOpt);

                            // Set initial value for single select
                            if (initialValues.length > 0) {
                                basicSel.value = initialValues[0];
                            }
                            
                            activeData.forEach(d => {
                                const opt = document.createElement('ion-select-option');
                                opt.value = typeof d[field.valueField] !== 'undefined' ? d[field.valueField] : d.id_registro;
                                opt.textContent = `[${opt.value}] ${typeof d[field.labelField] !== 'undefined' ? d[field.labelField] : d.nombre}`;
                                basicSel.appendChild(opt);
                            });
                            inputEl.appendChild(basicSel);
                        }
                        break;

                    case 'text':
                    case 'number':
                    case 'date':
                        inputEl = document.createElement('ion-input');
                        inputEl.setAttribute('type', field.type);
                        // Autogenerar UUID corto si es un ID readonly
                        if (field.readonly && field.name.startsWith('id_')) {
                            const prefix = entityName.substring(0, 4).toUpperCase();
                            const sufix = Math.random().toString(36).substring(2, 7).toUpperCase();
                            inputEl.value = `${prefix}-${sufix}`;
                        }
                        break;
                    case 'textarea':
                        inputEl = document.createElement('ion-textarea');
                        inputEl.setAttribute('rows', '4');
                        break;
                    case 'select':
                        inputEl = document.createElement('ion-select');
                        inputEl.setAttribute('interface', window.innerWidth < 768 ? 'action-sheet' : 'popover');
                        if (field.options && Array.isArray(field.options)) {
                            field.options.forEach(opt => {
                                const ionOption = document.createElement('ion-select-option');
                                if (typeof opt === 'object' && opt !== null) {
                                    ionOption.value = opt.value;
                                    ionOption.textContent = opt.label;
                                } else {
                                    ionOption.value = opt;
                                    ionOption.textContent = opt;
                                }
                                inputEl.appendChild(ionOption);
                            });
                        }
                        break;
                    case 'dynamic_list': {
                        isComplex = true;
                        inputEl = document.createElement('div');
                        inputEl.setAttribute('data-dynamic-list', field.name);
                        inputEl.style.border = '0px solid var(--ion-border-color)';
                        inputEl.style.padding = '0px';
                        inputEl.style.marginBottom = 'var(--spacing-4)';
                        
                        const dlHeader = document.createElement('div');
                        dlHeader.style.fontSize = 'var(--sys-font-small)';
                        dlHeader.style.color = 'var(--ion-color-medium)';
                        dlHeader.style.marginBottom = '8px';
                        dlHeader.style.paddingLeft = '5px';
                        dlHeader.textContent = field.label + (field.required ? ' *' : '');
                        inputEl.appendChild(dlHeader);

                        const listRowsContainer = document.createElement('div');
                        inputEl.appendChild(listRowsContainer);

                        const addBtn = document.createElement('ion-button');
                        addBtn.setAttribute('fill', 'outline');
                        addBtn.setAttribute('size', 'small');
                        addBtn.innerHTML = `<ion-icon slot="start" name="add"></ion-icon> Agregar`;
                        
                        let initialData = [];
                        if (data && data[field.name]) {
                            try {
                                initialData = typeof data[field.name] === 'string' ? JSON.parse(data[field.name]) : data[field.name];
                            } catch(e) {}
                        }
                        
                        const createRow = (rowData = {}) => {
                            const row = document.createElement('ion-row');
                            row.classList.add('dynamic-list-row');
                            row.style.alignItems = 'center';
                            row.style.marginBottom = 'var(--spacing-2)';

                            field.subFields.forEach(sub => {
                                const col = document.createElement('ion-col');
                                col.setAttribute('size-md', String(sub.width || 12));
                                col.setAttribute('size', '12');

                                const subInput = document.createElement(sub.type === 'select' ? 'ion-select' : 'ion-input');
                                subInput.setAttribute('name', sub.name);
                                subInput.setAttribute('label', sub.label);
                                subInput.setAttribute('label-placement', 'floating');
                                subInput.setAttribute('fill', 'outline');
                                subInput.style.setProperty('--background', 'var(--ion-color-step-100)');
                                
                                if (rowData[sub.name]) {
                                    subInput.value = rowData[sub.name];
                                }

                                if (sub.type === 'select' && sub.lookupSource) {
                                    subInput.setAttribute('interface', window.innerWidth < 768 ? 'action-sheet' : 'popover');
                                    if (sub.options && Array.isArray(sub.options)) {
                                        sub.options.forEach(opt => {
                                            const ionOption = document.createElement('ion-select-option');
                                            ionOption.value = (typeof opt === 'object' && opt !== null) ? opt.value : opt;
                                            ionOption.textContent = (typeof opt === 'object' && opt !== null) ? opt.label : opt;
                                            subInput.appendChild(ionOption);
                                        });
                                    }
                                }
                                col.appendChild(subInput);
                                row.appendChild(col);
                            });

                            const delCol = document.createElement('ion-col');
                            delCol.setAttribute('size-md', '1');
                            delCol.setAttribute('size', '2');
                            const delBtn = document.createElement('ion-button');
                            delBtn.setAttribute('color', 'danger');
                            delBtn.setAttribute('fill', 'clear');
                            delBtn.innerHTML = '<ion-icon name="trash-outline"></ion-icon>';
                            delBtn.onclick = () => row.remove();
                            
                            delCol.appendChild(delBtn);
                            row.appendChild(delCol);

                            listRowsContainer.appendChild(row);
                        };

                        if (initialData.length > 0 && Array.isArray(initialData)) {
                            initialData.forEach(item => createRow(item));
                        }

                        addBtn.onclick = () => createRow();

                        inputEl.appendChild(addBtn);
                        break;
                    }
                    case 'lookup':
                        inputEl = document.createElement('ion-input');
                        inputEl.setAttribute('readonly', 'true');
                        break;
                    case 'chip-input':
                        isComplex = true;
                        inputEl = document.createElement('div');
                        inputEl.style.marginBottom = 'var(--spacing-4)';

                        // Etiqueta del campo
                        const cLabel = document.createElement('div');
                        cLabel.style.fontSize = 'var(--sys-font-small)';
                        cLabel.style.color = 'var(--ion-color-medium)';
                        cLabel.style.marginBottom = '4px';
                        cLabel.style.paddingLeft = '5px';
                        cLabel.textContent = field.label + (field.required ? ' *' : '');
                        inputEl.appendChild(cLabel);

                        // Contenedor del Input y Botón
                        const chipItem = document.createElement('ion-item');
                        chipItem.setAttribute('lines', 'none');
                        chipItem.style.setProperty('--background', 'var(--ion-color-step-100)');
                        chipItem.style.borderRadius = 'var(--rounded-sm)';
                        chipItem.style.marginBottom = 'var(--spacing-2)';
                        chipItem.style.border = '1px solid var(--ion-color-step-300)';

                        const innerInput = document.createElement('ion-input');
                        innerInput.setAttribute('placeholder', `Añadir ${field.label}...`);

                        const addBtn = document.createElement('ion-button');
                        addBtn.setAttribute('slot', 'end');
                        addBtn.setAttribute('fill', 'clear');
                        addBtn.textContent = 'Agregar';

                        chipItem.appendChild(innerInput);
                        chipItem.appendChild(addBtn);

                        // Contenedor visual de Chips
                        const chipContainer = document.createElement('div');
                        chipContainer.className = 'chip-container';
                        chipContainer.setAttribute('data-chip-name', field.name);
                        chipContainer.style.display = 'flex';
                        chipContainer.style.flexWrap = 'wrap';
                        chipContainer.style.gap = 'var(--spacing-2)';

                        inputEl.appendChild(chipItem);
                        inputEl.appendChild(chipContainer);

                        // Lógica de adición
                        const addChip = () => {
                            const val = innerInput.value.trim();
                            if (val) {
                                const chip = document.createElement('ion-chip');
                                chip.setAttribute('color', 'primary');

                                const chipLabel = document.createElement('ion-label');
                                chipLabel.textContent = val;

                                const chipIcon = document.createElement('ion-icon');
                                chipIcon.setAttribute('name', 'close-circle');
                                chipIcon.addEventListener('click', () => { chip.remove(); });

                                chip.appendChild(chipLabel);
                                chip.appendChild(chipIcon);
                                chipContainer.appendChild(chip);

                                innerInput.value = '';
                            }
                        };

                        addBtn.addEventListener('click', addChip);
                        innerInput.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                addChip();
                            }
                        });
                        break;
                    default:
                        inputEl = document.createElement('ion-input');
                        inputEl.setAttribute('type', 'text');
                }

                if (!isComplex) {
                    inputEl.setAttribute('label', field.label + (field.type === 'lookup' ? ' (Buscar ' + field.lookupTarget + ')' : ''));
                    inputEl.setAttribute('label-placement', 'floating');
                    inputEl.setAttribute('fill', 'outline');
                    inputEl.setAttribute('name', field.name);
                    inputEl.style.marginBottom = 'var(--spacing-4)';
                    inputEl.style.setProperty('--background', 'var(--ion-color-step-100)');
                    inputEl.style.borderRadius = 'var(--rounded-sm)';

                    if (field.required) inputEl.setAttribute('required', 'true');
                    if (field.readonly && field.type !== 'lookup') {
                        inputEl.setAttribute('readonly', 'true');
                        inputEl.readonly = true;
                    }
                }

                ionCol.appendChild(inputEl);
                targetRow.appendChild(ionCol);
            });

            // --- FUNCTION: renderSubgrid (Regla 15 UI) ---
            async function renderSubgrid(field, container) {
                const subgridDiv = document.createElement('div');
                subgridDiv.style.border = '1px solid var(--ion-border-color)';
                subgridDiv.style.borderRadius = '8px';
                subgridDiv.style.overflow = 'hidden';
                subgridDiv.style.marginBottom = '20px';

                // Header de la mini-tabla
                const header = document.createElement('div');
                header.style.background = 'var(--ion-color-light)';
                header.style.padding = '10px 15px';
                header.style.display = 'flex';
                header.style.justifyContent = 'space-between';
                header.style.alignItems = 'center';
                header.innerHTML = `<strong style="color:var(--ion-color-dark)">${field.label}</strong>`;

                const addBtn = document.createElement('ion-button');
                addBtn.setAttribute('size', 'small');
                addBtn.setAttribute('fill', 'clear');
                addBtn.innerHTML = '<ion-icon slot="start" name="add-outline"></ion-icon> Agregar';
                header.appendChild(addBtn);
                subgridDiv.appendChild(header);

                // Body (Lista)
                const list = document.createElement('ion-list');
                list.setAttribute('lines', 'full');
                list.style.padding = '0';
                subgridDiv.appendChild(list);

                const emptyState = document.createElement('div');
                emptyState.style.padding = '20px';
                emptyState.style.textAlign = 'center';
                emptyState.innerHTML = `<ion-icon name="layers-outline" color="medium" style="font-size:32px"></ion-icon><p style="color:var(--ion-color-medium); font-size:12px">Sin registros vinculados</p>`;
                list.appendChild(emptyState);

                // Estado local del subgrid
                // Hydration check: if data[field.name] exists, use it
                const childRecords = (data && Array.isArray(data[field.name])) ? [...data[field.name]] : [];
                window.__APP_CACHE__ = window.__APP_CACHE__ || {};
                window.__APP_CACHE__.nestedData = window.__APP_CACHE__.nestedData || {};
                window.__APP_CACHE__.nestedData[field.name] = childRecords;

                const _refreshList = () => {
                    list.innerHTML = '';
                    if (childRecords.length === 0) {
                        list.appendChild(emptyState);
                        return;
                    }
                    childRecords.forEach((record, idx) => {
                        const item = document.createElement('ion-item');
                        item.innerHTML = `
                            <ion-label>
                                <h2>${record.nombre || 'Sin nombre'}</h2>
                                <p>${record.estado || 'Nuevo'}</p>
                            </ion-label>
                            <ion-button slot="end" fill="clear" color="danger" id="del-${idx}">
                                <ion-icon name="trash-outline"></ion-icon>
                            </ion-button>
                        `;
                        list.appendChild(item);
                        item.querySelector(`#del-${idx}`).onclick = () => {
                            childRecords.splice(idx, 1);
                            _refreshList();
                        };
                    });
                };

                // Initial hydration
                _refreshList();

                addBtn.onclick = async () => {
                    // Optimized UX: Select OR Create
                    const modal = document.createElement('ion-modal');
                    const modalId = 'modal-' + field.name;
                    modal.id = modalId;
                    
                    const lookupSource = field.options || (window._LOOKUP_DATA && window._LOOKUP_DATA[field.name]) || [];
                    let normalizedOptions = Array.isArray(lookupSource) ? lookupSource : [];
                    
                    if (lookupSource.data && lookupSource.lookups) {
                         // If it came from getInitialPayload (Tuples)
                         const headers = lookupSource.data.headers;
                         const rows = lookupSource.data.rows.map(tuple => {
                             const obj = {};
                             headers.forEach((h, i) => obj[h] = tuple[i]);
                             return obj;
                         });
                         // Map to {value, label}
                         const pkField = Object.keys(rows[0] || {}).find(k => k.startsWith('id_'));
                         if (pkField) {
                             normalizedOptions = rows.map(r => ({ value: r[pkField], label: r.nombre || r.nombre_producto || r[pkField] }));
                         }
                    }

                    // Determinar la PK real del hijo basada en la entidad destino
                    const tableKey = field.targetEntity.toLowerCase();
                    const singularKey = tableKey.endsWith('s') ? tableKey.slice(0, -1) : (tableKey.endsWith('es') ? tableKey.slice(0, -2) : tableKey);
                    const childPK = 'id_' + singularKey;

                    // PURE UTILITY: Construir lista de IDs vinculados usando `isRecordLinked`
                    const availableOptions = normalizedOptions.filter(opt => !isRecordLinked(opt.value, childRecords, childPK));
                    console.log(`[FormEngine] Sincronizando modal para ${field.targetEntity}. IDs vinculados: ${childRecords.length}. Disponibles: ${availableOptions.length}`);

                    modal.innerHTML = `
                        <ion-header>
                            <ion-toolbar color="primary">
                                <ion-title>Seleccionar ${field.label}</ion-title>
                                <ion-buttons slot="end">
                                    <ion-button onclick="const m = document.getElementById('${modalId}'); m.dismiss().then(() => m.remove())">Cerrar</ion-button>
                                </ion-buttons>
                            </ion-toolbar>
                        </ion-header>
                        <ion-content>
                            <ion-list>
                                <ion-item button id="btn-create-new" lines="full" color="light">
                                    <ion-icon name="add-circle-outline" slot="start" color="primary"></ion-icon>
                                    <ion-label color="primary"><strong>+ Crear Nuevo ${field.label.replace(/s de /i, ' de ').replace(/s$/i, '').replace(/Grupos/i, 'Grupo')}</strong></ion-label>
                                </ion-item>
                                
                                <ion-item-divider>
                                    <ion-label>Registros Existentes</ion-label>
                                </ion-item-divider>

                                ${availableOptions.length === 0 ? '<ion-item><ion-label color="medium">No hay más registros disponibles</ion-label></ion-item>' : ''}
                                       ${availableOptions.map(opt => `
                                    <ion-item button class="lookup-option" data-value="${opt.value}" data-label="${opt.label}" onclick="const cb = this.querySelector('ion-checkbox'); cb.checked = !cb.checked; this.dispatchEvent(new CustomEvent('selectionChange'))">
                                        <ion-label>${opt.label}</ion-label>
                                        <ion-checkbox slot="end"></ion-checkbox>
                                    </ion-item>
                                `).join('')}
                            </ion-list>
                        </ion-content>
                        <ion-footer>
                            <ion-toolbar>
                                <ion-button expand="block" id="btn-confirm-selection" disabled>Vincular Seleccionados (0)</ion-button>
                            </ion-toolbar>
                        </ion-footer>
                    `;

                    document.body.appendChild(modal);
                    await modal.present();

                    // Logic for selection
                    const checkboxes = modal.querySelectorAll('ion-checkbox');
                    const confirmBtn = modal.querySelector('#btn-confirm-selection');
                    let selectedCount = 0;

                    const optionsItems = modal.querySelectorAll('.lookup-option');
                    optionsItems.forEach(item => {
                        item.addEventListener('selectionChange', () => {
                            const allCbs = Array.from(modal.querySelectorAll('ion-checkbox'));
                            const checked = allCbs.filter(c => c.checked).length;
                            confirmBtn.innerText = `Vincular Seleccionados (${checked})`;
                            confirmBtn.disabled = checked === 0;
                        });
                    });

                    modal.querySelector('#btn-confirm-selection').onclick = () => {
                        const items = modal.querySelectorAll('.lookup-option');
                        items.forEach(item => {
                            const cb = item.querySelector('ion-checkbox');
                            if (cb.checked) {
                                const val = item.getAttribute('data-value');
                                const lab = item.getAttribute('data-label');
                                
                                childRecords.push({
                                    [childPK]: val,
                                    nombre: lab,
                                    estado: 'Activo'
                                });
                            }
                        });
                        _refreshList();
                        modal.dismiss().then(() => modal.remove());
                    };

                    modal.querySelector('#btn-create-new').onclick = async () => {
                        modal.dismiss().then(() => modal.remove());
                        const singularLabel = field.label.replace(/s de /i, ' de ').replace(/s$/i, '').replace(/Grupos/i, 'Grupo');
                        const alert = document.createElement('ion-alert');
                        alert.header = `Agregar Nuevo ${singularLabel}`;
                        alert.inputs = [{ name: 'nombre', type: 'text', placeholder: 'Nombre del registro...' }];
                        alert.buttons = [
                            { text: 'Cancelar', role: 'cancel' },
                            { 
                                text: 'Agregar', 
                                handler: (data) => {
                                    if (data.nombre) {
                                        childRecords.push({ nombre: data.nombre, estado: 'Activo' });
                                        _refreshList();
                                    }
                                } 
                            }
                        ];
                        document.body.appendChild(alert);
                        await alert.present();
                    };
                };

                container.appendChild(subgridDiv);
            }

            // Habilitar el renderizado del componente 'relation'
            for (const field of fields) {
                // Solo renderizar el Subgrid si NO tiene un uiComponent propio
                if (field.type === 'relation' && field.uiBehavior === 'subgrid' && !field.uiComponent) {
                    const targetSection = field.section || field.step || (steps && steps[0]);
                    let targetRow = rows[targetSection] || rows[Object.keys(rows)[0]];
                    const subCol = document.createElement('ion-col');
                    subCol.setAttribute('size', '12');
                    await renderSubgrid(field, subCol);
                    targetRow.appendChild(subCol);
                }
            }

            // --- PATRÓN MODAL: ION-FOOTER NATIVO (Keyboard-Aware) ---
            const footerContainer = document.createElement('ion-footer');
            footerContainer.className = 'ion-no-border';
            
            const btnGrid = document.createElement('ion-grid');
            btnGrid.style.padding = 'var(--spacing-2) var(--spacing-4)';
            const btnRow = document.createElement('ion-row');
            btnRow.style.alignItems = 'center';
            
            const colLeft = document.createElement('ion-col');
            colLeft.setAttribute('size', '6');
            colLeft.style.display = 'flex';
            colLeft.style.justifyContent = 'flex-start';
            
            const colRight = document.createElement('ion-col');
            colRight.setAttribute('size', '6');
            colRight.style.display = 'flex';
            colRight.style.justifyContent = 'flex-end';
            colRight.style.gap = 'var(--spacing-3)';

            const btnPrev = document.createElement('ion-button');
            btnPrev.setAttribute('fill', 'clear');
            btnPrev.setAttribute('color', 'medium');
            btnPrev.innerHTML = '<ion-icon slot="start" name="arrow-back-outline"></ion-icon> Anterior';

            const btnNext = document.createElement('ion-button');
            btnNext.setAttribute('shape', 'round');
            btnNext.setAttribute('color', 'primary');
            btnNext.setAttribute('fill', 'outline');
            btnNext.innerHTML = 'Siguiente <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>';

            const submitBtn = document.createElement('ion-button');
            submitBtn.setAttribute('shape', 'round');
            submitBtn.setAttribute('color', 'primary');
            submitBtn.innerHTML = '<ion-icon slot="start" name="save-outline"></ion-icon> Guardar ' + window.formatEntityName(entityName);

            colLeft.appendChild(btnPrev);
            colRight.appendChild(btnNext);
            colRight.appendChild(submitBtn);
            
            btnRow.appendChild(colLeft);
            btnRow.appendChild(colRight);
            btnGrid.appendChild(btnRow);
            footerContainer.appendChild(btnGrid);

            window.__CURRENT_WIZARD_STEPS = steps;

            // Funcionalidad Stepper Lineal Dinámico (Wizard Handler)
            window.goToFormSection = function(targetSectionName) {
                currentStepIndex = steps.indexOf(targetSectionName);
                if (currentStepIndex === -1) currentStepIndex = 0;

                Object.keys(stepContainers).forEach(key => {
                    stepContainers[key].style.display = (key === targetSectionName) ? 'block' : 'none';
                });

                if (sidebarSteps) {
                    steps.forEach((stepName, idx) => {
                        const mi = menuItems[stepName];
                        if (!mi) return;
                        mi.item.style.setProperty('--background', 'transparent');
                        mi.icon.setAttribute('color', 'medium');
                        mi.label.setAttribute('color', 'medium');

                        if (idx === currentStepIndex) {
                            mi.item.style.setProperty('--background', 'var(--ion-color-step-100)');
                            mi.icon.setAttribute('color', 'primary');
                            mi.label.setAttribute('color', 'primary');
                        }
                    });
                }

                progressLabel.textContent = `PASO ${currentStepIndex + 1} DE ${totalSteps}: ${targetSectionName.toUpperCase()}`;
                
                btnPrev.style.display = currentStepIndex === 0 ? 'none' : 'block';

                if (currentStepIndex === totalSteps - 1) {
                    btnNext.style.display = 'none';
                    submitBtn.style.display = 'block';
                } else {
                    btnNext.style.display = 'block';
                    submitBtn.style.display = 'none';
                }
            };

            btnPrev.addEventListener('click', () => {
                if (currentStepIndex > 0) window.goToFormSection(steps[currentStepIndex - 1]);
            });

            btnNext.addEventListener('click', () => {
                // Validación Simple de Requeridos (JIT)
                const currentContainer = stepContainers[steps[currentStepIndex]];
                const inputs = currentContainer.querySelectorAll('ion-input, ion-select');
                let isValid = true;

                inputs.forEach(input => {
                    if (input.getAttribute('required') === 'true' && !input.value) {
                        isValid = false;
                        input.classList.add('ion-touched', 'ion-invalid');
                    } else {
                        input.classList.remove('ion-invalid');
                    }
                });

                if (isValid && currentStepIndex < totalSteps - 1) {
                    window.goToFormSection(steps[currentStepIndex + 1]);
                }
            });

            // Auto-arranque mostrando la primera sección
            window.goToFormSection(steps[0]);

            // --- REGLA V4.0: Lógica de Suma Automática para Total Integrantes ---
            container.addEventListener('ionInput', (e) => {
                const target = e.target;
                if (target.tagName && target.tagName.toLowerCase() === 'ion-input' && target.name && target.name.startsWith('cant_')) {
                    const allCants = container.querySelectorAll('ion-input[name^="cant_"]');
                    let total = 0;
                    allCants.forEach(input => {
                        const val = parseInt(input.value, 10);
                        if (!isNaN(val)) total += val;
                    });
                    const totalInput = container.querySelector('ion-input[name="total_integrantes"]');
                    if (totalInput) {
                        totalInput.value = total;
                    }
                }
            });
            // --------------------------------------------------------------------

            let isSaving = false; // Bloqueo de Reentrada

            submitBtn.addEventListener('click', async () => {
                if (isSaving) return; // Abortar si ya está guardando
                isSaving = true;
                submitBtn.disabled = true; // Deshabilitar botón

                // Mostrar Spinner Nativo en el botón
                submitBtn.innerHTML = '<ion-spinner name="crescent"></ion-spinner> &nbsp; Guardando...';

                // --- UI Blocking (Zero-Latency Rule & UI Idempotency) ---
                const loading = document.createElement('ion-loading');
                loading.backdropDismiss = false; // Bloqueo irrompible
                loading.message = 'Guardando registro...';
                loading.spinner = 'crescent';
                document.body.appendChild(loading);
                await loading.present();

                // --- LECTURA FRESCA JIT (Evita Detached Nodes) ---
                const activeForm = global.currentFormModal || document.getElementById('app-container');
                const freshInputs = activeForm.querySelectorAll('ion-input, ion-textarea, ion-select, input[type="hidden"]');
                const payload = {};
                freshInputs.forEach(input => {
                    const name = input.getAttribute('name');
                    if (name && !input.closest('[data-dynamic-list]')) {
                        let val = input.value;
                        
                        // S7.2 Intercepción MDM (Safe Payload Serialization)
                        const schemaField = fields ? fields.find(f => f.name === name) : null;
                        
                        if (schemaField) {
                            if (schemaField.uiComponent === 'searchable_multi') {
                                // Regla 1: Parseo Defensivo Safe Parse
                                try {
                                    let parsed = JSON.parse(val);
                                    payload[name] = Array.isArray(parsed) ? parsed.filter(i => Boolean(i) && String(i).trim() !== "") : [];
                                } catch(e) { 
                                    payload[name] = []; 
                                }
                            } else if (schemaField.type === 'relation' || schemaField.uiComponent === 'select_single') {
                                // Regla 2: Coerción Segura (1:1)
                                let strVal = (val === null || val === undefined) ? "" : String(val).trim();
                                if (strVal.toLowerCase() === "null" || strVal.toLowerCase() === "undefined") strVal = "";
                                payload[name] = strVal;
                            } else {
                                payload[name] = val; // Default nativo
                            }
                        } else {
                            payload[name] = val; // Fallback libre
                        }
                    }
                });

                // Extractor JIT para Dynamic Lists
                const dynamicLists = activeForm.querySelectorAll('[data-dynamic-list]');
                dynamicLists.forEach(list => {
                    const fieldName = list.getAttribute('data-dynamic-list');
                    const rows = list.querySelectorAll('.dynamic-list-row');
                    const jsonArray = [];
                    
                    rows.forEach(row => {
                        const rowData = {};
                        const rowInputs = row.querySelectorAll('ion-input, ion-select');
                        rowInputs.forEach(inp => {
                            if (inp.name) rowData[inp.name] = inp.value;
                        });
                        jsonArray.push(rowData);
                    });
                    
                    payload[fieldName] = JSON.stringify(jsonArray);
                });


                const freshChipContainers = activeForm.querySelectorAll('.chip-container');
                freshChipContainers.forEach(cc => {
                    const name = cc.getAttribute('data-chip-name');
                    if (name) {
                        const chips = cc.querySelectorAll('ion-label');
                        const arr = [];
                        chips.forEach(l => arr.push(l.textContent));
                        payload[name] = arr.join(', ');
                    }
                });

                // --- CAPTURAR PAYLOAD ANIDADO (Regla 15) ---
                if (window.__APP_CACHE__ && window.__APP_CACHE__.nestedData) {
                    Object.keys(window.__APP_CACHE__.nestedData).forEach(key => {
                        payload[key] = window.__APP_CACHE__.nestedData[key];
                    });
                }

                // Función auxiliar para mostrar Ionic Toast alineado al estándar
                const showToast = async (msg, color) => {
                    const toast = document.createElement('ion-toast');
                    toast.message = msg;
                    toast.duration = 3000;
                    toast.position = 'bottom';
                    toast.color = color; // Usa la paleta nativa var(--ion-color-[color])

                    // Atamos el toast al body para que Ionic pueda destruirlo limpiamente (Evita TypeError: Cannot read properties of null)
                    document.body.appendChild(toast);

                    // Esperar a que el componente Ionic esté listo en el DOM
                    await toast.componentOnReady();
                    await toast.present();
                };
                // --- Sanitización de Auditoría (Directiva Product Architect) ---
                // El frontend NUNCA debe enviar datos de auditoría en el payload.
                delete payload.created_at;
                delete payload.created_by;
                delete payload.updated_at;
                delete payload.updated_by;

                // Llamada nativa hacia Apps Script (API Real)
                // CRÍTICO: Resolver acción y limpiar ID ANTES de cualquier await
                const action = global.currentEditId ? 'update' : 'create';
                global.currentEditId = null; // Reset inmediato antes del async

                // El Loading ya se inició en el momento 0 (Idempotencia).

                // SANITIZACION DE PAYLOAD (Evitar Detached Nodes y Proxies a GAS)
                const safePayload = JSON.parse(JSON.stringify(payload));

                google.script.run
                    .withSuccessHandler(async (rawResponse) => {
                        await loading.dismiss();
                        try {
                            const response = typeof rawResponse === 'string' ? JSON.parse(rawResponse) : rawResponse;
                            if (response && response.status === 'success') {
                                 // ── Server-Confirmed Frontend Cache Injection (Immutable · Zero-Latency) ──
                                 _patchFrontendCache(entityName, response, payload);

                                 const itemName = (response.data && response.data.Entity) ? response.data.Entity : entityName;
                                 showToast('¡' + itemName + ' guardado con éxito!', 'success');

                                // ── Soft Reset Post-Guardado (Anti Stale-State) ──
                                 // CRÍTICO: liberar el guard y null-ear ID ANTES de render()
                                 isSaving = false;
                                 submitBtn.disabled = false;
                                 submitBtn.innerHTML = '<ion-icon slot="start" name="save-outline"></ion-icon> Guardar ' + window.formatEntityName(entityName);
                                 global.currentEditId = null;

                                 if (window.__APP_CACHE__ && window.__APP_CACHE__.nestedData) window.__APP_CACHE__.nestedData = {};

                                 // Cerramos el Modal (Directiva 0.0s visual)
                                 if (global.currentFormModal) {
                                     global.currentFormModal.dismiss().then(() => {
                                         global.currentFormModal.remove();
                                         global.currentFormModal = null;
                                     });
                                 }

                                 // Enrutamiento post-Guardado Inmediato
                                 if (window.DataViewEngine) {
                                     window.DataViewEngine.render(entityName, 'app-container');
                                 } else if (global.onSaveSuccessCallback) {
                                     global.onSaveSuccessCallback();
                                 }
                            } else {
                                // Error Controlado desde el Servidor
                                showToast('Error: ' + (response ? response.message : 'Error desconocido'), 'danger');
                            }
                        } catch (e) {
                            console.error('[FormEngine] Error UI:', e);
                            showToast('Error en la interfaz local', 'warning');
                        } finally {
                            loading.dismiss();
                            isSaving = false;
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = '<ion-icon slot="start" name="save-outline"></ion-icon> Guardar ' + window.formatEntityName(entityName);
                        }
                    })
                    .withFailureHandler(async (err) => {
                        await loading.dismiss();
                        isSaving = false;
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<ion-icon slot="start" name="save-outline"></ion-icon> Guardar ' + window.formatEntityName(entityName);

                        showToast('Error de Servidor: ' + err.message, 'danger');
                    })
                    .API_Universal_Router(action, entityName, safePayload);
            });

            container.appendChild(card);
            
            // --- Metadata-Driven Dependency Injection (Zero-Touch UI) ---
            let debounceTimer; // S4.3: Debounce logic para blindar Event Loop
            ['ionChange', 'ionInput'].forEach(eventType => {
                modal.addEventListener(eventType, (e) => {
                    const triggerInput = e.target;
                    const fieldName = triggerInput.name;
                    if (!fieldName || !fields) return;

                    const schemaField = fields.find(f => f.name === fieldName);
                    if (schemaField && Array.isArray(schemaField.triggers_refresh_of)) {
                        
                        // Limpiar timer previo (Debouncing)
                        clearTimeout(debounceTimer);
                        
                        debounceTimer = setTimeout(async () => {
                            // Recopilar formStateObj JIT (Diccionario Puro)
                            const currentInputs = modal.querySelectorAll('ion-input, ion-select');
                            const formStateObj = Array.from(currentInputs).reduce((acc, inp) => {
                                acc[inp.name] = inp.value;
                                return acc;
                            }, {});
                            const formCurrentStateArr = Object.keys(formStateObj).map(k => ({name: k, value: formStateObj[k]}));

                            // Procesar cada target
                            for (const targetName of schemaField.triggers_refresh_of) {
                                const targetSchema = fields.find(f => f.name === targetName);
                                if (!targetSchema) continue;

                                // 1. Caso lookupSource (Dropdowns)
                                if (targetSchema.lookupSource) {
                                    const targetComponent = modal.querySelector(`ion-select[name="${targetName}"]`);
                                    if (!targetComponent || eventType === 'ionInput') continue; // Lookup solo reacciona a ionChange por rendimiento

                                    targetComponent.disabled = true;
                                    targetComponent.innerHTML = '';
                                    targetComponent.value = null;

                                    const resolver = window[targetSchema.lookupSource] || global[targetSchema.lookupSource];
                                    if (typeof resolver === 'function') {
                                        const newOptions = await resolver(formCurrentStateArr);
                                        
                                        if (newOptions && Array.isArray(newOptions)) {
                                            newOptions.forEach(opt => {
                                                const ionOpt = document.createElement('ion-select-option');
                                                ionOpt.value = opt.value;
                                                ionOpt.textContent = opt.label;
                                                targetComponent.appendChild(ionOpt);
                                            });
                                            // C-02: Guard inside Array.isArray to prevent null.length crash
                                            if (newOptions.length > 0) targetComponent.disabled = false;
                                        }
                                    }
                                }

                                // 2. Caso calculatedValue (Campos Matemáticos reactivos)
                                if (targetSchema.calculatedValue) {
                                    const calculator = window[targetSchema.calculatedValue] || global[targetSchema.calculatedValue];
                                    if (typeof calculator === 'function') {
                                        const newVal = calculator(formStateObj, targetSchema.calcParams || {});
                                        const targetInput = modal.querySelector(`ion-input[name="${targetName}"], ion-textarea[name="${targetName}"]`);
                                        if (targetInput) targetInput.value = newVal;
                                    }
                                }
                            }
                        }, 300); // 300ms espera antes de calcular jerarquía pesada
                    }
                });
            });
            // ------------------------------------------------------------

            modal.appendChild(footerContainer);
            document.body.appendChild(modal);
            await modal.present();
        };

        /**
         * openEditForm (Directiva 3)
         * Busca un registro en el cache local de DataViewEngine, pre-llena el formulario
         * y activa el modo UPDATE.
         */
        global.openEditForm = async function (id) {
            console.log("[FormEngine] Solicitud de edición recibida para ID:", id);

            // 1. Obtener la entidad activa desde el DataViewEngine
            if (!window.DataViewEngine) {
                console.error("[FormEngine] Error: DataViewEngine no encontrado en el objeto window.");
                alert("Error técnico: No se pudo encontrar el motor de datos.");
                return;
            }

            const state = window.DataViewEngine._getState();
            if (!state || !state.entityName) {
                console.error("[FormEngine] Error: El estado del listado no es válido.", state);
                return;
            }

            const entityName = state.entityName;
            const data = state.data;
            const meta = state.entityMeta;

            // --- REGLA 3 (rules_qa.md): PROTECTOR DE NULLS ---
            if (!meta || !meta.idField) {
                console.error("[FormEngine] Error Crítico: No se encontró metadata o 'idField' para la entidad:", entityName);
                alert("Error de Configuración: La entidad '" + window.formatEntityName(entityName) + "' no tiene un mapeo de metadatos válido.");
                return;
            }

            if (!data || !Array.isArray(data)) {
                console.error("[FormEngine] Error: Cache de datos no disponible para la entidad:", entityName);
                return;
            }

            console.log("[FormEngine] Editando entidad:", entityName, "Usando metadata:", meta);

            // 2. Buscar el registro completo
            const record = data.find(item => item[meta.idField] === id);
            if (!record) {
                console.error("[FormEngine] Error: Registro no encontrado en cache local para ID:", id, "en datos:", data);
                alert("Error: El registro con ID '" + id + "' no pudo ser localizado para edición.");
                return;
            }

            console.log("[FormEngine] Registro encontrado:", record);

            // 3. Obtener registro hidratado desde el Servidor (Regla 15)
            const loading = document.createElement('ion-loading');
            loading.message = 'Hidratando registro...';
            document.body.appendChild(loading);
            await loading.present();

            let fullRecord = record;
            try {
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    fullRecord = await new Promise((resolve, reject) => {
                        google.script.run
                            .withSuccessHandler(rawRes => {
                                const res = typeof rawRes === 'string' ? JSON.parse(rawRes) : rawRes;
                                if (res && res.status === 'success') {
                                    resolve(res.data);
                                } else {
                                    reject(new Error(res ? res.message : 'Respuesta inválida'));
                                }
                            })
                            .withFailureHandler(err => reject(err))
                            .API_Universal_Router('read', entityName, { id: id });
                    });
                }
            } catch (e) {
                console.warn("[FormEngine] Falló hidratación profunda, usando cache local:", e);
            } finally {
                loading.dismiss();
            }

            // 4. Renderizar el formulario base de la entidad
            await global.renderForm(entityName, fullRecord);

            // 5. Activar modo edición
            global.currentEditId = id;
            console.log("[FormEngine] currentEditId asignado:", global.currentEditId);

            const headerTitle = document.getElementById('main-header-title');
            if (headerTitle) headerTitle.textContent = "Editar: " + window.formatEntityName(entityName);

            if (global.currentFormModal) {
                const modalTitle = global.currentFormModal.querySelector('ion-title');
                if (modalTitle) modalTitle.textContent = "Editar: " + window.formatEntityName(entityName);
            }

            // 5. Pre-llenado de campos (Directiva 3.c)
            const container = global.currentFormModal || document.getElementById('app-container');
            const inputs = container.querySelectorAll('ion-input, ion-textarea, ion-select, input[type="hidden"]');

<script>
  /* ═══════════════════════════════════════════════════════
     JS_Core.html — Motor Logico Completo (Regla UI §14)
     CONTIENE: AuthManager, Sidebar §13, navegacion, dashboard,
               formatters, wizard, toast, theme
     Inyectado via: <?!= include('JS_Core'); ?>
  ═══════════════════════════════════════════════════════ */

  /* ── Formatters ──────────────────────────────────────── */
  window.formatLabelString = function(str) {
    return (str || '').replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  };
  window.formatEntityName = window.formatLabelString;
  window.formatUserName = function(emailStr) {
    if (!emailStr) return 'Usuario';
    var local = emailStr.split('@')[0];
    var first = local.split(/[\._-]/)[0];
    if (!first) return 'Usuario';
    return first.charAt(0).toUpperCase() + first.slice(1).toLowerCase();
  };

  /* ── Sidebar Desktop (3-State §13) ──────────────────── */
  window.sidebarState = 0;

  window.applySidebarState = function() {
    var splitPane = document.querySelector('ion-split-pane');
    if (!splitPane) return;
    var state = localStorage.getItem('sidebar_state') || '0';
    splitPane.classList.remove('shell-mini', 'shell-hidden');
    if (state === '1') splitPane.classList.add('shell-mini');
    if (state === '2') splitPane.setAttribute('when', 'false');
    else splitPane.setAttribute('when', 'lg');
    setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 350);
  };

  window.toggleDesktopMenu = function() {
    if (window.innerWidth < 992) return;
    window.sidebarState = (window.sidebarState + 1) % 3;
    localStorage.setItem('sidebar_state', window.sidebarState);
    window.applySidebarState();
  };

  /* ── Dinamic Router (Regla UI §5 y §14) ──────────────── */
  window.navigateTo = function(viewType, entityKey) {
    if (typeof entityKey === 'undefined') entityKey = null;
    var container   = document.getElementById('app-container');
    var headerTitle = document.getElementById('main-header-title');
    var backBtn     = document.getElementById('global-back-btn');
    
    // 1. Quitar la clase .active de todos los items
    var navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(function(item) { item.classList.remove('active'); });
    
    if (viewType === 'dashboard') {
      if (headerTitle) headerTitle.textContent = 'Plataforma de Gobernanza';
      if (backBtn) { backBtn.style.display = 'none'; backBtn.onclick = null; }
      
      var oldPop = document.getElementById('dv-col-ion-popover');
      if (oldPop) oldPop.remove();
      
      var homeBtn = document.getElementById('nav-item-dashboard');
      if (homeBtn) homeBtn.classList.add('active');
      
      if (container && window.OriginalDashboardHTML) {
        container.innerHTML = window.OriginalDashboardHTML;
        if (typeof window.renderDashboard === 'function') window.renderDashboard();
      }
    } 
    else if (viewType === 'dataview' && entityKey) {
      if (headerTitle && window.ENTITY_META && window.ENTITY_META[entityKey]) {
        headerTitle.textContent = window.ENTITY_META[entityKey].label;
      }
      
      // Regla 5: Escape Routing
      if (backBtn) {
        backBtn.style.display = 'block';
        backBtn.onclick = function() { window.navigateTo('dashboard'); };
      }
      
      var entityBtn = document.getElementById('nav-item-' + entityKey);
      if (entityBtn) entityBtn.classList.add('active');
      
      if (window.DataViewEngine && typeof window.DataViewEngine.render === 'function') {
        window.DataViewEngine.render(entityKey, 'app-container');
      }
    } 
    else if (viewType === 'designkit') {
      if (headerTitle) headerTitle.textContent = 'Design System Kit';
      if (backBtn) {
        backBtn.style.display = 'block';
        backBtn.onclick = function() { window.navigateTo('dashboard'); };
      }
      var settingsBtn = document.getElementById('nav-item-settings');
      if (settingsBtn) settingsBtn.classList.add('active');
      
      if (container) {
        var tmpl = document.getElementById('tmpl-designkit');
        if (tmpl) {
          container.innerHTML = tmpl.innerHTML;
          if (typeof window.mountDesignKit === 'function') window.mountDesignKit();
        }
      }
    }
  };

  /* ── Sidebar Modes ───────────────────────────────────── */
  window.renderMainNav = function() {
    var navList  = document.getElementById('main-nav-list');
    var formList = document.getElementById('sidebarList');
    if (!navList || !formList) return;
    navList.style.display = 'block';
    formList.style.display = 'none';
    
    var headerPrincipal = '<div class="sidebar-heading"><span>PRINCIPAL</span></div>';
    var homeItem = '<div class="nav-item" id="nav-item-dashboard" onclick="window.navigateTo(\'dashboard\')" title="Inicio">' +
      '<ion-icon name="grid-outline"></ion-icon>' +
      '<ion-label>Inicio</ion-label></div>';
      
    var headerEntidades = '<div class="sidebar-heading"><span>ENTIDADES</span></div>';
    
    var sorted = Object.entries(window.ENTITY_META).sort(function(a,b){ return a[1].order - b[1].order; });
    var items = sorted.map(function(entry) {
      var key = entry[0]; var meta = entry[1];
      if(meta.hideFromMenu === true) return '';
      return '<div class="nav-item" id="nav-item-' + key + '" onclick="window.navigateTo(\'dataview\', \'' + key + '\')" title="' + meta.label + '">' +
        '<ion-icon name="' + meta.iconName + '"></ion-icon>' +
        '<ion-label>' + meta.label + '</ion-label></div>';
    }).join('');
    
    navList.innerHTML = headerPrincipal + homeItem + headerEntidades + items;
  };

  // Alias retrocompatibles para DataView_UI
  window.showHomeSidebar = function() { window.renderMainNav(); };
  window.showListSidebar = function(entityKey) {
    window.renderMainNav();
    var navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(function(item) { item.classList.remove('active'); });
    var btn = document.getElementById('nav-item-' + entityKey);
    if (btn) btn.classList.add('active');
  };
  window.returnToDashboard = function() { window.navigateTo('dashboard'); };

  window.showFormSidebar = function(entityName) {
    var navList  = document.getElementById('main-nav-list');
    var formList = document.getElementById('sidebarList');
    if (!navList || !formList) return;
    navList.style.display  = 'none';
    formList.style.display = 'block';
    var homeItem = '<div class="nav-item" id="nav-item-dashboard" onclick="window.navigateTo(\'dashboard\')" title="Inicio">' +
      '<ion-icon name="grid-outline"></ion-icon>' +
      '<ion-label>Inicio</ion-label></div>';
    formList.innerHTML = homeItem + '<div id="form-steps-container"></div>';
  };

  /* ── Dashboard logic moved to Dashboard_UI.html ── */

  /* ── AuthManager ─────────────────────────────────────── */
  window.AuthManager = {
    init: async function() {
      var appContainer   = document.getElementById('app-container');
      window.OriginalDashboardHTML = appContainer.innerHTML;
      var originalContent = appContainer.innerHTML;
      var loading = document.createElement('ion-loading');
      loading.message = 'Verificando identidad...';
      loading.spinner = 'crescent';
      document.body.appendChild(loading);
      await loading.present();
      appContainer.innerHTML = '';
      appContainer.style.display = 'none';
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(async function(response) {
            await loading.dismiss();
            window.AuthManager.handleAuthResponse(response, appContainer, originalContent);
          })
          .withFailureHandler(async function(error) {
            await loading.dismiss();
            window.AuthManager.renderAccessDenied(appContainer, 'Error de conexion con el servidor.');
          })
          .getUserIdentity();
      } else {
        setTimeout(async function() {
          await loading.dismiss();
          window.AuthManager.handleAuthResponse({ authorized:true, email:'local@gmail.com' }, appContainer, originalContent);
        }, 800);
      }
    },
    handleAuthResponse: function(response, container, originalContent) {
      container.style.display = 'block';
      if (response.authorized) {
        container.innerHTML = originalContent;
        var greetingEl = document.getElementById('user-greeting-name');
        if (greetingEl) greetingEl.textContent = window.formatUserName(response.email);
        window.OriginalDashboardHTML = container.innerHTML;
        this.runAppBootstrap();
      } else {
        this.renderAccessDenied(container, 'Dominio no autorizado', response.email);
      }
    },
    renderAccessDenied: function(container, reason, email) {
      var emailMsg = email ? '<p>La cuenta <strong>' + email + '</strong> no tiene permisos.</p>' : '';
      container.innerHTML = '<ion-grid><ion-row class="ion-justify-content-center" style="margin-top:50px;"><ion-col size="12" size-md="8" size-lg="6">' +
        '<ion-card color="danger"><ion-card-header>' +
        '<ion-icon name="lock-closed-outline" style="font-size:64px;display:block;margin:0 auto;padding-bottom:20px;"></ion-icon>' +
        '<ion-card-title class="ion-text-center">Acceso Denegado</ion-card-title></ion-card-header>' +
        '<ion-card-content class="ion-text-center"><h3>' + reason + '</h3>' + emailMsg + '</ion-card-content>' +
        '</ion-card></ion-col></ion-row></ion-grid>';
    },
    runAppBootstrap: async function() {
      var toast = document.createElement('ion-toast');
      toast.message  = 'Sincronizando plataforma...';
      toast.position = 'bottom'; toast.color = 'dark'; toast.icon = 'sync-outline';
      document.body.appendChild(toast);
      await toast.present();
      var onSuccess = async function(res) {
        await toast.dismiss();
        var newToast = document.createElement('ion-toast');
        newToast.position = 'bottom';
        if (res && res.status === 'success') {
          var data = res.data;
          for (var entity in data) { window.__APP_CACHE__[entity] = data[entity]; }
          if (typeof window.renderDashboard === 'function') window.renderDashboard();
          newToast.message = 'Plataforma sincronizada.'; newToast.icon = 'checkmark-circle-outline';
          newToast.color = 'success'; newToast.duration = 2000;
        } else {
          newToast.message = 'Error en sincronizacion.'; newToast.color = 'danger'; newToast.duration = 3000;
        }
        document.body.appendChild(newToast); await newToast.present();
      };
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(onSuccess).withFailureHandler(async function() {
          await toast.dismiss();
        }).getAppBootstrapPayload();
      } else {
        setTimeout(async function() {
          await toast.dismiss();
          if (typeof window.renderDashboard === 'function') window.renderDashboard();
          var newToast = document.createElement('ion-toast');
          newToast.position = 'bottom'; newToast.message = 'Mock: Plataforma sincronizada.';
          newToast.color = 'success'; newToast.duration = 2000;
          document.body.appendChild(newToast); await newToast.present();
        }, 1000);
      }
    },
    logout: async function() {
      var ionApp = document.querySelector('ion-app');
      if (ionApp) {
        ionApp.innerHTML = '<ion-content class="ion-padding"><ion-grid style="height:100%;">' +
          '<ion-row class="ion-justify-content-center ion-align-items-center" style="height:100%;">' +
          '<ion-col size="12" class="ion-text-center">' +
          '<ion-icon name="shield-checkmark-outline" color="success" style="font-size:80px;"></ion-icon>' +
          '<h2 style="margin-top:20px;">Sesion cerrada por seguridad</h2>' +
          '<p>Por favor, cierra esta pestana del navegador.</p></ion-col></ion-row></ion-grid></ion-content>';
        var t = document.createElement('ion-toast');
        t.message = 'Desconectado de forma segura.'; t.duration = 3000; t.color = 'dark';
        document.body.appendChild(t); await t.present();
      }
    }
  };

  /* ── ThemeManager (S1.3 Multi-Theme Engine) ──────────── */
  window.ThemeManager = {
    themeIcons: {
      'light': 'moon-outline',
      'dark': 'sunny-outline',
      'ocean': 'water-outline',
      'high-contrast': 'contrast-outline'
    },
    get availableThemes() {
      return Object.keys(this.themeIcons);
    },
    currentTheme: 'light',

    init: function() {
      var savedTheme = localStorage.getItem('app_theme') || 'light';
      this.setTheme(savedTheme);
    },

    setTheme: function(themeName) {
      if (!this.availableThemes.includes(themeName)) return;

      var self = this;
      this.availableThemes.forEach(function(t) {
        if (t !== 'light') document.body.classList.remove(t);
      });

      if (themeName !== 'light') {
        document.body.classList.add(themeName);
      }

      this.currentTheme = themeName;
      localStorage.setItem('app_theme', themeName);
      this.updateIcon();

      // Actualizacion dinamica de ApexCharts (Golden Pattern Direct-Instance & ForeColor)
      var isDark = themeName === 'dark';
      var chartOptionsUpdate = { 
        theme: { mode: isDark ? 'dark' : 'light' },
        chart: { 
          foreColor: isDark ? '#FFFFFF' : '#081754',
          background: 'transparent'
        }
      };
      if (typeof window.chartTopology !== 'undefined' && window.chartTopology) {
        window.chartTopology.updateOptions(chartOptionsUpdate);
      }
      if (typeof window.chartCapacity !== 'undefined' && window.chartCapacity) {
        window.chartCapacity.updateOptions(chartOptionsUpdate);
      }

      // Golden Pattern 6: Reflow mandatory after CSS token switch
      setTimeout(function() {
        window.dispatchEvent(new Event('resize'));
      }, 350);
    },

    cycleTheme: function() {
      var activeThemes = ['light', 'dark']; // Active scaling
      var currentIndex = activeThemes.indexOf(this.currentTheme);
      var nextIndex = (currentIndex + 1) % activeThemes.length;
      this.setTheme(activeThemes[nextIndex]);
    },

    updateIcon: function() {
      var icon = document.getElementById('theme-toggle-icon');
      if (!icon) return;
      icon.name = this.themeIcons[this.currentTheme] || 'moon-outline';
    }
  };

  /* ── DOMContentLoaded Bootstrap ─────────────────────── */
  document.addEventListener('DOMContentLoaded', function() {
    if (window.ThemeManager) window.ThemeManager.init();
    window.sidebarState = parseInt(localStorage.getItem('sidebar_state')) || 0;
    window.applySidebarState();
    if (typeof window.renderDashboardCards === 'function') window.renderDashboardCards();
    var container = document.getElementById('app-container');
    if (container) window.OriginalDashboardHTML = container.innerHTML;
    setTimeout(function() {
      window.showHomeSidebar();
      // Forzar el estado inicial del enrutador para pintar la UI
      if (typeof window.navigateTo === 'function') {
        window.navigateTo('dashboard');
      }
      window.AuthManager.init();
    }, 100);
  });
</script>

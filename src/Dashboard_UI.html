<script>
  /* ═══════════════════════════════════════════════════════
     Dashboard_UI.html — Logica Modular del Dashboard (Regla UI §14)
  ═══════════════════════════════════════════════════════ */

  window.renderDashboard = function(forceRefresh) {
    if (window.chartTopology) { window.chartTopology.destroy(); window.chartTopology = null; }
    if (window.chartCapacity) { window.chartCapacity.destroy(); window.chartCapacity = null; }
    var container       = document.getElementById('dashboard-charts-container');
    var filterContainer = document.getElementById('dashboard-filter-container');
    if (!container) return;
    
    var equipos = window.__APP_CACHE__['Equipo'] || [];
    if (equipos.length === 0) return;
    
    var portfolioSel = document.getElementById('dashboard-portfolio-filter');
    var selectedPortfolio = 'all';
    
    if (portfolioSel) {
      if (!portfolioSel.dataset.populated) {
        var portafolios = window.__APP_CACHE__['Portafolio'] || [];
        window.DOM.clear(portfolioSel);
        var optAll = document.createElement('ion-select-option');
        optAll.value = 'all';
        optAll.textContent = 'TODOS LOS PORTAFOLIOS';
        portfolioSel.appendChild(optAll);
        portafolios.forEach(function(p) { 
           var opt = document.createElement('ion-select-option');
           opt.value = p.id_portafolio;
           opt.textContent = p.nombre;
           portfolioSel.appendChild(opt);
        });
        portfolioSel.value = 'all';
        portfolioSel.dataset.populated = 'true';
        portfolioSel.addEventListener('ionChange', function() { window.renderDashboard(true); });
      }
      selectedPortfolio = portfolioSel.value || 'all';
    }
    
    if (selectedPortfolio !== 'all') {
      var productos = window.__APP_CACHE__['Producto'] || [];
      var grupos    = window.__APP_CACHE__['Grupo_Productos'] || [];
      equipos = equipos.filter(function(eq) {
        var prod = productos.find(function(p) { return String(p.id_producto) === String(eq.id_producto); });
        if (!prod) return false;
        var grupo = grupos.find(function(g) { return String(g.id_grupo_producto) === String(prod.id_grupo_producto); });
        return grupo && String(grupo.id_portafolio) === String(selectedPortfolio);
      });
    }
    
    if (filterContainer) filterContainer.classList.remove('ion-hide');
    container.classList.remove('ion-hide');
    
    // Extraccion Dinamica de Capacidades desde Metadata (Regla Metadata-Driven)
    // Sin "hardcoding"
    var equipoSchema = window.APP_SCHEMAS['Equipo'];
    var dynamicFields = equipoSchema.fields.filter(function(f) { 
       return f.section === 'Capacidad' && f.type === 'number' && f.name !== 'total_integrantes';
    });
    
    var dynamicSums = {};
    var labelsEsp = [];
    var seriesEsp = [];
    
    dynamicFields.forEach(function(f) {
      dynamicSums[f.name] = 0;
      labelsEsp.push(f.label);
    });

    var capacityData = [];
    equipos.forEach(function(eq) {
      dynamicFields.forEach(function(f) {
        const parsedFV = parseInt(eq[f.name], 10);
        dynamicSums[f.name] += isNaN(parsedFV) ? 0 : parsedFV;
      });
      const capY = parseInt(eq.total_integrantes, 10);
      capacityData.push({ x: eq.nombre_equipo || 'Desconocido', y: isNaN(capY) ? 0 : capY });
    });
    
    dynamicFields.forEach(function(f) {
      seriesEsp.push(dynamicSums[f.name]);
    });

    // Colores genericos
    var defaultColors = ['var(--ion-color-light)','var(--ion-color-light)','var(--ion-color-light)','var(--ion-color-light)','var(--ion-color-light)','var(--ion-color-light)','var(--ion-color-light)','var(--ion-color-dark)', 'var(--ion-color-light)', 'var(--ion-color-light)'];

    var isDark = (window.ThemeManager && window.ThemeManager.currentTheme === 'dark');
    var currentThemeMode = isDark ? 'dark' : 'light';
    var currentForeColor = isDark ? 'var(--ion-color-light)' : 'var(--ion-color-light)';

    window.chartTopology = new ApexCharts(document.querySelector('#chart-topology'), {
      series: seriesEsp, 
      labels: labelsEsp,
      chart: { type:'donut', height:350, foreColor: currentForeColor, background: 'transparent' }, 
      legend: { position:'bottom' },
      theme: { mode: currentThemeMode },
      colors: defaultColors.slice(0, seriesEsp.length)
    });
    window.chartTopology.render();
    
    capacityData.sort(function(a,b) { return b.y - a.y; });
    window.chartCapacity = new ApexCharts(document.querySelector('#chart-capacity'), {
      series: [{ name:'Integrantes', data: capacityData }],
      chart: { type:'bar', height:350, foreColor: currentForeColor, background: 'transparent' }, 
      plotOptions: { bar: { horizontal:true } },
      theme: { mode: currentThemeMode },
      colors: ['var(--ion-color-light)']
    });
    window.chartCapacity.render();


  };

  window.renderDashboardCards = function() {
    var container = document.getElementById('dashboard-cards-container');
    if (!container) return;
    window.DOM.clear(container);
    var sorted = window.getEntitiesByFlag('dashboardCard', 'uiConfig');
    var totalEls = {};

    sorted.forEach(function(entry) {
      var key = entry[0]; 
      var meta = entry[1];
      var totalId = 'col-total-' + key;
      var rawDshConfig = (window.APP_SCHEMAS[key] && window.APP_SCHEMAS[key].uiConfig && window.APP_SCHEMAS[key].uiConfig.dashboardCard);
      var dshConfig = (typeof rawDshConfig === 'object' && rawDshConfig !== null) ? rawDshConfig : {};
      
      var cardConfig = {
        title: meta.label,
        iconName: dshConfig.iconName || meta.iconName,
        color: dshConfig.color || meta.color,
        totalId: totalId
      };
      
      var cardEl = window.UI_Factory.buildDashboardCardCont(cardConfig);
      container.appendChild(cardEl);
      
      var totalEl = cardEl.querySelector('[data-dsh-total]');
      if (totalEl) {
        totalEls[key] = totalEl;
      }
    });

    // We store the DOM references so hydrate doesn't need to query every time
    window._dashboardTotalEls = totalEls;

    // Immediate hydration attempt: if cache is already populated, hydrate now
    if (window.__APP_CACHE__ && (
      (window.__APP_CACHE__['Portafolio'] && window.__APP_CACHE__['Portafolio'].length > 0) ||
      (window.__APP_CACHE__['Equipo'] && window.__APP_CACHE__['Equipo'].length > 0) ||
      (window.__APP_CACHE__['Persona'] && window.__APP_CACHE__['Persona'].length > 0)
    )) {
      window.hydrateDashboardCounters();
    }
  };

  // One-shot subscription: hydrate counters once bootstrap completes
  if (window.AppEventBus) {
    var _readyUnsub = window.AppEventBus.subscribe('APP::READY', function() {
      if (typeof window.renderDashboardCards === 'function') {
        window.renderDashboardCards();
      }
      if (typeof _readyUnsub === 'function') _readyUnsub();
    });
  }

  window.hydrateDashboardCounters = function() {
    try {
      var els = window._dashboardTotalEls;
      if (!els) return;

      Object.keys(els).forEach(function(key) {
        var list = (window.__APP_CACHE__ && window.__APP_CACHE__[key]) ? window.__APP_CACHE__[key] : [];
        var count = list.filter(function(r) { return r.estado !== 'Eliminado'; }).length;
        els[key].textContent = count;
      });

    } catch (err) {
      console.error('[Dashboard] Error al calcular contadores:', err);
      if (window._dashboardTotalEls) {
        Object.keys(window._dashboardTotalEls).forEach(function(k) { window._dashboardTotalEls[k].textContent = '-'; });
      }
    }
  };
</script>

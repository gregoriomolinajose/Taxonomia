                display: none !important;

        }
        
        @media (min-width: 992px) {
            .hide-on-desktop {

    <!-- Authentication Logic -->
    <script>
        window.AuthManager = {
            init: async function () {
                const appContainer = document.getElementById('app-container');
                window.OriginalDashboardHTML = appContainer.innerHTML;
                const originalContent = appContainer.innerHTML;

                // 1. Mostrar Loading
                const loading = document.createElement('ion-loading');
                loading.message = 'Verificando identidad...';
                loading.spinner = 'crescent';
                document.body.appendChild(loading);
                await loading.present();

                // Esconder contenido mientras carga
                appContainer.innerHTML = '';
                appContainer.style.display = 'none';

                // 2. Llamar backend
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(async (response) => {
                            await loading.dismiss();
                            this.handleAuthResponse(response, appContainer, originalContent);
                        })
                        .withFailureHandler(async (error) => {
                            await loading.dismiss();
                            this.renderAccessDenied(appContainer, "Error de conexión con el servidor.");
                        })
                        .getUserIdentity();
                } else {
                    // Modo desarrollo local (Mock)
                    setTimeout(async () => {
                        await loading.dismiss();
                        console.warn("Entorno local: Simulando Auth exitosa.");
                        this.handleAuthResponse({ authorized: true, email: "local@gmail.com" }, appContainer, originalContent);
                    }, 800);
                }
            },

            handleAuthResponse: function (response, container, originalContent) {
                container.style.display = 'block';
                if (response.authorized) {
                    // Caso Seguro
                    container.innerHTML = originalContent;

                    // Extracción dinámica del nombre e Inyección del saludo
                    const greetingEl = document.getElementById('user-greeting-name');
                    if (greetingEl) {
                        greetingEl.textContent = window.formatUserName(response.email);
                    }

                    // Forzar caché de UI actualizada para la persistencia al volver a inicio
                    window.OriginalDashboardHTML = container.innerHTML;

                    // Desencadenar la sincronización global (Global Prefetch)
                    this.runAppBootstrap();
                } else {
                    // Caso Fallido
                    this.renderAccessDenied(container, "Dominio no autorizado", response.email);
                }
            },

            renderAccessDenied: function (container, reason, email = "") {
                const emailMsg = email ? `<p>La cuenta <strong>${email}</strong> no tiene permisos de acceso al sistema.</p>` : '';
                container.innerHTML = `
                    <ion-grid>
                        <ion-row class="ion-justify-content-center" style="margin-top: 50px;">
                            <ion-col size="12" size-md="8" size-lg="6">
                                <ion-card color="danger">
                                    <ion-card-header>
                                        <ion-icon name="lock-closed-outline" style="font-size: 64px; display: block; margin: 0 auto; padding-bottom: 20px;"></ion-icon>
                                        <ion-card-title class="ion-text-center">Acceso Denegado</ion-card-title>
                                    </ion-card-header>
                                    <ion-card-content class="ion-text-center">
                                        <h3>${reason}</h3>
                                        ${emailMsg}
                                        <p style="margin-top:20px;">Por favor, inicia sesión con una cuenta autorizada.</p>
                                    </ion-card-content>
                                </ion-card>
                            </ion-col>
                        </ion-row>
                    </ion-grid>
                `;
            },

            runAppBootstrap: async function () {
                // Mostrar Toast: "Sincronizando plataforma..."
                const toast = document.createElement('ion-toast');
                toast.message = 'Sincronizando plataforma...';
                toast.position = 'bottom';
                toast.color = 'dark';
                toast.icon = 'sync-outline';
                document.body.appendChild(toast);
                await toast.present();

                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(async (res) => {
                            await toast.dismiss();
                            const newToast = document.createElement('ion-toast');
                            newToast.position = 'bottom';
                            if (res.status === 'success') {
                                // Inyectar datos directamente en la Memoria Global
                                const entitiesData = res.data;
                                for (const entity in entitiesData) {
                                    window.__APP_CACHE__[entity] = entitiesData[entity];
                                }
                                
                                // Renderizar el BI Dashboard luego de cargar la caché
                                if (typeof window.renderDashboard === 'function') {
                                    window.renderDashboard();
                                }

                                newToast.message = 'Plataforma sincronizada.';
                                newToast.icon = 'checkmark-circle-outline';
                                newToast.color = 'success';
                                newToast.duration = 2000;
                            } else {
                                newToast.message = 'Error en sincronización.';
                                newToast.color = 'danger';
                                newToast.icon = 'warning-outline';
                                newToast.duration = 3000;
                            }
                            document.body.appendChild(newToast);
                            await newToast.present();
                        })
                        .withFailureHandler(async (err) => {
                            await toast.dismiss();
                            const newToast = document.createElement('ion-toast');
                            newToast.position = 'bottom';
                            newToast.message = 'Error de red en sincronización.';
                            newToast.color = 'danger';
                            newToast.duration = 3000;
                            document.body.appendChild(newToast);
                            await newToast.present();
                        })
                        .getAppBootstrapPayload();
                } else {
                    // Local fallback
                    setTimeout(async () => {
                        await toast.dismiss();
                        
                        // Renderizar el BI Dashboard en mock
                        if (typeof window.renderDashboard === 'function') {
                            window.renderDashboard();
                        }

                        const newToast = document.createElement('ion-toast');
                        newToast.position = 'bottom';
                        newToast.message = 'Mock: Plataforma sincronizada.';
                        newToast.color = 'success';
                        newToast.duration = 2000;
                        document.body.appendChild(newToast);
                        await newToast.present();
                    }, 1000);
                }
            },

            logout: async function () {
                const ionApp = document.querySelector('ion-app');
                if (ionApp) {
                    // Destruir contenedor completo
                    ionApp.innerHTML = `
                        <ion-content class="ion-padding">
                            <ion-grid style="height: 100%;">
                                <ion-row class="ion-justify-content-center ion-align-items-center" style="height: 100%;">
                                    <ion-col size="12" class="ion-text-center">
                                        <ion-icon name="shield-checkmark-outline" color="success" style="font-size: 80px;"></ion-icon>
                                        <h2 style="margin-top: 20px;">Sesión cerrada por seguridad</h2>
                                        <p>Por favor, cierra esta pestaña del navegador.</p>
                                    </ion-col>
                                </ion-row>
                            </ion-grid>
                        </ion-content>
                    `;

                    // Mostrar Toast
                    const toast = document.createElement('ion-toast');
                    toast.message = 'Desconectado de forma segura.';
                    toast.duration = 3000;
                    toast.color = 'dark';
                    document.body.appendChild(toast);
                    await toast.present();
                }
            }
        };

        window.formatEntityName = function (str) {
            return (str || '').replace(/_/g, ' ');
        };

        window.formatUserName = function (emailStr) {
            if (!emailStr) return 'Usuario';
            // Tomar porción antes del arroba
            const localPart = emailStr.split('@')[0];
            // Dividir por caracteres no alfanuméricos comunes (, . _ -) y tomar la primera parte
            const firstPart = localPart.split(/[\._-]/)[0];
            if (!firstPart) return 'Usuario';
            // Capitalizar
            return firstPart.charAt(0).toUpperCase() + firstPart.slice(1).toLowerCase();
        };

        window.returnToDashboard = function () {
            const container = document.getElementById('app-container');
            const headerTitle = document.getElementById('main-header-title');
            const backBtn = document.getElementById('global-back-btn');

            if (headerTitle) headerTitle.textContent = "Taxonomía Operativa";
            if (backBtn) backBtn.style.display = 'none';

            // Limpiar el ion-popover de columnas si existe
            const oldPop = document.getElementById('dv-col-ion-popover');
            if (oldPop) oldPop.remove();

            // Restaurar sidebar a modo Home (Navegación Global)
            if (typeof window.showHomeSidebar === 'function') {
                window.showHomeSidebar();
            }

            if (container && window.OriginalDashboardHTML) {
                container.innerHTML = window.OriginalDashboardHTML;
                
                // Re-render del Dashboard Ejecutivo
                if (typeof window.renderDashboard === 'function') {
                    window.renderDashboard();
                }
            }
        };

        // Estado del Sidebar Desktop persistente según SGMP
        window.sidebarState = parseInt(localStorage.getItem('sidebarState')) || 0;
        
        window.applySidebarState = function() {
            const splitPane = document.querySelector('ion-split-pane');
            if (!splitPane) return;
            
            if (window.sidebarState === 0) {
                // Estado 0: Full
                splitPane.classList.remove('menu-mini');
                splitPane.setAttribute('when', 'lg');
            } else if (window.sidebarState === 1) {
                // Estado 1: Mini
                splitPane.classList.add('menu-mini');
                splitPane.setAttribute('when', 'lg');
            } else if (window.sidebarState === 2) {
                // Estado 2: Hidden
                splitPane.classList.remove('menu-mini');
                splitPane.setAttribute('when', 'false'); 
            }
        };

        window.toggleDesktopMenu = function() {
            const isDesktop = window.innerWidth >= 992;
            if (!isDesktop) return; // Validación rigurosa de modo Mobile Intacto

            window.sidebarState = (window.sidebarState + 1) % 3;
            localStorage.setItem('sidebarState', window.sidebarState);

            window.applySidebarState();

            // Hack de sincronización para componentes de terceros (ApexCharts)
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 350);
        };

        /**
         * showHomeSidebar()
         * Renderiza el sidebar en modo DASHBOARD con navegación global.
         */
        window.showHomeSidebar = function () {
            const navList = document.getElementById('main-nav-list');
            const formList = document.getElementById('sidebarList');
            if (!navList || !formList) return;

            // Toggle de Listas
            navList.style.display = 'block';
            formList.style.display = 'none';

            let itemsHtml = `<ion-item button detail="false" 
                title="Inicio"
                style="--background:var(--ion-color-primary);"
                onclick="window.returnToDashboard()">
                <ion-icon slot="start" name="home-outline" 
                    style="color:#ffffff"></ion-icon>
                <ion-label style="font-weight:700; color:#ffffff;">
                    Inicio
                </ion-label>
            </ion-item>`;

            const sortedEntities = Object.entries(window.ENTITY_META).sort((a,b) => a[1].order - b[1].order);

            itemsHtml += sortedEntities.map(function ([key, meta]) {
                return `<ion-item button detail="false" 
                    title="${meta.label}"
                    style="--background:transparent;"
                    onclick="window.DataViewEngine.render('${key}', 'app-container')">
                    <ion-icon slot="start" name="${meta.iconName}" 
                        style="color:var(--ion-color-medium)"></ion-icon>
                    <ion-label style="font-weight:400; color:inherit;">
                        ${meta.label}
                    </ion-label>
                </ion-item>`;
            }).join('');

            navList.innerHTML = itemsHtml;
        };

        /**
         * showListSidebar(activeEntityName)
         * Renderiza el sidebar en modo LISTADO con navegación entre entidades.
         */
        window.showListSidebar = function (activeEntityName) {
            const navList = document.getElementById('main-nav-list');
            const formList = document.getElementById('sidebarList');
            if (!navList || !formList) return;

            // Toggle de Listas
            navList.style.display = 'block';
            formList.style.display = 'none';

            // Siempre incluir Home como opción de escape
            const homeItem = `<ion-item button detail="false" 
                title="Inicio"
                style="--background:transparent;"
                onclick="window.returnToDashboard()">
                <ion-icon slot="start" name="home-outline" style="color:var(--ion-color-medium)"></ion-icon>
                <ion-label>Inicio</ion-label>
            </ion-item>`;

            const sortedEntities = Object.entries(window.ENTITY_META).sort((a,b) => a[1].order - b[1].order);

            const items = sortedEntities.map(function ([key, meta]) {
                const isActive = key === activeEntityName;
                return `<ion-item button detail="false"
                    title="${meta.label}"
                    style="--background:${isActive ? 'var(--ion-color-primary)' : 'transparent'};"
                    onclick="window.DataViewEngine.render('${key}', 'app-container')">
                    <ion-icon slot="start" name="${meta.iconName}"
                        style="color:${isActive ? '#ffffff' : 'var(--ion-color-medium)'}"></ion-icon>
                    <ion-label style="font-weight:${isActive ? '700' : '400'}; color:${isActive ? '#ffffff' : 'inherit'};">
                        ${meta.label}
                    </ion-label>
                </ion-item>`;
            }).join('');

            navList.innerHTML = homeItem + items;
        };

        /**
         * showFormSidebar(entityName)
         * Prepara el sidebar para el modo FORMULARIO (Wizard).
         */
        window.showFormSidebar = function (entityName) {
            const navList = document.getElementById('main-nav-list');
            const formList = document.getElementById('sidebarList');
            if (!navList || !formList) return;

            // Toggle de Listas
            navList.style.display = 'none';
            formList.style.display = 'block';

            // Siempre incluir Home como opción de escape
            const homeItem = `<ion-item button detail="false" 
                title="Inicio"
                style="--background:transparent;"
                onclick="window.returnToDashboard()">
                <ion-icon slot="start" name="home-outline" style="color:var(--ion-color-medium)"></ion-icon>
                <ion-label>Inicio</ion-label>
            </ion-item>`;

            // ID obligatorio para que FormEngine inyecte los pasos
            formList.innerHTML = `
                ${homeItem}
                <div id="form-steps-container"></div>
            `;
        };

        window.renderDashboard = function(forceRefresh = false) {
            // Fase 4: Limpieza previa
            if (window.chartTopology) { window.chartTopology.destroy(); window.chartTopology = null; }
            if (window.chartCapacity) { window.chartCapacity.destroy(); window.chartCapacity = null; }

            const container = document.getElementById('dashboard-charts-container');
            const filterContainer = document.getElementById('dashboard-filter-container');
            if (!container) return;

            let equipos = window.__APP_CACHE__['Equipo'] || [];
            if (equipos.length === 0) return;
            
            // Configuración inicial del filtro de Portafolios
            const portfolioSel = document.getElementById('dashboard-portfolio-filter');
            let selectedPortfolio = 'all';
            
            if (portfolioSel) {
                if (!portfolioSel.dataset.populated) { // Evitar repopular si ya se cargó, usando un flag en lugar de childElementCount (que falla en Ionic por el Shadow DOM)
                    const portafolios = window.__APP_CACHE__['Portafolio'] || [];
                    let htmlOptions = '<ion-select-option value="all">TODOS LOS PORTAFOLIOS</ion-select-option>';
                    portafolios.forEach(p => {
                        htmlOptions += `<ion-select-option value="${p.id_portafolio}">${p.nombre}</ion-select-option>`;
                    });
                    portfolioSel.innerHTML = htmlOptions;
                    portfolioSel.value = 'all';
                    portfolioSel.dataset.populated = 'true';
                    
                    // Adjuntar eventLister nativo para Ionic si no existe
                    portfolioSel.addEventListener('ionChange', (e) => {
                        window.renderDashboard(true);
                    });
                }
                selectedPortfolio = portfolioSel.value || 'all';
            }

            // Fase 2: Filtrado Dinámico de Equipos (Relación transitiva)
            if (selectedPortfolio !== 'all') {
                const productos = window.__APP_CACHE__['Producto'] || [];
                const grupos = window.__APP_CACHE__['Grupo_Productos'] || [];
                
                equipos = equipos.filter(eq => {
                    const prod = productos.find(p => String(p.id_producto) === String(eq.id_producto));
                    if (!prod) return false;
                    const grupo = grupos.find(g => String(g.id_grupo_producto) === String(prod.id_grupo_producto));
                    if (!grupo) return false;
                    return String(grupo.id_portafolio) === String(selectedPortfolio);
                });
            }

            if (filterContainer) filterContainer.style.display = 'flex';
            container.style.display = 'flex';

            // Fase 3: Suma Totalizadora en RAM
            let sumBack = 0, sumFront = 0, sumFull = 0, sumTesters = 0, sumTech = 0, sumCoach = 0, sumPO = 0, sumOtros = 0;
            const capacityData = [];
            
            equipos.forEach(eq => {
                sumBack += parseInt(eq.cant_dev_back) || 0;
                sumFront += parseInt(eq.cant_dev_front) || 0;
                sumFull += parseInt(eq.cant_fullstack) || 0;
                sumTesters += parseInt(eq.cant_testers) || 0;
                sumTech += parseInt(eq.cant_tech_leads) || 0;
                sumCoach += parseInt(eq.cant_team_coach) || 0;
                sumPO += parseInt(eq.cant_po_pm) || 0;
                sumOtros += parseInt(eq.cant_otros) || 0;
                
                const integrantes = parseInt(eq.total_integrantes) || 0;
                capacityData.push({ x: eq.nombre_equipo || 'Desconocido', y: integrantes });
            });

            // Graph 1: Especialidades
            const seriesEsp = [sumBack, sumFront, sumFull, sumTesters, sumTech, sumCoach, sumPO, sumOtros];
            const labelsEsp = ['Backend', 'Frontend', 'Fullstack', 'Testers', 'Tech Lead', 'Team Coach', 'Product Owner', 'Otros Roles'];

            window.chartTopology = new ApexCharts(document.querySelector("#chart-topology"), {
                series: seriesEsp,
                labels: labelsEsp,
                chart: { type: 'donut', height: 350 },
                legend: { position: 'bottom' },
                colors: ['#3880ff', '#2dd36f', '#ffc409', '#eb445a', '#92949c', '#3dc2ff', '#2fdf75', '#000000']
            });
            window.chartTopology.render();

            // Graph 2: Capacity
            capacityData.sort((a, b) => b.y - a.y);
            window.chartCapacity = new ApexCharts(document.querySelector("#chart-capacity"), {
                series: [{ name: 'Integrantes', data: capacityData }],
                chart: { type: 'bar', height: 350 },
                plotOptions: { bar: { horizontal: true } },
                colors: ['#3880ff']
            });
            window.chartCapacity.render();
        };

        window.renderDashboardCards = function() {
            const container = document.getElementById('dashboard-cards-container');
            if (!container) return;
            container.innerHTML = '';
            
            const sortedEntities = Object.entries(window.ENTITY_META).sort((a,b) => a[1].order - b[1].order);
            
            const cardsHtml = sortedEntities.map(([key, meta]) => {
                return `
                <ion-col size="12" size-md="6" size-xl="4">
                    <ion-card>
                        <ion-card-header class="ion-text-center">
                            <ion-icon name="${meta.iconName}" color="${meta.color}" style="font-size: 48px; margin-bottom: 10px;"></ion-icon>
                            <ion-card-title>${meta.label}</ion-card-title>
                        </ion-card-header>
                        <ion-card-content>
                            <ion-button expand="block" shape="round" color="${meta.color}" onclick="renderForm('${key}')">
                                <ion-icon slot="start" name="add-circle-outline"></ion-icon> Crear Nuevo
                            </ion-button>
                            <ion-button expand="block" shape="round" color="${meta.color}" fill="outline" style="margin-top: 8px;" onclick="window.DataViewEngine.render('${key}', 'app-container')">
                                <ion-icon slot="start" name="list-outline"></ion-icon> Ver Listado
                            </ion-button>
                        </ion-card-content>
                    </ion-card>
                </ion-col>
                `;
            }).join('');
            
            container.innerHTML = cardsHtml;
        };

        // Arrancar verificación al cargar el DOM de Ionic
        document.addEventListener('DOMContentLoaded', () => {
            // Arrancar verificación al cargar el DOM de Ionic
            if (typeof window.renderDashboardCards === 'function') {
                window.renderDashboardCards();
            }

            // Guardar el HTML original del dashboard para el returnToDashboard
            const container = document.getElementById('app-container');
            if (container) {
                window.OriginalDashboardHTML = container.innerHTML;
            }

            // Aplicar el estado guardado del layout
            if (typeof window.applySidebarState === 'function') {
                window.applySidebarState();
            }

            // Esperar un toque a que Ionic se inicialice
            setTimeout(() => {
                window.showHomeSidebar(); // Cargar sidebar de inicio por defecto
                window.AuthManager.init();
            }, 100);
        });
    </script>
</body>

</html>

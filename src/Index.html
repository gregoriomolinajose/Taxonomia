  <!-- Fail-Fast WSOD Mitigation (System Error Interceptor) -->
  <template id="wsod-mitigator">
    <div style="background:#fff3f3;color:#8a0000;padding:2rem;font-family:sans-serif;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
      <h1 style="font-size:3rem;margin-bottom:0.5rem">⚠️</h1><h2>Error de Sistema</h2>
      <p style="max-width:500px">Fallo crítico durante la inicialización de la plataforma (SyntaxError o ReferenceError asíncrono). La ejecución ha sido bloqueada (API Fail-Fast).</p>
      <pre id="wsod-error-detail" style="background:#fbe9e9;padding:1rem;border-radius:6px;width:100%;max-width:600px;overflow-x:auto;text-align:left;font-size:0.85rem;border:1px solid #ecc;"></pre>
      <button onclick="location.reload()" style="margin-top:1.5rem;padding:0.75rem 1.5rem;background:#cc0000;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;">Regresar al Inicio</button>
    </div>
  </template>
  <script>
    function triggerWSOD(errDetail) {
      // 1. S19.4 Telemetry Injection (Fire and Forget)
      // Ejecutado ANTES de la validación del DOM para atrapar errores pre-render
      if (window.Telemetry && typeof window.Telemetry.track === 'function') {
        window.Telemetry.track('SYSTEM_WSOD_FATAL', errDetail, 'FATAL');
      }

      // 2. Abortar UI de error si aún no inicializa el DOM (evita excepciones adicionales)
      if (!document.body) return; 

      var template = document.getElementById('wsod-mitigator');
      if (template) {
        var clone = template.content.cloneNode(true);
        clone.getElementById('wsod-error-detail').textContent = errDetail;
        document.body.innerHTML = '';
        document.body.appendChild(clone);
      }
    }
    window.addEventListener('error', function(e) {
      triggerWSOD(e.error ? (e.error.stack || e.error.message) : e.message);
    });
    window.addEventListener('unhandledrejection', function(e) {
      var reason = e.reason;
      var detail = (reason && reason.stack) ? reason.stack : String(reason);
      triggerWSOD('Unhandled Promise Rejection: ' + detail);
    });
  </script>

  <!-- DATA LAYER: Schemas y Estado Global (inyectados por GAS antes del DOM) -->
  <script>
    window.APP_SCHEMAS = <?!= JSON.stringify(getAppSchema()) ?>;
    window.__APP_CACHE__ = {};
    window.getEntitiesByMetaFlag = function(flagName) {
      if (!window.APP_SCHEMAS) return [];
      var items = Object.keys(window.APP_SCHEMAS).reduce((acc, k) => { 
        var meta = window.APP_SCHEMAS[k].metadata;
        // Convención Opt-in: Asumir false a menos que sea explícitamente true
        if (meta && meta[flagName] === true) acc[k] = meta; 
        return acc; 
      }, {});
      return Object.entries(items).sort(function(a,b){ return (a[1].order || 999) - (b[1].order || 999); });
    };

    window.ENTITY_META = Object.keys(window.APP_SCHEMAS).reduce((acc, key) => {
      if (key !== '_UI_CONFIG' && window.APP_SCHEMAS[key].metadata) acc[key] = window.APP_SCHEMAS[key].metadata;
      return acc;
    }, {});

    // [S8.5.1] Inyección Híbrida: Funciones Puras del Backend materializadas en el Frontend
    <?!= typeof _normalizeId !== 'undefined' ? _normalizeId.toString() : 'function _normalizeId(){}' ?>;
    <?!= typeof filterAvailableOptions !== 'undefined' ? filterAvailableOptions.toString() : 'function filterAvailableOptions(){return []}' ?>;
    <?!= typeof evaluateFieldState !== 'undefined' ? evaluateFieldState.toString() : 'function evaluateFieldState(){return "optional"}' ?>;
    <?!= typeof isNewRecord !== 'undefined' ? isNewRecord.toString() : 'function isNewRecord(){return true}' ?>;
    window.SubgridState = { _normalizeId, filterAvailableOptions, evaluateFieldState, isNewRecord };

    // [E18 - S18.1] Gobernanza Topológica (ABAC Context)
    window.__ABAC_CONTEXT__ = <?!= typeof __ABAC_CONTEXT__ !== 'undefined' ? __ABAC_CONTEXT__ : '{"ownerOf":[],"memberOf":[],"permissions":{}}' ?>;
    
    // [E18 - S18.4] ABAC Client-Side Helper
    window.ABAC = {
        context: window.__ABAC_CONTEXT__,
        can: function(action, entityName, targetId) {
            if (action === 'read') return true;
            
            const permissions = this.context.permissions || {};
            // Graceful Degradation si no hay regla en matriz (igual que el backend)
            if (!permissions.hasOwnProperty(entityName)) return true;
            
            const nivel = permissions[entityName] || "NONE";
            
            if (nivel.startsWith("ALL")) return true;
            if (nivel.startsWith("NONE") || nivel.startsWith("READ_ONLY")) return false;
            
            if (action === 'update' || action === 'delete') {
                if (nivel.startsWith("OWNER_ONLY")) return this.context.ownerOf.includes(targetId);
                if (nivel.startsWith("MEMBER_ONLY")) return this.context.memberOf.includes(targetId) || this.context.ownerOf.includes(targetId);
            }
            
            if (action === 'create') {
                if (nivel.startsWith("OWNER") || nivel.startsWith("MEMBER")) return true;
            }
            
            return false;
        }
    };
  </script>

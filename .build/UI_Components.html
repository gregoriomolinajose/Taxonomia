<!-- 
  ═══════════════════════════════════════════════════════
  UI_Components.html — Component Registry (Cerebro de Componentes)
  Single Source of Truth UI - Golden Patterns
  ESTE ARCHIVO NO SE RENDERIZA DIRECTAMENTE AL USUARIO. 
  Contiene los esqueletos HTML/JS estandarizados para Ionic 7.
  ═══════════════════════════════════════════════════════ 
-->

<!-- 
  =======================================================
  PATTERN 1: Formulario Grid Estricto con Sticky Footer
  =======================================================
  Uso: Creación/Edición de entidades. El footer queda anclado.
  PROHIBIDO: Usar <ion-content> o <ion-footer> nativos aquí.
-->
<template id="pattern-form-sticky-footer">
  <div class="form-engine-wrapper">
    <!-- Contenido Scrollable -->
    <div class="form-scroll-content">
      <ion-grid>
        <ion-row>
          <ion-col size="12" size-md="6">
            <ion-item>
              <ion-input type="text" label="Campo Ejemplo" label-placement="floating" fill="outline"></ion-input>
            </ion-item>
          </ion-col>
          <!-- Agregar más columnas respetando el Grid 12 -->
        </ion-row>
      </ion-grid>
    </div>
    
    <!-- Footer Anclado (Sticky) puro HTML -->
    <div class="form-sticky-footer">
      <ion-toolbar>
        <ion-buttons slot="end">
          <ion-button color="medium" onclick="cancelForm()">Cancelar</ion-button>
          <ion-button color="primary" fill="solid" onclick="saveForm()">Guardar</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </div>
  </div>
</template>

<!-- 
  =======================================================
  PATTERN 2: Smart Select (Responsive Dropdown)
  =======================================================
  Uso: Selects que cambian su interfaz según el tamaño de pantalla.
  < 768px: action-sheet (móvil)
  >= 768px: popover (desktop)
-->
<template id="pattern-smart-select">
  <ion-item>
    <ion-select class="smart-select" label="Selector Dinámico" label-placement="floating" fill="outline" placeholder="Selecciona una opción...">
      <ion-select-option value="1">Opción 1</ion-select-option>
      <ion-select-option value="2">Opción 2</ion-select-option>
    </ion-select>
  </ion-item>

  <!-- Script de Inyección para Smart Select -->
  <script>
    function initializeSmartSelects() {
      const selects = document.querySelectorAll('.smart-select');
      const isDesktop = window.innerWidth >= 768;
      selects.forEach(select => {
        select.interface = isDesktop ? 'popover' : 'action-sheet';
      });
    }
  </script>
</template>

<!-- 
  =======================================================
  PATTERN 3: Enterprise Modal (Desktop Override)
  =======================================================
  Uso: Modal limpio, sin dobles tarjetas anidadas.
  Estilos en CSS_DesignSystem.html o CSS_App.html:
  --width: 800px;
  --max-width: 90vw;
-->
<template id="pattern-enterprise-modal">
  <ion-modal id="enterpriseModal" class="enterprise-modal-clean">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Título del Modal</ion-title>
        <ion-buttons slot="end">
          <ion-button onclick="closeModal()">
            <ion-icon name="close-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    
    <ion-content class="ion-padding">
      <!-- No insertar ion-card aquí para evitar doble margin -->
      <div class="modal-body-content">
        <!-- Contenido principal -->
      </div>
    </ion-content>
  </ion-modal>
</template>

<!-- 
  =======================================================
  PATTERN 4: Dynamic Graph Multi-Select (Searchbar + Chips)
  =======================================================
  Uso: Renderizado in-line de relaciones N:M con predicción en caché local.
  Componente importado desde FormEngine para cumplir regla H11.
-->
<style id="ux-relational-overrides">
  /* S7.4 - Override Ionic Shadow DOM para fluidez en textos de Select y Chips */
  ion-chip ion-label { white-space: normal !important; text-overflow: clip !important; overflow: visible !important; }
  ion-select::part(text) { white-space: normal !important; text-overflow: clip !important; overflow: visible !important; }
  .select-popover ion-item { white-space: normal !important; }
</style>
<script>
  /**
   * Component Factory: Searchable Multi (Searchbar + Chips)
   */
  // S7.3 DRY Principle - Factory global de Chips
  window.UI_Components = window.UI_Components || {};
  window.UI_Components.drawChip = function(id, labelText, onRemoveCallback) {
      const chip = document.createElement('ion-chip');
      chip.color = 'primary';
      chip.innerHTML = `<ion-label>${labelText}</ion-label>`;
      if (typeof onRemoveCallback === 'function') {
          const icon = document.createElement('ion-icon');
          icon.name = 'close-circle';
          icon.onclick = (e) => onRemoveCallback(e, id);
          chip.appendChild(icon);
      }
      return chip;
  };

  window._buildSearchableMulti = function(container, fieldDef, dataset, initialSelection) {
      let selectedIds = Array.isArray(initialSelection) ? [...initialSelection] : [];
      
      // Hidden input para FormData
      const hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.name = fieldDef.name;
      hidden.value = JSON.stringify(selectedIds);
      hidden.id = `hidden_${fieldDef.name}`;
      hidden.dataset.parser = 'json_array';
      container.appendChild(hidden);

      // Visual Input Wrapper for Searchable Component (Main Form)
      const visualWrapper = document.createElement('div');
      visualWrapper.style.width = '100%';
      visualWrapper.style.marginBottom = '16px';
      
      // Flex Header Subgrid Clone
      const headerRow = document.createElement('div');
      headerRow.style.display = 'flex';
      headerRow.style.justifyContent = 'space-between';
      headerRow.style.alignItems = 'center';
      headerRow.style.width = '100%';
      headerRow.style.marginBottom = '8px';
      
      const label = document.createElement('div');
      label.style.fontSize = 'var(--sys-font-small)';
      label.style.color = 'var(--ion-color-medium)';
      label.style.fontWeight = 'bold';
      label.textContent = fieldDef.label + (fieldDef.required ? ' *' : '');
      
      const addBtn = document.createElement('ion-button');
      addBtn.fill = 'clear';
      addBtn.size = 'small';
      addBtn.innerHTML = '<ion-icon name="add" slot="start"></ion-icon> AGREGAR';

      headerRow.appendChild(label);
      headerRow.appendChild(addBtn);

      // Contenedor Chips (Primary Read-Only View)
      const chipsBox = document.createElement('div');
      chipsBox.style.display = 'flex';
      chipsBox.style.flexWrap = 'wrap';
      chipsBox.style.gap = '8px';
      chipsBox.style.minHeight = '32px';

      visualWrapper.appendChild(headerRow);
      visualWrapper.appendChild(chipsBox);
      container.appendChild(visualWrapper);

      // S7.5 - Picker Modal Pattern
      addBtn.onclick = () => {
          let draftIds = [...selectedIds];
          
          const pickerModal = document.createElement('ion-modal');
          pickerModal.isOpen = true;
          
          const header = document.createElement('ion-header');
          const toolbar = document.createElement('ion-toolbar');
          const title = document.createElement('ion-title');
          title.textContent = `Seleccionar ${fieldDef.targetEntity}`;
          
          const buttonsStart = document.createElement('ion-buttons');
          buttonsStart.slot = 'start';
          const cancelBtn = document.createElement('ion-button');
          cancelBtn.textContent = 'Cerrar';
          cancelBtn.onclick = () => { pickerModal.isOpen = false; setTimeout(() => pickerModal.remove(), 300); };
          buttonsStart.appendChild(cancelBtn);

          const buttonsEnd = document.createElement('ion-buttons');
          buttonsEnd.slot = 'end';
          const confirmBtn = document.createElement('ion-button');
          confirmBtn.textContent = 'Confirmar';
          confirmBtn.color = 'primary';
          confirmBtn.onclick = () => {
              selectedIds = [...draftIds];
              renderChips();
              pickerModal.isOpen = false;
              setTimeout(() => pickerModal.remove(), 300);
          };
          buttonsEnd.appendChild(confirmBtn);

          toolbar.appendChild(buttonsStart);
          toolbar.appendChild(title);
          toolbar.appendChild(buttonsEnd);
          header.appendChild(toolbar);

          const content = document.createElement('ion-content');
          content.classList.add('ion-padding');
          
          const searchbar = document.createElement('ion-searchbar');
          searchbar.placeholder = `Buscar ${fieldDef.targetEntity}...`;
          searchbar.debounce = 100;

          const draftChipsBox = document.createElement('div');
          draftChipsBox.style.display = 'flex';
          draftChipsBox.style.flexWrap = 'wrap';
          draftChipsBox.style.gap = '8px';
          draftChipsBox.style.marginBottom = '16px';
          
          const renderDraftChips = () => {
              draftChipsBox.innerHTML = '';
              draftIds.forEach(id => {
                  const match = dataset.find(d => String(d[fieldDef.valueField]) === String(id));
                  const labelText = match && match[fieldDef.labelField] ? `${match[fieldDef.valueField]} - ${match[fieldDef.labelField]}` : id;
                  const chip = window.UI_Components.drawChip(id, labelText, (e, chipId) => {
                      draftIds = draftIds.filter(sid => sid !== chipId);
                      renderDraftChips();
                  });
                  draftChipsBox.appendChild(chip);
              });
          };
          renderDraftChips();

          const list = document.createElement('ion-list');

          searchbar.addEventListener('ionInput', (e) => {
              const term = (e.detail.value || '').toLowerCase().trim();
              list.innerHTML = '';
              if (!term) return;
              
              const matches = dataset.filter(d => {
                  const l = d[fieldDef.labelField] || '';
                  return String(l).toLowerCase().includes(term) && !draftIds.includes(String(d[fieldDef.valueField]));
              }).slice(0, 15);
              
              matches.forEach(m => {
                  const item = document.createElement('ion-item');
                  item.button = true;
                  item.textContent = `${m[fieldDef.valueField]} - ${m[fieldDef.labelField]}`;
                  item.onclick = () => {
                      draftIds.push(String(m[fieldDef.valueField]));
                      searchbar.value = '';
                      list.innerHTML = '';
                      renderDraftChips();
                  };
                  list.appendChild(item);
              });
          });

          content.appendChild(searchbar);
          content.appendChild(draftChipsBox);
          content.appendChild(list);

          pickerModal.appendChild(header);
          pickerModal.appendChild(content);
          document.body.appendChild(pickerModal);
      };
      
      // Función renderizado chips en el Main Form
      const renderChips = () => {
          chipsBox.innerHTML = '';
          hidden.value = JSON.stringify(selectedIds);
          
          if (selectedIds.length === 0) {
              chipsBox.innerHTML = `
                  <div style="width: 100%; text-align: center; color: var(--ion-color-medium); padding: 16px; border: 1px dashed var(--ion-color-step-300, #c8c7cc); border-radius: 8px;">
                      <ion-icon name="layers-outline" style="font-size: 24px;"></ion-icon>
                      <div style="font-size: 14px; margin-top: 8px;">Sin registros vinculados</div>
                  </div>
              `;
              return;
          }

          selectedIds.forEach(id => {
              const match = dataset.find(d => String(d[fieldDef.valueField]) === String(id));
              const labelText = match && match[fieldDef.labelField] ? `${match[fieldDef.valueField]} - ${match[fieldDef.labelField]}` : id;
              
              const chip = window.UI_Components.drawChip(id, labelText, (e, chipId) => {
                  e.stopPropagation();
                  selectedIds = selectedIds.filter(sid => sid !== chipId);
                  renderChips();
              });
              chipsBox.appendChild(chip);
          });
      };
      
      // Init call
      renderChips();
  };
</script>

<script>
    /**
     * UI_ModalManager.html
     *
     * Extracts ModalStackController (S11.2) for declarative pub/sub integration.
     * Manages LIFO Stack, Max Depth Z-Index Guard, and proper GC.
     */
    (function (global) {
        global.ModalStackController = (function() {
            const stack = [];
            const MAX_DEPTH = 3;
            
            return {
                push: function(modalNode) {
                    if (stack.length >= MAX_DEPTH) {
                        const alert = document.createElement('ion-alert');
                        alert.header = 'Límite de Anidación Alcanzado';
                        alert.message = 'Has rebasado la profundidad máxima para la creación In-line. Por favor, finaliza o cancela primero los formularios pendientes para proteger la estabilidad visual.';
                        alert.buttons = ['Entendido'];
                        document.body.appendChild(alert);
                        alert.present();
                        return false; // Deny push
                    }
                    stack.push(modalNode);
                    global.currentFormModal = modalNode;
                    return true;
                },
                closeTop: function() {
                    if (stack.length > 0) {
                        const topModal = stack.pop();
                        // Garantía fuerte de Garbage Collection (T16)
                        topModal.dismiss().catch(() => {}).finally(() => {
                            setTimeout(() => {
                                // [S10.3] Teardown Agresivo: Destrucción topológica
                                topModal.innerHTML = '';
                                topModal.__onSaveSuccessFallback = null;
                                topModal.remove();
                            }, 300);
                            console.log(`[GC] Modal Destruido. Nodos Vivos en Stack: ${stack.length}`);
                        });
                        
                        global.currentFormModal = stack.length > 0 ? stack[stack.length - 1] : null;
                        
                        // Mutación de estado global (T15)
                        if (stack.length === 0) {
                            global.currentEditId = null;
                        }
                    }
                },
                getDepth: () => stack.length,
                clearAll: function() {
                    while(stack.length > 0) {
                        this.closeTop();
                    }
                }
            };
        })();

        // Backward compatibility (T7)
        global._closeTopModal = global.ModalStackController.closeTop;

        // --- EventBus Integration (S11.1) ---
        document.addEventListener('DOMContentLoaded', () => {
            if (global.AppEventBus) {
                global.AppEventBus.subscribe('MODAL::CLOSE_REQUEST', function() {
                    global.ModalStackController.closeTop();
                });
            }
        });

    })(window);
</script>

narrative: |
  ## Root Cause Found
  The Ghost Stealing bug arose from a collision between the Client and Server:
  1. The UI Drawer implicitly mapped physical record fields, disregarding virtual `isTemporalGraph: true` relations, so the child returned an empty empty parent ID string upon subgrid addition.
  2. The server (`Engine_DB`) falsely validated an array of parent orphans due to mapping `incomingIds` natively to `c[pkField]`, when scalars are natively encoded as `c['id_registro']`.

  ## Implementation
  FormRenderer was taught to resolve and securely lock logical graph relationships directly inside single select DOM inputs before the drawer exposes them. On the backend, we patched an array `.map()` to accurately index scalar representations. Playwright tests were added successfully. The branch has been committed and deployed seamlessly up to Production.
next_session_prompt: |
  Start evaluating other possible Ghost Stealing variants if the user adds deep relations (3rd tier). Playwright pipeline runs reliably currently.

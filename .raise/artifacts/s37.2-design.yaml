content:
  summary: 'Reactividad UI (requestAnimationFrame Queue) y Transmutación Semántica de IDs en el DataGrid.'
  complexity: medium
  acceptance_criteria:
    - id: AC1
      description: 'Filas forzadas de columnas para garantizar orden estricto (Lexical_ID siempre primero, Nombre segundo).'
      verifiable: true
    - id: AC2
      description: 'Supresión de rebotes de redibujado (thrashing) conectando AppEventBus DATA::UPDATED a un _queueRedraw mediante requestAnimationFrame.'
      verifiable: true
    - id: AC3
      description: 'Los Primary Keys crudos se ocultan visualmente resolviéndolos a su _resolveLogicalValue (Título Semántico) en UI_DataGrid.client.js.'
      verifiable: true
  integration_points:
    - module: 'DataView_UI.client.js'
      change_type: modification
      files: ['src/DataView_UI.client.js']
    - module: 'UI_DataGrid.client.js'
      change_type: modification
      files: ['src/UI_DataGrid.client.js']
  decisions:
    - id: D1
      choice: 'Encolado vs Debouncing.'
      rationale: 'Se usa un RequestAnimationFrame Queue para consolidar los repaints generados por el AppEventBus. Esto elimina el cuello de botella generado cuando 10 hijos mandan update events secuencialmente.'
      alternatives_considered: ['Lodash Debounce (menos performante con el ciclo nativo del explorador).']

  decisions:
    - id: D1
      choice: Use in-memory sheet mock (not jest.mock) for Engine_DB nested tests
      rationale: QA-7 prohibits mocking Adapter_Sheets in Engine_DB integration tests. A manual mock object simulating SpreadsheetApp is the only valid approach.
      alternatives_considered:
        - "jest.mock(Adapter_Sheets) — violates QA-7"
        - "Skip Engine_DB nested tests — leaves critical gap in orchestration coverage"
    - id: D2
      choice: Test includeAudit flag introduced in QR-R01 as first-class AC
      rationale: The R01 fix added a new public API surface that is currently untested.
      alternatives_considered:
        - "Trust code review — insufficient, flag must have a regression test"

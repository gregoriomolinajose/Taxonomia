      files: ['src/Adapter_Sheets.js']
    - module: Engine_DB
      change_type: modification
      files: ['src/Engine_DB.js']
    - module: Test_Suite
      change_type: new
      files:
        - '__tests__/Adapter_Sheets.list.test.js'

content:
  summary: >
    The test suite lacks behavioral coverage for Adapter_Sheets.list(),
    API_Universal response contracts, and Engine_DB.orchestrateNestedSave().
    Two test suites are currently skipped. This story closes those gaps under
    the Anti-Mockery rule (QA-7) and Full Lifecycle mandate (QA-1).
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: "Adapter_Sheets.list() has tests for: basic listing, includeAudit=true returns audit columns, empty sheet returns empty array"
      verifiable: true
    - id: AC2
      description: "Adapter_Sheets.upsert() covered: create path injects all 4 audit fields; update path preserves created_at/created_by"
      verifiable: true
    - id: AC3
      description: "Engine_DB.orchestrateNestedSave() tested with real Adapter_Sheets (in-memory mock sheet, NOT jest.mock) per QA-7"
      verifiable: true
    - id: AC4
      description: "API_Universal: at least 2 contract tests validating that response payloads pass JSON.parse(JSON.stringify()) без throwing"
      verifiable: true
    - id: AC5
      description: "Zero skipped test suites — the 2 currently skipped are either fixed or explicitly documented why they are excluded"
      verifiable: true
    - id: AC6
      description: "Total passing tests >= 90 (currently 74 passing)"
      verifiable: true
  integration_points:
    - module: Adapter_Sheets

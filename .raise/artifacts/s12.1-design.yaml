content:
  summary: 'Desmembrar FormEngine_UI.html (1700 LOC) delegando la creación física del DOM a un Factory Component (FormBuilder_Inputs) y la orquestación a FormRenderer_UI, logrando O(1) de mantenibilidad.'
  complexity: complex
  acceptance_criteria:
    - id: AC1
      description: 'FormRenderer_UI_HTML calls FormBuilder_Inputs without explicitly instantiating <ion-items>'
      verifiable: true
    - id: AC2
      description: 'Nested schema dependencies (Cascading selects) still preserve temporal EventBus binding.'
      verifiable: true
  integration_points:
    - module: 'UI.FormRenderer'
      change_type: modification
      files: ['src/FormEngine_UI.html']
    - module: 'UI.FormBuilder'
      change_type: new
      files: ['src/FormBuilder_Inputs.html']
    - module: 'UI.Validators'
      change_type: new
      files: ['src/FormValidators.html']
  decisions:
    - id: D1
      choice: 'Separation of native DOM generation into a UI_Factory'
      rationale: 'Isolating physical instantiation limits cognitive overload on the renderer logic and prevents scope leakage.'
      alternatives_considered: ['Virtual DOM Library (React/Preact)']

content:
  summary: 'Implementar el rendering híbrido del FormEngine donde Linear Scroll y Wizard pueden coexistir basándose en el esquema de la entidad, respetando Divisores independientemente de la rama topológica elegida.'
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: 'Renderiza Stepper si existen >1 secciones y no se declara explícitamente uiBehavior linear.'
      verifiable: true
    - id: AC2
      description: 'Fuerza rendereo lineal si existe un uiBehavior: "linear" en la root de metadata del schema.'
      verifiable: true
    - id: AC3
      description: 'El test E2E debe usar un helper asincrono hibrido que detecte la topología visualizada al vuelo.'
      verifiable: true
  integration_points:
    - module: 'FormRenderer_UI.client.js'
      change_type: modification
      files: ['src/FormRenderer_UI.client.js']
    - module: 'hierarchy-stress.spec.js'
      change_type: modification
      files: ['__tests__/e2e/hierarchy-stress.spec.js']
  decisions:
    - id: D1
      choice: 'Metadata flag uiBehavior: "linear" forzoso.'
      rationale: 'Permite que esquemas que deseen agrupar en sub-secciones sigan prescindiendo de Stepper y en su lugar usen las sections como divisores.'
      alternatives_considered: ['Crear componente Divider puro sin sections.']
